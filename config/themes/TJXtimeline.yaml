# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJXtimeline
  version: '2.0'
  description: TJX colors and style — timeline only

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: PlaywriteDEGrund-VariableFont_wght
  default_missing_icon: applet-closed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: blue
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: navy
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: blue
  font_family: PlaywriteDEGrund-VariableFont_wght
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: viridis
  fiscal_palette: Greys
  group_palette: Pastel1
  hash_lines: black
  company_holiday:
    alpha: 0.25
    color: gold
  federal_holiday:
    alpha: 0.1
    color: tomato

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  background_color: none
  axis_color: lightgrey
  axis_opacity: 0.9
  axis_width: 3
  tick_color: grey
  date_format: M/D
  tick_label_format: M/D
  today_date: ''
  today_label_text: Today
  today_label_offset_y: 10.0
  today_line_color: grey
  today_label_color: grey
  marker_stroke_color: ''
  marker_stroke_width: 1.0
  marker_radius: 4.0
  icon_size: 14
  callout_offset_y: 20.0
  event_axis_padding: 24.0
  duration_offset_y: 20.0
  duration_lane_gap_y: 20.0
  duration_icon_visible: true
  label_stroke_width: 1.0
  label_fill_opacity: 0.25
  duration_bar_fill_opacity: 0.75
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: 4 2
  duration_bracket_stroke_dasharray: null
  top_colors:
    - deepskyblue
    - gold
    - tomato
    - springgreen
    - lightskyblue
    - ivory
    - lightgoldenrod
    - lightsalmon
    - lime
    - mistyrose
  bottom_colors:
    - midnightblue
    - springgreen
    - deepskyblue
    - gold
    - orchid
    - orange
    - mediumblue
    - orangered
    - firebrick
    - fuchsia
  name_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: white
    font_size: 18
  notes_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
    font_size: 14
  date:
    font_family: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
  ticks:
    - unit: month
      label_format: MMM D
      show_labels: true
      label_color: black
      label_font_size: 11
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 8.0
      label_gap: 18.0
    - unit: Date
      show_labels: true
      label_format: D
      label_color: black
      label_font_size: 6
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 4.0
      include_endpoints: false
      max_label_count: 400
      label_gap: 10.0
    - unit: Date
      show_labels: true
      label_format: dd
      label_color: black
      label_font_size: 6
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 2.0
      include_endpoints: false
      max_label_count: 400
      label_gap: 4.0
  show_continuation_icon: true
  continuation_icon_right: move-right
  continuation_icon_left: move-left
  continuation_icon_height: 14.0
  continuation_icon_color: white

# ─── timeline_events ───────────────────────────────────────────────────────
# Timeline event geometry (box width/height).
timeline_events:
  box_height: 24

# ─── timeline_durations ────────────────────────────────────────────────────
# Timeline duration geometry (box width/height, lane gap).
timeline_durations:
  box_height: 50
  date_font: PlaywriteDEGrund-VariableFont_wght
  date_font_size: 10
  date_color: black

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 14
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 12
  - name: define text:heading
    define: text
    as: heading
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 14
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: white
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:label
    define: text
    as: label
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:caption
    define: text
    as: caption
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: black
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:timeband
    define: box
    as: timeband
    style:
      fill: none
      fill_opacity: 1.0
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.25
      stroke: grey
      stroke_width: 1.0
  - name: define line:axis
    define: line
    as: axis
    style:
      color: lightgrey
      width: 3
      opacity: 0.9
  - name: define line:today
    define: line
    as: today
    style:
      color: grey
      width: 1.5
      opacity: 1.0
  - name: define line:connector
    define: line
    as: connector
    style:
      color: grey
      width: 0.5
      opacity: 1.0
      dasharray: 4 2
  - name: define line:separator
    define: line
    as: separator
    style:
      color: grey
      width: 0.5
      opacity: 0.5
  - name: define icon:event
    define: icon
    as: event
    style:
      color: yellow
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: navy
  - name: bind ec-axis-line
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: define line:tick
    define: line
    as: tick
    style:
      color: grey
      width: 0.5
      opacity: 1.0
  - name: bind ec-axis-tick
    apply_to: element
    select:
      element: ec-axis-tick
    style:
      use: line:tick
  - name: bind ec-tick-label
    apply_to: element
    select:
      element: ec-tick-label
    style:
      use: text:caption
  - name: bind ec-today-line
    apply_to: element
    select:
      element: ec-today-line
    style:
      use: line:today
  - name: today label color
    apply_to: text:today_label
    style:
      color: grey
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-event-name -> text:body
    apply_to: element
    select:
      element: ec-event-name
    style:
      use: text:body
  - name: bind ec-event-notes -> text:body_secondary
    apply_to: element
    select:
      element: ec-event-notes
    style:
      use: text:body_secondary
  - name: bind ec-event-date -> text:caption
    apply_to: element
    select:
      element: ec-event-date
    style:
      use: text:caption
  - name: bind ec-duration-date -> text:caption
    apply_to: element
    select:
      element: ec-duration-date
    style:
      use: text:caption
  - name: bind ec-today-label -> text:label
    apply_to: element
    select:
      element: ec-today-label
    style:
      use: text:label
      color: grey
  - name: bind ec-header-text -> text:heading
    apply_to: element
    select:
      element: ec-header-text
    style:
      use: text:heading
  - name: bind ec-footer-text -> text:caption
    apply_to: element
    select:
      element: ec-footer-text
    style:
      use: text:caption
  - name: bind ec-watermark -> text:heading
    apply_to: element
    select:
      element: ec-watermark
    style:
      use: text:heading
  - name: bind ec-background -> box:default
    apply_to: element
    select:
      element: ec-background
    style:
      use: box:default
  - name: bind ec-heading-cell -> box:header
    apply_to: element
    select:
      element: ec-heading-cell
    style:
      use: box:header
  - name: bind ec-band-cell -> box:timeband
    apply_to: element
    select:
      element: ec-band-cell
    style:
      use: box:timeband
  - name: bind ec-callout-box -> box:callout
    apply_to: element
    select:
      element: ec-callout-box
    style:
      use: box:callout
  - name: bind ec-axis-line -> line:axis
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: bind ec-axis-tick -> line:axis
    apply_to: element
    select:
      element: ec-axis-tick
    style:
      use: line:axis
  - name: bind ec-today-line -> line:today
    apply_to: element
    select:
      element: ec-today-line
    style:
      use: line:today
  - name: bind ec-separator -> line:separator
    apply_to: element
    select:
      element: ec-separator
    style:
      use: line:separator
  - name: bind ec-connector -> line:connector
    apply_to: element
    select:
      element: ec-connector
    style:
      use: line:connector
  - name: bind ec-duration-bar -> line:axis
    apply_to: element
    select:
      element: ec-duration-bar
    style:
      use: line:axis
  - name: bind ec-milestone-marker -> icon:milestone
    apply_to: element
    select:
      element: ec-milestone-marker
    style:
      use: icon:milestone
  - name: bind ec-milestone-flag -> icon:milestone
    apply_to: element
    select:
      element: ec-milestone-flag
    style:
      use: icon:milestone
      icon: flag
  - name: bind ec-duration-marker -> line:axis
    apply_to: element
    select:
      element: ec-duration-marker
    style:
      use: line:axis
  - name: bind ec-event-icon -> icon:event
    apply_to: element
    select:
      element: ec-event-icon
    style:
      use: icon:event
  - name: bind ec-duration-icon -> icon:duration
    apply_to: element
    select:
      element: ec-duration-icon
    style:
      use: icon:duration
  - name: bind ec-legend-swatch -> line:axis
    apply_to: element
    select:
      element: ec-legend-swatch
    style:
      use: line:axis
  - name: bind ec-legend-text -> text:body_secondary
    apply_to: element
    select:
      element: ec-legend-text
    style:
      use: text:body_secondary
  - name: bind ec-legend-icon -> icon:event
    apply_to: element
    select:
      element: ec-legend-icon
    style:
      use: icon:event
  - name: Marshalls durations (name)
    select:
      task_name:
        - Marshalls
      event_type: duration
    apply_to: box:duration
    style:
      fill: red
  - name: Marshalls durations (notes)
    select:
      notes:
        - Marshalls
      event_type: duration
    apply_to: box:duration
    style:
      fill: red
  - name: Maxx durations
    select:
      task_name:
        - Maxx
      event_type: duration
    apply_to: box:duration
    style:
      fill: blue
  - name: Canada durations
    select:
      task_name:
        - Canada
      event_type: duration
    apply_to: box:duration
    style:
      fill: black

