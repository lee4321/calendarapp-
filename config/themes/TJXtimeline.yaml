# TJX theme — timeline visualization only.
# Self-contained: every value the timeline renderer needs is set here so the
# visualization output never depends on hardcoded fallbacks in config.py.

theme:
  name: "TJXtimeline"
  version: "2.0"
  description: "TJX colors and style — timeline only"

# ══════════════════════════════════════════════════════════════════════════════
# Unified Style Tokens
# ══════════════════════════════════════════════════════════════════════════════

text_styles:
  heading:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 14
    color: "grey"
    size_rules:
      - font_size: 10
        when: { papersize: ["letter", "ledger", "tabloid"] }
      - font_size: 8
        when: { papersize: ["3x5", "5x8"] }
  body:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "white"
  body_secondary:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "grey"
  label:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "grey"
  caption:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 22
    color: "black"

box_styles:
  default:
    fill: "white"
    fill_opacity: 1.0
    stroke: "none"
  header:
    fill: "none"
    stroke: "none"
  timeband:
    fill: "none"
    fill_opacity: 1.0
    stroke: "none"
  callout:
    fill: "white"
    fill_opacity: 0.25
    stroke: "grey"
    stroke_width: 1.0

line_styles:
  axis:
    color: "lightgrey"
    width: 3
    opacity: 0.9
  today:
    color: "grey"
    width: 1.5
    opacity: 1.0
  connector:
    color: "grey"
    width: 0.5
    opacity: 1.0
    dasharray: "4 2"
  separator:
    color: "grey"
    width: 0.5
    opacity: 0.5

icon_styles:
  event:
    color: "yellow"
    size: 10
  duration:
    color: "navy"

axis:
  line_style: axis
  tick:
    color: "grey"
    label_style: caption
    date_format: "M/D"
  today:
    line_style: today
    label_color: "grey"
    label_text: "Today"

element_styles:
  ec-heading:        { text_style: heading }
  ec-label:          { text_style: label }
  ec-event-name:     { text_style: body }
  ec-event-notes:    { text_style: body_secondary }
  ec-event-date:     { text_style: caption }
  ec-duration-date:  { text_style: caption }
  ec-today-label:    { text_style: label, color: "grey" }
  ec-header-text:    { text_style: heading }
  ec-footer-text:    { text_style: caption }
  ec-watermark:      { text_style: heading }
  ec-background:     { box_style: default }
  ec-heading-cell:   { box_style: header }
  ec-band-cell:      { box_style: timeband }
  ec-callout-box:    { box_style: callout }
  ec-axis-line:      { line_style: axis }
  ec-axis-tick:      { line_style: axis }
  ec-today-line:     { line_style: today }
  ec-separator:      { line_style: separator }
  ec-connector:      { line_style: connector }
  ec-duration-bar:   { line_style: axis }
  ec-milestone-marker: { line_style: axis }
  ec-milestone-flag:   { line_style: axis }
  ec-duration-marker:  { line_style: axis }
  ec-event-icon:     { icon_style: event }
  ec-duration-icon:  { icon_style: duration }
  ec-legend-swatch:  { line_style: axis }
  ec-legend-text:    { text_style: body_secondary }
  ec-legend-icon:    { icon_style: event }

# ══════════════════════════════════════════════════════════════════════════════
# General Settings
# ══════════════════════════════════════════════════════════════════════════════

base:
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  font_color: "grey"
  default_missing_icon: applet-closed
  size_rule:
    - font_size: 14
      when:
        papersize: ["letter", "ledger", "tabloid"]
    - font_size: 12
      when:
        papersize: ["3x5", "5x8"]

header:
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  font_color: "grey"

footer:
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  font_color: "grey"

watermark:
  text: null
  color: "blue"
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  opacity: 0.5
  font_size: null
  resize_mode: "fit"
  rotation_angle: 45.0
  image_rotation_angle: 45.0

events:
  icon_color: "blue"
  item_placement_order: ["priority"]

durations:
  icon_color: "navy"
  stroke_dasharray: null

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  year_offset: +1

colors:
  month_palette: "viridis"
  fiscal_palette: "Greys"
  group_palette: "Pastel1"
  hash_lines: "black"
  company_holiday:
    alpha: 0.25
    color: "gold"
  federal_holiday:
    alpha: 0.10
    color: "tomato"

# ══════════════════════════════════════════════════════════════════════════════
# Timeline
# ══════════════════════════════════════════════════════════════════════════════

timeline:
  background_color: "none"
  axis_color: "lightgrey"
  axis_opacity: 0.9
  axis_width: 3
  tick_color: "grey"
  date_format: "M/D"
  tick_label_format: "M/D"
  today_date: ""
  today_label_text: "Today"
  today_label_offset_y: 10.0
  today_line_color: "grey"
  today_label_color: "grey"
  marker_stroke_color: ""
  marker_stroke_width: 1.0
  marker_radius: 4.0
  icon_size: 14
  callout_offset_y: 20.0
  event_axis_padding: 24.0
  duration_offset_y: 20.0
  duration_lane_gap_y: 20.0
  duration_icon_visible: true
  label_stroke_width: 1.0
  label_fill_opacity: 0.25
  duration_bar_fill_opacity: 0.75
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: "4 2"
  duration_bracket_stroke_dasharray: null
  top_colors: ["deepskyblue", "gold", "tomato", "springgreen", "lightskyblue", "ivory", "lightgoldenrod", "lightsalmon", "lime", "mistyrose"]
  bottom_colors: ["midnightblue", "springgreen", "deepskyblue", "gold", "orchid", "orange", "mediumblue", "orangered", "firebrick", "fuchsia"]
  name_text:
    font_name: "PlaywriteDEGrund-VariableFont_wght"
    font_color: "white"
    font_size: 18
  notes_text:
    font_name: "PlaywriteDEGrund-VariableFont_wght"
    font_color: "grey"
    font_size: 14
  date:
    font_family: "PlaywriteDEGrund-VariableFont_wght"
    font_color: "grey"

  ticks:
    - unit: "month"
      label_format: "MMM D"
      show_labels: true
      label_color: "black"
      label_font_size: 11
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 8.0
      label_gap: 18.0

    - unit: "Date"
      show_labels: true
      label_format: "D"
      label_color: "black"
      label_font_size: 6
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 4.0
      include_endpoints: false
      max_label_count: 400
      label_gap: 10.0

    - unit: "Date"
      show_labels: true
      label_format: "dd"
      label_color: "black"
      label_font_size: 6
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 2.0
      include_endpoints: false
      max_label_count: 400
      label_gap: 4.0

  show_continuation_icon: true
  continuation_icon_right: "move-right"
  continuation_icon_left: "move-left"
  continuation_icon_height: 14.0
  continuation_icon_color: "white"

timeline_events:
  box_height: 24

timeline_durations:
  box_height: 50
  date_font: "PlaywriteDEGrund-VariableFont_wght"
  date_font_size: 10
  date_color: "black"

# ══════════════════════════════════════════════════════════════════════════════
# Style Rules — duration fills
# ══════════════════════════════════════════════════════════════════════════════

style_rules:
  - name: Marshalls durations (name)
    select:
      task_name:
      - Marshalls
      event_type: duration
    apply_to: duration
    style:
      fill_color: red

  - name: Marshalls durations (notes)
    select:
      notes:
      - Marshalls
      event_type: duration
    apply_to: duration
    style:
      fill_color: red

  - name: Maxx durations
    select:
      task_name:
      - Maxx
      event_type: duration
    apply_to: duration
    style:
      fill_color: blue

  - name: Canada durations
    select:
      task_name:
      - Canada
      event_type: duration
    apply_to: duration
    style:
      fill_color: black
