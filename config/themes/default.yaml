# ── ExcelHeader ───────────────────────────────────────────────────────────────
# Settings for the excelheader subcommand (Excel .xlsx output).
# Timebands and vertical_lines are read from the blockplan section above.
# excelheader:
#   font_name: "Calibri"   # System-installed Excel font for all cells
#   font_size: 9           # Font size in points
#
# Per-band Excel font overrides — add directly to any band dict:
#   excel_font_name: "Arial Narrow"   # font override for this band only
#   excel_font_size: 8                # size override for this band only


# ─────────────────────────────────────────────────────────────────────────────
# COMPACT_PLAN — Compressed activities / duration-line view
# ─────────────────────────────────────────────────────────────────────────────
compact_plan:
  palette: ["#92d050", "#6b9bc7", "gold", "tomato", "plum", "khaki"]
  show_axis: true             # (bool) draw the central timeline axis line
  axis_color: "#7f7f7f"
  axis_dasharray: "1.75,7.0"
  text:
    font_color: "black"
  milestone_color: "black"
  header_bottom_y: null   # gap (pts) between the bottom of the header band block and the topmost duration line / milestone; null = no gap
  key_top_y: null         # gap (pts) between the last duration line / milestone and the top of the key/legend block; null = no gap

  # ── Two-column legend/roster layout ─────────────────────────────────────
  # The legend (left column) and milestone roster (right column) are rendered
  # side by side.  legend_column_split is the fraction of the total content
  # width given to the legend column.
  legend_column_split:   0.5   # (float 0–1) fraction of width for the left/legend column
  legend_team_columns:   2     # (int ≥1) number of sub-columns within the left legend area

  # ── Duration start icons ──────────────────────────────────────────────────
  # An icon from the specified list is drawn at the start (left) end of each
  # duration line, with a unique icon assigned per activity by sorted index.
  # The same icon appears beside the activity name in the legend.
  # Available icon lists: darksquare, squares, darkcircles, circles, squircles, darksquircles
  show_duration_icons:   true           # (bool) draw icons on lines and in legend
  duration_icon_list:    "darksquare"   # (str) icon list name from config.ICON_SETS
  duration_icon_height:  8.0            # (float) icon display height in pts
  duration_icon_color:   null           # (str|null) icon color; null = use line color

  # ── Milestone roster (right column, beside legend) ───────────────────────
  # When show_milestone_list is true, a date-sorted list of every milestone
  # marker is appended below the legend: one row per milestone showing the
  # date (formatted by milestone_list_date_format) and the task name.
  show_milestone_list:           false        # (bool) render the milestone roster
  milestone_list_date_format:    "M/D"        # (str) Arrow date format for the date column
  milestone_list_date_color:     "#595959"    # (str) date column text color
  milestone_list_row_height:     10.0         # (float) vertical spacing per row in pts
  milestone_list_date_col_width: 32.0         # (float) width of the date column in pts
  milestone_list_section_gap:    6.0          # (float) gap between legend bottom and roster top

  # ── Continuation icon (activities extending beyond the end date) ─────────
  # When a duration bar extends past the specified end date the line is
  # clamped to the right edge of the timeline and a small icon is placed
  # there to indicate the activity continues.  A matching legend entry is
  # appended below the milestone roster.
  show_continuation_icon:      true           # (bool) render icon and legend entry
  continuation_icon:           "arrow-right"  # (str) icon name from icons table
  continuation_icon_height:    8.0            # (float) icon display height in pts
  continuation_icon_color:     null           # (str|null) null = use the line color
  continuation_legend_text:    "activity continues"  # (str) legend entry label
  continuation_section_gap:    4.0            # (float) gap above the continuation legend row
  show_axis_legend:  true          # (bool) show axis sample line + label in the legend
  legend_axis_text:  "timeline"    # (str) label beside the axis sample

  time_bands:
    - label: "Date Range"
      unit: "week"
      label_format: "{start} – {end}"
      fill_color: "none"
      alt_fill_color: "#f2f2f2"
      text_align: "left"        # "left" | "center" | "right"  (default: "left")
    - label: "Week"
      unit: "week"
      label_format: "Week {n}"
      fill_color: "none"
      alt_fill_color: "none"
      text_align: "left"
    # ── Icon band example (uncomment to enable) ───────────────────────────────
    # An icon band shows SVG icons in a per-day grid driven by event rules.
    # Multiple different icons per day are supported; duplicates are suppressed.
    # - label: "Events"
    #   unit: "icon"
    #   row_height: 18          # (float) row height in pts
    #   icon_height: 12         # (float) icon display size in pts (default: row_height * 0.65)
    #   fill_color: "none"      # (str)   background of every day cell
    #   icon_rules:             # list of match rules (all criteria must match)
    #     - milestone: true     # match milestones …
    #       icon: "diamond"     # … show this icon
    #       color: "#4472C4"    # … in this colour
    #     - task_contains: "Release"
    #       icon: "star"
    #       color: "#E74C3C"
