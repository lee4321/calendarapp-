# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: Default
  version: '2.0'
  description: The original CalendarApp styling — unified theme model

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: RobotoCondensed-Light
  default_missing_icon: applet-closed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: RobotoCondensed-Light
  font_color: grey

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: RobotoCondensed-Light
  font_color: grey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: navy
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: navy
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: blue
  font_family: RobotoCondensed-Light
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: null

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: Greys
  fiscal_palette: Greys
  group_palette: Pastel1
  hash_lines: black
  federal_holiday:
    color: red
    alpha: 0.25
  company_holiday:
    color: green
    alpha: 0.25
  resource_groups:
    a: black
    b: yellow
    c: red
    d: grey

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  day_names:
    font_family: RobotoCondensed-LightItalic
    font_color: grey
  week_numbers:
    font_family: RobotoCondensed-Bold
    font_color: yellow
    label_format: W{num:02d}
  day_box:
    stroke_color: grey
    stroke_opacity: 0.25
    stroke_width: 2
    stroke_dasharray: null
    fill_color: grey
    fill_opacity: 0.25
    number_font: RobotoCondensed-Light
    number_color: white
    icon_color: red
    font_color: navy
    hash_pattern_opacity: 0.1
  name_text:
    font_name: RobotoCondensed-Light
    font_color: navy
  notes_text:
    font_name: RobotoCondensed-LightItalic
    font_color: darkgrey
  overflow:
    icon: warningtriangle
    color: red

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  cell_font: JuliaMono-Regular
  cell_bold_font: Roboto-Bold
  cell_font_size: null
  title_font: RobotoCondensed-Bold
  title_font_size: null
  title_format: MMMM YYYY
  title_color: navy
  header_font: JuliaMono-Regular
  header_font_size: null
  header_color: grey
  day_number_glyphs: null
  day_number_digits: null
  day_color: black
  adjacent_month_color: lightgrey
  show_adjacent: true
  holiday_color: red
  nonworkday_fill_color: lightblue
  milestone_color: navy
  circle_milestones: true
  milestone_stroke_color: navy
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: lightblue
  week_number_font: JuliaMono-Regular
  week_number_font_size: null
  week_number_color: darkgrey
  week_number_label_format: W{num}
  grid_line_color: lightgrey
  grid_line_width: 0.25
  grid_line_opacity: 0.5
  grid_line_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box: null

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  title_text: Event Details
  title_font: RobotoCondensed-Bold
  title_font_size: null
  title_color: navy
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_color: grey
  name_text:
    font_name: RobotoCondensed-Light
    font_color: black
  notes_text:
    font_name: RobotoCondensed-LightItalic
    font_color: darkgrey
  separator_stroke_dasharray: null
  headers:
    - Start Date
    - Name / Description
    - Milestone
    - Priority
    - Group
  column_widths:
    - 0.16
    - 0.52
    - 0.1
    - 0.1
    - 0.12

# ─── text_mini ─────────────────────────────────────────────────────────────
# text-mini glyph-set declarations; not an SVG renderer.
text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null
  holiday_symbols: null
  nonworkday_symbols: null
  duration_symbols: null
  duration_fill: null

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  background_color: powderblue
  axis_color: lightgrey
  axis_opacity: 0.9
  axis_width: 3
  tick_color: grey
  date_format: M/D
  tick_label_format: M/D
  today_date: ''
  today_label_text: Today
  today_label_offset_y: 10.0
  today_line_color: grey
  today_label_color: grey
  marker_stroke_color: ''
  marker_stroke_width: 1.0
  marker_radius: 4.2
  icon_size: 8
  callout_offset_y: 30.0
  duration_offset_y: 30
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.25
  duration_bar_fill_opacity: 0.75
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: 4 2
  duration_bracket_stroke_dasharray: null
  top_colors:
    - deepskyblue
    - gold
    - tomato
    - springgreen
    - lightskyblue
    - ivory
    - lightgoldenrod
    - lightsalmon
    - lime
    - mistyrose
  bottom_colors:
    - midnightblue
    - springgreen
    - deepskyblue
    - gold
    - orchid
    - orange
    - mediumblue
    - orangered
    - firebrick
    - fuchsia
  name_text:
    font_name: Roboto-Bold
    font_color: deepskyblue
  notes_text:
    font_name: RobotoCondensed-Bold
    font_color: deepskyblue
  date:
    font_family: Roboto-Bold
    font_color: deepskyblue

# ─── timeline_events ───────────────────────────────────────────────────────
# Timeline event geometry (box width/height).
timeline_events:
  box_width: null
  box_height: 24

# ─── timeline_durations ────────────────────────────────────────────────────
# Timeline duration geometry (box width/height, lane gap).
timeline_durations:
  box_width: null
  box_height: 24
  date_font: RobotoCondensed-Italic
  date_font_size: 9
  date_color: grey

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  palette:
    - '#92d050'
    - '#6b9bc7'
    - gold
    - tomato
    - plum
    - khaki
  show_axis: true
  axis_color: '#7f7f7f'
  axis_dasharray: 1.75,7.0
  text:
    font_color: black
  milestone_color: black
  header_bottom_y: null
  key_top_y: null
  legend_column_split: 0.5
  legend_team_columns: 2
  show_duration_icons: true
  duration_icon_list: darksquare
  duration_icon_height: 8.0
  duration_icon_color: null
  show_milestone_list: false
  milestone_list_date_format: M/D
  milestone_list_date_color: '#595959'
  milestone_list_row_height: 10.0
  milestone_list_date_col_width: 32.0
  milestone_list_section_gap: 6.0
  show_continuation_icon: true
  continuation_icon: arrow-right
  continuation_icon_height: 8.0
  continuation_icon_color: null
  continuation_legend_text: activity continues
  continuation_section_gap: 4.0
  show_axis_legend: true
  legend_axis_text: timeline
  bands:
    - date_range
    - week

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  background_color: none
  grid_color: grey
  grid_opacity: 0.3
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_line_color: null
  timeband_line_width: null
  timeband_line_opacity: null
  timeband_line_dasharray: null
  label_column_ratio: 0.08
  band_row_height: 10.0
  fiscal_year_start_month: 2
  week_start: 0
  show_unmatched_lane: true
  unmatched_lane_name: Other
  lane_match_mode: first
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_label_color: black
  header_label_opacity: 1.0
  header_label_align_h: right
  header_heading_fill_color: none
  band_font: RobotoCondensed-Bold
  band_font_size: null
  timeband_label_color: black
  timeband_label_opacity: 1.0
  timeband_fill_color:
    - deepskyblue
    - gold
    - tomato
    - springgreen
    - lightskyblue
  timeband_fill_palette: accent
  timeband_fill_opacity: 1.0
  lane_heading_fill_color: none
  lane_label_font: RobotoCondensed-Bold
  lane_label_font_size: null
  lane_label_color: black
  lane_label_align_h: right
  lane_label_align_v: middle
  lane_label_rotation: 0
  lane_split_ratio: 0.5
  event_show_date: true
  event_date_font: RobotoCondensed-Light
  event_date_font_size: null
  event_date_color: grey
  event_date_format: M/D
  marker_radius: 2.0
  vertical_line_color: tomato
  vertical_line_width: 1.5
  vertical_line_dasharray: null
  vertical_line_opacity: 0.85
  vertical_line_fill_color: none
  vertical_line_fill_opacity: 0.2
  duration_date_font: RobotoCondensed-Light
  duration_fill_opacity: 0.35
  duration_stroke_color: null
  duration_stroke_width: 1.0
  duration_stroke_opacity: 0.9
  duration_stroke_dasharray: null
  duration_bar_height: 8.0
  duration_icon_visible: true
  name_text:
    font_name: RobotoCondensed-Light
    font_color: navy
  duration_show_start_date: true
  duration_show_end_date: true
  duration_date_format: M/D
  duration_date_color: dimgray
  palette:
    - lightskyblue
    - gold
    - tomato
    - springgreen
    - plum
    - khaki
  swimlanes:
    - name: Engineering
    - name: Operations
  top_bands:
    - band: pi
      row_height: 24
    - band: sprint
      row_height: 18

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  pi:
    unit: interval
    label: PI
    interval_days: 70
    prefix: 'PI '
    start_index: 5
    anchor_date: '20241007'
    show_every: 1
  sprint:
    unit: interval
    label: Sprint
    interval_days: 14
    prefix: 'Sprint '
    start_index: 1
    max_index: 5
    anchor_date: '20241007'
    show_every: 1
  date_range:
    unit: week
    label: Date Range
    label_format: '{start} – {end}'
  week:
    unit: week
    label: Week
    label_format: Week {n}

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:heading
    define: text
    as: heading
    style:
      font: RobotoCondensed-Light
      size: 10
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: RobotoCondensed-Light
      size: 8
      color: navy
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: RobotoCondensed-LightItalic
      size: 7
      color: darkgrey
  - name: define text:label
    define: text
    as: label
    style:
      font: RobotoCondensed-LightItalic
      size: 7
      color: grey
  - name: define text:label_bold
    define: text
    as: label_bold
    style:
      font: RobotoCondensed-Bold
      size: 7
      color: yellow
  - name: define text:caption
    define: text
    as: caption
    style:
      font: RobotoCondensed-Light
      size: 6
      color: grey
  - name: define text:day_number
    define: text
    as: day_number
    style:
      font: RobotoCondensed-Light
      size: 10
      color: white
  - name: define text:month_title
    define: text
    as: month_title
    style:
      font: RobotoCondensed-Bold
      size: 8
      color: navy
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: grey
      fill_opacity: 0.25
      stroke: grey
      stroke_width: 2
      stroke_opacity: 0.25
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:timeband
    define: box
    as: timeband
    style:
      fill: none
      fill_opacity: 1.0
      stroke: none
      fill_palette: accent
      fill_colors:
        - deepskyblue
        - gold
        - tomato
        - springgreen
        - lightskyblue
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: lightblue
      fill_opacity: 0.3
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.25
      stroke: grey
      stroke_width: 1.0
  - name: define line:grid
    define: line
    as: grid
    style:
      color: grey
      width: 0.5
      opacity: 0.3
  - name: define line:axis
    define: line
    as: axis
    style:
      color: lightgrey
      width: 3
      opacity: 0.9
  - name: define line:separator
    define: line
    as: separator
    style:
      color: grey
      width: 0.5
      opacity: 0.5
  - name: define line:today
    define: line
    as: today
    style:
      color: grey
      width: 1.5
      opacity: 1.0
  - name: define line:connector
    define: line
    as: connector
    style:
      color: grey
      width: 0.5
      opacity: 1.0
      dasharray: 4 2
  - name: define icon:event
    define: icon
    as: event
    style:
      color: navy
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: navy
  - name: define icon:overflow
    define: icon
    as: overflow
    style:
      icon: overflow
      color: red
  - name: bind ec-axis-line
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: define line:tick
    define: line
    as: tick
    style:
      color: grey
      width: 0.5
      opacity: 1.0
  - name: bind ec-axis-tick
    apply_to: element
    select:
      element: ec-axis-tick
    style:
      use: line:tick
  - name: bind ec-tick-label
    apply_to: element
    select:
      element: ec-tick-label
    style:
      use: text:caption
  - name: bind ec-today-line
    apply_to: element
    select:
      element: ec-today-line
    style:
      use: line:today
  - name: today label color
    apply_to: text:today_label
    style:
      color: grey
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-day-number -> text:day_number
    apply_to: element
    select:
      element: ec-day-number
    style:
      use: text:day_number
  - name: bind ec-month-title -> text:month_title
    apply_to: element
    select:
      element: ec-month-title
    style:
      use: text:month_title
  - name: bind ec-week-number -> text:label_bold
    apply_to: element
    select:
      element: ec-week-number
    style:
      use: text:label_bold
  - name: bind ec-fiscal-label -> text:caption
    apply_to: element
    select:
      element: ec-fiscal-label
    style:
      use: text:caption
  - name: bind ec-event-name -> text:body
    apply_to: element
