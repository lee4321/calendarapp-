# Theme file to mimic TJX colors and stylings 

theme:
  name: "TJX"
  version: "2.0"
  description: "TJX colors and style — unified theme model"

# ══════════════════════════════════════════════════════════════════════════════
# Unified Style Tokens
# ══════════════════════════════════════════════════════════════════════════════

text_styles:
  heading:
    font: "OfficinaSans-Bold"
    size: 12
    color: "grey"
    size_rules:
      - font_size: 10
        when: { papersize: ["letter", "ledger", "tabloid"] }
      - font_size: 8
        when: { papersize: ["3x5", "5x8"] }
  body:
    font: "OfficinaSans-Book"
    size: 12
    color: "white"
  body_secondary:
    font: "OfficinaSans-BookItalic"
    size: 10
    color: "grey"
  label:
    font: "OfficinaSans-Book"
    size: 10
    color: "grey"
  label_bold:
    font: "OfficinaSans-Bold"
    size: 10
    color: "yellow"
  caption:
    font: "OfficinaSans-Bold"
    size: 10
    color: "grey"
  day_number:
    font: "OfficinaSans-Bold"
    size: 11
    color: "#E5E4E2"
  month_title:
    font: "OfficinaSans-Bold"
    size: 10
    color: "navy"

box_styles:
  default:
    fill: "white"
    fill_opacity: 1.0
    stroke: "none"
  cell:
    fill: "#F8F8FF"
    fill_opacity: 0.25
    stroke: "none"
    stroke_width: 0.1
    stroke_opacity: 0.25
  header:
    fill: "none"
    stroke: "none"
  timeband:
    fill: "none"
    fill_opacity: 1.0
    stroke: "none"
  highlight:
    fill: "lightblue"
    fill_opacity: 0.3
    stroke: "none"
  callout:
    fill: "white"
    fill_opacity: 0.25
    stroke: "grey"
    stroke_width: 1.0

line_styles:
  grid:
    color: "grey"
    width: 0.5
    opacity: 0.3
  axis:
    color: "lightgrey"
    width: 3
    opacity: 0.9
  separator:
    color: "grey"
    width: 0.5
    opacity: 0.5
  today:
    color: "grey"
    width: 1.5
    opacity: 1.0
  connector:
    color: "grey"
    width: 0.5
    opacity: 1.0
    dasharray: "4 2"

icon_styles:
  event:
    color: "yellow"
    size: 10
  duration:
    color: "navy"
  overflow:
    icon: "overflow"
    color: "red"

axis:
  line_style: axis
  tick:
    color: "grey"
    label_style: caption
    date_format: "M/D"
  today:
    line_style: today
    label_color: "grey"
    label_text: "Today"

element_styles:
  # ── Text elements ──
  ec-heading:        { text_style: heading }
  ec-label:          { text_style: label }
  ec-day-number:     { text_style: day_number }
  ec-month-title:    { text_style: month_title }
  ec-week-number:    { text_style: label_bold }
  ec-fiscal-label:   { text_style: caption }
  ec-event-name:     { text_style: body }
  ec-event-notes:    { text_style: body_secondary }
  ec-event-date:     { text_style: caption }
  ec-duration-date:  { text_style: caption }
  ec-holiday-title:  { text_style: body }
  ec-today-label:    { text_style: label, color: "grey" }
  ec-header-text:    { text_style: heading }
  ec-footer-text:    { text_style: caption }
  ec-watermark:      { text_style: heading }

  # ── Box/rectangle elements ──
  ec-background:     { box_style: default }
  ec-cell:           { box_style: cell }
  ec-heading-cell:   { box_style: header }
  ec-band-cell:      { box_style: timeband }
  ec-callout-box:    { box_style: callout }
  ec-vline-fill:     { box_style: highlight }
  ec-day-box:        { box_style: cell }
  ec-pattern-fill:   { box_style: default }

  # ── Line elements ──
  ec-grid-line:      { line_style: grid }
  ec-axis-line:      { line_style: axis }
  ec-axis-tick:      { line_style: axis }
  ec-today-line:     { line_style: today }
  ec-separator:      { line_style: separator }
  ec-connector:      { line_style: connector }
  ec-vline:          { line_style: grid }
  ec-duration-bar:   { line_style: axis }
  ec-hash-line:      { line_style: grid }
  ec-strikethrough:  { line_style: grid }

  # ── Marker elements ──
  ec-milestone-marker: { line_style: axis }
  ec-milestone-flag:   { line_style: axis }
  ec-duration-marker:  { line_style: axis }

  # ── Icon elements ──
  ec-event-icon:     { icon_style: event }
  ec-duration-icon:  { icon_style: duration }
  ec-overflow-icon:  { icon_style: overflow }

  # ── Legend elements ──
  ec-legend-swatch:  { line_style: axis }
  ec-legend-text:    { text_style: body }
  ec-legend-icon:    { icon_style: event }

# ══════════════════════════════════════════════════════════════════════════════
# Legacy Settings (retained for non-styling configuration)
# ══════════════════════════════════════════════════════════════════════════════

# ── General Settings ──────────────────────────────────────────────────────────
base:
  font_family: "AlumniSansPinstripe-Regular"
  font_color: "grey"
  default_missing_icon: applet-closed
  size_rule:
    - font_size: 10
      when:
        papersize: ["letter", "ledger", "tabloid"]
    - font_size: 8
      when:
        papersize: ["3x5", "5x8"]

header:
  font_family: "AlumniSansPinstripe-Regular"
  font_color: "grey"

footer:
  font_family: "AlumniSansPinstripe-Regular"
  font_color: "grey"

events:
  icon_color: "blue"
  # Controls which item types claim the topmost rows in each day box.
  # Ordered list of tokens; first token's type is placed first.
  # Type tokens: milestones | events | durations
  # Special tokens: priority (sort by priority field) | alphabetical (sort by name)
  # Example: [milestones, events, durations]
  item_placement_order: ["priority"]

durations:
  icon_color: "navy"
  stroke_dasharray: null

watermark:
  text: null
  color: "blue"
  font_family: "AlumniSansPinstripe-Regular"
  opacity: 0.5
  font_size: null
  resize_mode: "fit"
  rotation_angle: 45.0
  image_rotation_angle: 45.0

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  # How to number fiscal years relative to the start calendar year:
  #   null (default): auto — blockplan uses +1 for non-Jan starts, 0 for Jan;
  #                   weekly/NRF uses 0 (start year).
  #   0: start year (FY starting Feb 2026 → FY2026)
  #   1: start year + 1 (FY starting Oct 2025 → FY2026, US federal default)
  #  -1: start year − 1
  year_offset: +1

colors:
  month_palette: "viridis"
  fiscal_palette: "Greys"
  group_palette: "Pastel1"
  hash_lines: "black"
  federal_holiday:
    color: "red"
    alpha: 0.25
  company_holiday:
    color: "green"
    alpha: 0.25
  resource_groups:
    a: "black"
    b: "yellow"
    c: "red"
    d: "grey"

  # ── Holiday colors (applied in both weekly and mini renderers) ──────────
  company_holiday:
    alpha: 0.25     # (float 0–1) fill opacity for company non-workday highlight
    color: "gold"   # (str) fill color for company non-workday day boxes
  federal_holiday:
    alpha: 0.10     # (float 0–1) fill opacity for federal holiday highlight
    color: "tomato" # (str) fill color for federal holiday day boxes

# ── Weekly Calendar ───────────────────────────────────────────────────────────
weekly:
  day_names:
    font_family: "InstrumentSerif-Regular"
    font_color: "grey"

  week_numbers:
    font_family: "InstrumentSerif-Regular"
    font_color: "yellow"
    label_format: "W{num:02d}"

  day_box:
    stroke_color: "black"
    stroke_opacity: 0.5
    stroke_width: 2
    stroke_dasharray: null
    
    fill_color: null
    fill_opacity: 0.25
    number_font: "InstrumentSerif-Regular"
    number_color: #FF7800
    icon_color: "red"
    font_color: "black"
    hash_pattern_opacity: 0.10
    hash_rules:
      # Milestones: prominent gold stripes
      - pattern: "diagonal-stripes"
        color: "gold"
        opacity: 0.15
        when:
          milestone: true
      # Federal holidays: red stripes (government red)
      - pattern: "diagonal-stripes"
        color: "tomato"
        opacity: 0.12
        when:
          federal_holiday: true
      # Non-work days: subtle silver stripes
      - pattern: "diagonal-stripes"
        color: "silver"
        opacity: 0.08
        when:
          nonworkday: true
      # Release/cutover events: gold stripes
      - pattern: "diagonal-stripes"
        color: "gold"
        opacity: 0.10
        when:
          event_names: ["Release", "Cutover"]
      # Sprint/freeze durations: steel blue stripes
      - pattern: "diagonal-stripes"
        color: "steelblue"
        opacity: 0.08
        when:
          duration_names: ["Sprint", "Freeze"]
      # Completed tasks: green stripes (any event/duration at 100%)
      - pattern: "diagonal-stripes"
        color: "mediumseagreen"
        opacity: 0.10
        when:
          percent_complete: 100
      # Urgent/blocker notes: orange-red stripes (hot signal)
      - pattern: "diagonal-stripes"
        color: "orangered"
        opacity: 0.12
        when:
          notes: ["urgent", "blocker"]
      # Top-level WBS items: sky blue stripes
      - pattern: "diagonal-stripes"
        color: "lightskyblue"
        opacity: 0.08
        when:
          wbs: ["1."]
      # Specific resource assigned: medium purple stripes
      - pattern: "diagonal-stripes"
        color: "mediumpurple"
        opacity: 0.08
        when:
          resource_names: ["Alice"]
      # Development group days: steel blue stripes (slightly stronger)
      - pattern: "diagonal-stripes"
        color: "steelblue"
        opacity: 0.10
        when:
          resource_group: ["dev"]

      # Try to get weekly to look like blockplan
      - pattern:
        color: "red"
        opacity: 0.5 
        when:
          resource_groups: ["Xstore"]
#     - name: "Triversity\nPOSReady7"
#       match:
#         resource_groups: ["Triversity"]
#     - name: "15.0.2"
#       match:
#         resource_groups: ["15.0.2"]
#     - name: "IC Fix"
#       match:
#         resource_groups: ["ICFix"]
#     - name: "Post PI6"
#       match:
#         resource_groups: ["PostPI6"]

  name_text:
    font_name: "AlumniSansPinstripe-Regular"
    font_color: "blue"
  notes_text:
    font_name: "AlumniSansPinstripe-Italic"
    font_color: "grey"

  overflow:
    icon: "overflow"
    color: "red"

# ── Timeline ──────────────────────────────────────────────────────────────────
timeline:
  background_color: "none"
  axis_color: "lightgrey"
  axis_opacity: 0.9
  axis_width: 3
  tick_color: "grey"
  date_format: "M/D"
  tick_label_format: "M/D"
  today_date: ""
  today_label_text: "Today"
  today_label_offset_y: 10.0
  today_line_color: "grey"
  today_label_color: "grey"
  marker_stroke_color: ""
  marker_stroke_width: 1.0
  marker_radius: 4.0
  icon_size: 8
  callout_offset_y: 30.0
  duration_offset_y: 30
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.25
  duration_bar_fill_opacity: 0.75
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: "4 2"
  duration_bracket_stroke_dasharray: null
  top_colors: ["deepskyblue", "gold", "tomato", "springgreen", "lightskyblue", "ivory", "lightgoldenrod", "lightsalmon", "lime", "mistyrose"]
  bottom_colors: ["midnightblue", "springgreen", "deepskyblue", "gold", "orchid", "orange", "mediumblue", "orangered", "firebrick", "fuchsia"]
  name_text:
    font_name: "ATGraphite-LightNarrow"
    font_color: "deepskyblue"
  notes_text:
    font_name: "ATGraphite-LightNarrow"
    font_color: "deepskyblue"
  date:
    font_family: "ATGraphite-LightNarrow"
    font_color: "deepskyblue"

timeline_events:
  box_height: 24

timeline_durations:
  box_height: 24
  date_font: "ATGraphite-LightNarrow"
  date_font_size: 9
  date_color: "grey"

# ── Block Plan ────────────────────────────────────────────────────────────────
blockplan:
  background_color: "none"
  grid_color: "black"
  grid_opacity: 1.0
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_fill_color: ["iron","ivory","old silver","nickel","honeydew","smoke","bubbles","bondi blue","anti-flash white","roman silver"]
  timeband_fill_opacity: 1.0
  timeband_line_color: "black"     # null → inherits grid_color
  timeband_line_width: 1    # null → inherits grid_line_width
  timeband_line_opacity: 1.0   # null → inherits grid_opacity
  timeband_line_dasharray: null
  label_column_ratio: 0.05
  band_row_height: 25.0    # default row height for all bands; override per-band with row_height
  fiscal_year_start_month: 2
  week_start: 0
  duration_date_font_size: 8
  
  show_unmatched_lane: false
  unmatched_lane_name: "Other"
  lane_match_mode: "first"
  
  header_font: "OfficinaSans-BookItalic"
  header_font_size: 11
  header_label_color: "Green"
  header_label_opacity: 1.0
  header_label_align_h: "right"
  header_heading_fill_color: "none"
  
  band_font: "OfficinaSans-Book"
  band_font_size: 14

  timeband_label_opacity: 1.0

  # Non-workday cell fills (applied to single-day date/dow band cells).
  # Precedence: federal_holiday > company_holiday > weekend.
  federal_holiday_fill_color: "tomato"
  company_holiday_fill_color: "gold"
  weekend_fill_color: "#E8E8E8"

  top_time_bands:
    - label: "Fiscal Quarter"
      unit: "fiscal_quarter"
      label_format: "Q{q}-FY{fy2}"
      fill_color: ["ghostwhite","silver"]
      show_every: 1
      row_height: 14
      label_color: "Black"        # heading column label color
      font_color: "Black"         # segment content label color (e.g. "FY26 Q2")

    - label: "Month"
      unit: "month"
      date_format: "MMMM"
      row_height: 14
      fill_color: ["white smoke","darkgrey"]
      show_every: 1
      label_color: "black"       # heading column label color
      font_color: "black"        # segment content label color (e.g. "March")

#     - label: "DoW"
#       unit: "date"
#       date_format: "ddd"
#       fill_color: ["iron","ivory","old silver","nickel","honeydew","smoke","bubbles","bondi blue","anti-flash white","roman silver"]
#       row_height: 14
#       show_every: 1
#       label_color: "dimgrey"     # heading column label color
#       font_color: "white"      # segment content label color (e.g. "3")
#       excel_font_name: "Avenir Next Condensed"   # font name for this band only
#       excel_font_size: 8                # font size for this band only


    - label: "Day"
      unit: "date"
      date_format: "ddd D"
      fill_color: "white"
      row_height: 14
      show_every: 1
      label_color: "Black"     # heading column label color
      font_color: "Black"      # segment content label color (e.g. "3")


    #Countdown example — one cell per visible day showing days remaining to a target:
    - label:         "Work Days to Freeze"
      unit:          "countdown"         # one segment per visible day, labelled with remaining count
      target_date:   "2019-10-30"        # required: the target date (YYYY-MM-DD)
      skip_weekends: true               # count Mon-Fri only (Sat/Sun not counted)
      skip_nonworkdays: true           # set true to also skip holidays & company non-workdays
      label_format:  "{n}"            # {n} = count; positive = before target, 0 = target day, negative = after
      row_height:    14
      label_color: "Black"     # heading column label color
      font_color: "Black"      # segment content label color (e.g. "3")



  bottom_time_bands: []

  lane_heading_fill_color: "none"
  lane_label_font_size: 14
  lane_label_color: "Red"
  lane_label_align_h: "center"
  lane_label_align_v: "middle"
  lane_label_rotation: -90          # clockwise degrees; 0=horizontal, -90=bottom-to-top, 90=top-to-bottom
  
  
  # Position of the dividing line within each swimlane (0.0–1.0).
  # 0.5 = midpoint; 0.3 = divider at 30% from the top.
  # 0.0 or 1.0 = no dividing line; both events and durations share the full lane height.
  # Use the --noevents / --nodurations CLI flags to suppress a content type entirely.
  # Per-lane override: add split_ratio key to any swimlane definition.
  lane_split_ratio: 0.0
  
# Swimlane definitions govern the number of swimlanes and which events appear
  # in each one.  Each entry supports:
  #   name (str)                    — label shown in the left heading cell
  #   fill_color (str|null)         — heading cell background (overrides lane_heading_fill_color)
  #   label_color (str|null)        — label text color (overrides lane_label_color)
  #   timeline_fill_color (str|null)— content area background tint (default: none)
  #   label_align_h: left|center|right  — per-lane horizontal text alignment
  #   label_align_v: top|middle|bottom  — per-lane vertical text alignment
  #   split_ratio (float)           — per-lane split override (0.0–1.0)
  #   match (dict)                  — event selection criteria:
  #     resource_groups: [str]        match by resource group name (case-insensitive)
  #     groups: [str]                 alias for resource_groups
  #     resource_names_contains: [str] substring match on resource names
  #     task_contains: [str]          substring match on task name
  #     notes_contains: [str]         substring match on notes
  #     wbs_prefixes: [str]           match if WBS starts with any prefix
  #     milestone: true|false         match milestone flag
  #     rollup: true|false            match rollup flag
  #     event_type: event|duration|any  restrict to point events or duration bars
  #     priority: int | [int]         exact priority value(s) to match
  #     priority_min: int             minimum priority (inclusive)
  #     priority_max: int             maximum priority (inclusive)
  swimlanes:
    - name: "Xstore\nConversions"
      match:
        resource_groups: ["Xstore"]
    - name: "Triversity\nPOSReady7"
      match:
        resource_groups: ["Triversity"]
    - name: "15.0.2"
      match:
        resource_groups: ["15.0.2"]
    - name: "IC Fix"
      match:
        resource_groups: ["ICFix"]
    - name: "Post PI6"
      match:
        resource_groups: ["PostPI6"]

  duration_date_font: "OfficinaSans-BookItalic"
  duration_fill_opacity: 1.0
  duration_stroke_color: "white"      # white outline separates solid-colour bars
  duration_stroke_width: 1.0
  duration_stroke_opacity: 1.0
  duration_stroke_dasharray: null
  duration_bar_height: 30
  duration_icon_visible: true
  name_text:
    font_name: "OfficinaSans-Book"
    font_color: "white"
  notes_text:
    font_name: "OfficinaSans-BookItalic"
    font_color: "white"
  duration_show_start_date: true
  duration_show_end_date: true
  duration_date_format: "M/D"
  duration_date_color: "Black"

  event_show_date: false
  event_date_font: "OfficinaSans-BookItalic"
  event_date_font_size: null
  event_date_color: "Black"
  event_date_format: "MM/DD"
  marker_radius: 2.0
  

  # Each entry pins a line (and optional column fill) to a time-band segment.
  #   band:         time band label (case-insensitive)
  #   align:        start | center | end  (default: start)
  #   repeat:       true → apply to every segment in the band; omit value when using repeat
  #   value:        rendered segment label to match (required when repeat is absent/false)
  #   color / width / opacity / dash_array: per-line style overrides
  #   fill_color:   column fill; single color, list of colors, or palette name (cycles per segment)
  #   fill_opacity: fill opacity 0–1 (default: vertical_line_fill_opacity)
  vertical_lines:
    - band: "Month"
      repeat: true
      align: "end"
      color: "grey"
      width: 1.5
      dash_array: "5,5"
      opacity: 0.33
      fill_color: ["#eef4ff", "none"]

    - band: "Fiscal Quarter"
      repeat: true
      align: "end"
      color: "navy"
      width: 1.5
      dash_array: "8,4"
      fill_color: ["green","pink"]

    # Non-workday highlights — pinned to the single-day "Date" band.
    # `match` filters segments by classify_day() classes.
    - band: "Day"
      repeat: true
      align: "center"
      match: {weekend: true}
      color: "#888888"
      width: 0.75
      opacity: 0.05
      dash_array: "2,3"
      fill_color: "#E8E8E8"
      fill_opacity: 0.4

    - band: "Day"
      repeat: true
      align: "center"
      match: {company_holiday: true}
      color: "goldenrod"
      width: 1.0
      opacity: 0.7
      dash_array: "4,2"
      fill_color: "gold"
      fill_opacity: 0.3

    - band: "Day"
      repeat: true
      align: "center"
      match: {federal_holiday: true}
      color: "firebrick"
      width: 1.25
      opacity: 0.8
      dash_array: "6,2"
      fill_color: "tomato"
      fill_opacity: 0.1
 
#     - band: "Date"
#       repeat: true                   
#       align: "end"
#       color: ["grey","white"]
#       width: 1
#       dash_array: ""
#       opacity: 0.33
#       fill_color: ["#eef4ff", "none"] 
  


# ── Mini Calendar ─────────────────────────────────────────────────────────────
mini_calendar:
  cell_font: "JuliaMono-Regular"
  cell_bold_font: "Caveat-Bold"
  cell_font_size: null
  title_font: "Caveat-Bold"
  title_font_size: null
  title_format: "MMMM YYYY"
  title_color: "navy"
  header_font: "JuliaMono-Regular"
  header_font_size: null
  header_color: "grey"
  day_number_glyphs: null
  day_number_digits: null
  day_color: "black"
  adjacent_month_color: "lightgrey"
  show_adjacent: true
  holiday_color: "red"
  nonworkday_fill_color: "lightblue"
  milestone_color: "navy"
  circle_milestones: true
  milestone_stroke_color: "navy"
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: "lightblue"
  week_number_font: "JuliaMono-Regular"
  week_number_font_size: null
  week_number_color: "darkgrey"
  week_number_label_format: "W{num}"
  grid_line_color: "lightgrey"
  grid_line_width: 0.251
  grid_line_opacity: 0.5
  grid_line_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box:
    hash_rules: []
    # hash_rules:
    #   - pattern: "brick-wall"
    #     color: "lightgrey"
    #     when:
    #       milestone: true

mini_details:
  title_text: "Event Details"
  title_font: "RobotoCondensed-Bold"
  title_font_size: null
  title_color: "navy"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_color: "grey"
  name_text:
    font_name: "RobotoCondensed-Light"
    font_color: "black"
  notes_text:
    font_name: "RobotoCondensed-LightItalic"
    font_color: "darkgrey"
  separator_stroke_dasharray: null
  headers:
    - "Start Date"
    - "Name / Description"
    - "Milestone"
    - "Priority"
    - "Group"
  column_widths: [0.16, 0.52, 0.10, 0.10, 0.12]

text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null 
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null 
  holiday_symbols: null 
  nonworkday_symbols: null 
  duration_symbols: null
  duration_fill: null

# ─────────────────────────────────────────────────────────────────────────────
# EXCELHEADER — Excel workbook timeband header generator
# Produces a .xlsx file with blockplan-style timeband rows at the top,
# followed by a column-header row and 100 empty data rows.
# Timeband and vertical_lines configuration is shared with the blockplan section.
# ─────────────────────────────────────────────────────────────────────────────
excelheader:
  font_name: "Calibri"   # (str) System-installed Excel font for all cells
  font_size: 9           # (int) Default font size in points

  # Per-band Excel font overrides — add these keys directly inside any band dict
  # under blockplan.top_time_bands:
  #   excel_font_name: "Arial Narrow"   # font name for this band only
  #   excel_font_size: 8                # font size for this band only


# ─────────────────────────────────────────────────────────────────────────────
# COMPACT_PLAN — Compressed activities / duration-line view
# ─────────────────────────────────────────────────────────────────────────────
compact_plan:
  palette: ["deepskyblue", "gold", "tomato", "grey", "mediumseagreen", "mediumpurple"]
  axis_color: "lightgrey"
  axis_dasharray: "2,6"
  milestone_color: "#333333"
  header_bottom_y: 8   # gap (pts) between the bottom of the header band block and the topmost duration line / milestone
  key_top_y: 8        # gap (pts) between the last duration line / milestone and the top of the key/legend block
  band_row_height: 10.0  # (float) height in points of each header band row

  # ── Text ─────────────────────────────────────────────────────
  text:
    font_name: "RobotoCondensed-Light"
    font_color: "black"
    font_opacity: 1.0


  time_bands:
    - label: "Month"
      unit: "month"
      date_format: "MMM YYYY"
      row_height: 25
      fill_color: ["lightblue","grey"]
      show_every: 1
      label_color: "dimgrey"       # heading column label color
      font_color: "black"        # segment content label color (e.g. "March")

    - label:          "Date Range"
      unit:           "week"
      label_format:   "{start} – {end}"   # {start}/{end} = M/D date strings
      fill_color:     "none"
      alt_fill_color: "#f2f2f2"           # alternating column shading
      text_align:     "center"              # "left" | "center" | "right"

    # - label:          "Week"
    #   unit:           "week"
    #   label_format:   "Week {n}"          # {n} = sequential week from range start
    #   fill_color:     "#f2f2f2"
    #   alt_fill_color: "none"
    #   text_align:     "center"            # center the week label within each column

    - label: "DoW"
      unit: "date"
      date_format: "ddd"
      fill_color: "pink"
      show_every: 1
      label_color: "dimgrey"     # heading column label color
      font_color: "white"      # segment content label color (e.g. "3")
      text_align:     "center" 



  # ── Timeline axis ──────────────────────────────────────────────────────
  axis_color:     "#7f7f7f"    # (str) axis line color
  axis_dasharray: "4.0,1.0"  # (str|null) SVG dash pattern; null = solid line
  axis_opacity:   0.5          # (float 0–1) axis opacity
  axis_padding:   5.0          # (float) gap in points from axis to nearest duration row
  axis_width:     1.0         # (float) axis line width in points
  show_axis: true 

  # ── Duration lines ─────────────────────────────────────────────────────
  # Lines are placed using greedy row assignment: row 0 = just above axis,
  # row 1 = just below, row 2 = further above, row 3 = further below, etc.
  # Non-overlapping durations share rows; overlapping ones get separate rows.
  duration_line_width:       5.0   # (float) line thickness in points
  duration_opacity:          1.0   # (float 0–1) line opacity
  duration_stroke_dasharray: null  # (str|null) dash pattern; null = solid
  lane_spacing:              6.0   # (float) vertical distance between stacked rows

  # ── Duration start icons ───────────────────────────────────────────────
  # An icon from the specified list is drawn at the start (left) end of each
  # duration line, with a unique icon assigned per activity by sorted index.
  # The same icon appears beside the activity name in the legend.
  # Available icon lists: darksquare, squares, darkcircles, circles, squircles, darksquircles
  show_duration_icons:   true           # (bool) draw icons on lines and in legend
  duration_icon_list:    "darksquare"   # (str) icon list name from config.ICON_SETS
  duration_icon_height:  5.0            # (float) icon display height in pts
  duration_icon_color:   "black"           # (str|null) icon color; null = use line color

  # ── Duration color palette (cycled by resource group) ─────────────────
  # palette cycles through groups in sorted order; palette_name fetches from DB.
  # Individual event Color (from DB) overrides the group palette color.
  palette:      null  # (list[str]|null) explicit color list; null = built-in defaults
  palette_name: null  # (str|null) DB palette name; overrides palette list if set

  # ── Milestone markers ──────────────────────────────────────────────────
  # Priority for milestone appearance: event.icon > milestone_icon > built-in flag shape
  milestone_color:       "black"  # (str) marker color when event has no Color field
  milestone_flag_height: 9.0      # (float) stem height above axis in points
  milestone_flag_width:  7.0      # (float) pennant width in points
  milestone_icon:        null     # (str|null) icon name from fonticon table;
                                  #   null = draw built-in flag shape
  show_milestone_labels: false     # (bool) render task name beside milestone marker

  # ── Milestone label text ───────────────────────────────────────────────
  name_text:
    font_name: "RobotoCondensed-Light"
    font_color: "#595959"
    font_opacity: 1.0

  # ── Two-column legend/roster layout ────────────────────────────────────
  # Left column: resource group swatches with wrapped duration names.
  # Right column: date-sorted milestone roster.
  legend_column_split:  0.5       # (float 0–1) fraction of total width for left/legend column

  # ── Legend (left column) ───────────────────────────────────────────────
  # One row per resource group: colored swatch + group name + duration names
  # (wrapped to fit the column width).
  # Set show_legend: false to suppress the entire left column.
  show_legend:          true      # (bool) render the legend left column
  legend_row_height:    10.0      # (float) height per legend row in points
  legend_swatch_width:  10.0      # (float) width of the colored swatch line in points

  # ── Milestone roster (right column) ────────────────────────────────────
  # Date-sorted list of every milestone: date column + task name column.
  show_milestone_list:           true
  milestone_list_date_format:    "M/D"
  milestone_list_date_color:     "#333333"
  milestone_list_row_height:     10.0
  milestone_list_date_col_width: 32.0
  milestone_list_section_gap:    6.0

  # ── Continuation icon ───────────────────────────────────────────────────
  show_continuation_icon:      true
  continuation_icon:           "move-right"
  continuation_icon_height:    8.0
  continuation_icon_color:     "black"           # null = use the line color
  continuation_legend_text:    "activity continues"
  continuation_section_gap:    4.0
