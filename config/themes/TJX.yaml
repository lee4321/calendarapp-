# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJX
  version: '2.0'
  description: TJX colors and style — unified theme model

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: PlaywriteDEGrund-VariableFont_wght
  default_missing_icon: applet-closed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: blue
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: navy
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: blue
  font_family: PlaywriteDEGrund-VariableFont_wght
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: blues
  fiscal_palette: colorblind1
  group_palette: coraltealblue
  hash_lines: black
  federal_holiday:
    alpha: 0.1
    color: tomato
  company_holiday:
    alpha: 0.25
    color: gold
  resource_groups:
    a: black
    b: yellow
    c: red
    d: grey

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  day_names:
    font_family: PlaywriteDEGrund-VariableFont_wght
    font_color: black
  week_numbers:
    font_family: PlaywriteDEGrund-VariableFont_wght
    font_color: yellow
    label_format: W{num:02d}
  day_box:
    stroke_color: black
    stroke_opacity: 0.5
    stroke_width: 1
    stroke_dasharray: null
    fill_color: null
    fill_opacity: 0.25
    number_font: PlaywriteDEGrund-VariableFont_wght
    number_color: null
    icon_color: red
    font_color: black
    hash_pattern_opacity: 0.1
  name_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: black
    font_size: 18
  notes_text:
    font_name: AlumniSansPinstripe-Italic
    font_color: grey
    font_size: 14
  overflow:
    icon: warningtriangle
    color: red

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  cell_font: JuliaMono-Regular
  cell_bold_font: Caveat-Bold
  cell_font_size: 48
  title_font: Caveat-Bold
  title_font_size: 18
  title_format: MMMM YYYY
  title_color: navy
  header_font: JuliaMono-Regular
  header_font_size: 12
  header_color: grey
  day_number_glyphs: null
  day_number_digits: null
  day_color: black
  adjacent_month_color: lightgrey
  show_adjacent: false
  holiday_color: red
  nonworkday_fill_color: blood
  milestone_color: navy
  circle_milestones: false
  milestone_stroke_color: navy
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: black
  week_number_font: JuliaMono-Regular
  week_number_font_size: 12
  week_number_color: Blue
  week_number_label_format: W{num}
  grid_lines: true
  grid_line_color: grey
  grid_line_width: 0.4
  grid_line_opacity: 0.7
  grid_line_dasharray: 1,2
  month_outline_color: navy
  month_outline_width: 0.75
  month_outline_opacity: 0.6
  month_outline_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box: null

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  title_text: Event Details
  title_font: RobotoCondensed-Bold
  title_font_size: null
  title_color: navy
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_color: grey
  name_text:
    font_name: RobotoCondensed-Light
    font_color: black
  notes_text:
    font_name: RobotoCondensed-LightItalic
    font_color: darkgrey
  separator_stroke_dasharray: null
  headers:
    - Start Date
    - Name / Description
    - Milestone
    - Priority
    - Group
  column_widths:
    - 0.16
    - 0.52
    - 0.1
    - 0.1
    - 0.12

# ─── text_mini ─────────────────────────────────────────────────────────────
# text-mini glyph-set declarations; not an SVG renderer.
text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null
  holiday_symbols: null
  nonworkday_symbols: null
  duration_symbols: null
  duration_fill: null

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  background_color: none
  axis_color: lightgrey
  axis_opacity: 0.9
  axis_width: 3
  tick_color: grey
  date_format: M/D
  tick_label_format: M/D
  today_date: ''
  today_label_text: Today
  today_label_offset_y: 10.0
  today_line_color: grey
  today_label_color: grey
  marker_stroke_color: ''
  marker_stroke_width: 1.0
  marker_radius: 4.0
  icon_size: 14
  callout_offset_y: 20.0
  event_axis_padding: 24.0
  duration_offset_y: 20.0
  duration_lane_gap_y: 20.0
  duration_icon_visible: true
  label_stroke_width: 1.0
  label_fill_opacity: 0.25
  duration_bar_fill_opacity: 0.75
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: 4 2
  duration_bracket_stroke_dasharray: null
  top_colors:
    - deepskyblue
    - gold
    - tomato
    - springgreen
    - lightskyblue
    - ivory
    - lightgoldenrod
    - lightsalmon
    - lime
    - mistyrose
  bottom_colors:
    - midnightblue
    - springgreen
    - deepskyblue
    - gold
    - orchid
    - orange
    - mediumblue
    - orangered
    - firebrick
    - fuchsia
  name_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: white
    font_size: 18
  notes_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
    font_size: 14
  date:
    font_family: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
  ticks:
    - unit: month
      label_format: MMM D
      show_labels: true
      label_color: black
      label_font_size: 11
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 8.0
      label_gap: 18.0
    - unit: Date
      show_labels: true
      label_format: D
      label_color: black
      label_font_size: 6
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 4.0
      include_endpoints: false
      max_label_count: 400
      label_gap: 10.0
    - unit: Date
      show_labels: true
      label_format: dd
      label_color: black
      label_font_size: 6
      tick_width: 0.5
      tick_opacity: 0.5
      tick_length: 2.0
      include_endpoints: false
      max_label_count: 400
      label_gap: 4.0
  show_continuation_icon: true
  continuation_icon_right: move-right
  continuation_icon_left: move-left
  continuation_icon_height: 14.0
  continuation_icon_color: white

# ─── timeline_events ───────────────────────────────────────────────────────
# Timeline event geometry (box width/height).
timeline_events:
  box_height: 24

# ─── timeline_durations ────────────────────────────────────────────────────
# Timeline duration geometry (box width/height, lane gap).
timeline_durations:
  box_height: 50
  date_font: PlaywriteDEGrund-VariableFont_wght
  date_font_size: 10
  date_color: black

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  palette: null
  axis_color: '#7f7f7f'
  axis_dasharray: 4.0,1.0
  milestone_color: black
  header_bottom_y: 8
  key_top_y: 8
  band_row_height: 10.0
  federal_holiday_fill_color: tomato
  federal_holiday_fill_opacity: 1.0
  company_holiday_fill_color: gold
  company_holiday_fill_opacity: 1.0
  weekend_fill_color: '#E8E8E8'
  weekend_fill_opacity: 1.0
  federal_holiday_icon: flag-us
  text:
    font_name: RobotoCondensed-Light
    font_color: black
    font_opacity: 1.0
  axis_opacity: 0.5
  axis_padding: 5.0
  axis_width: 1.0
  show_axis: false
  duration_line_width: 9.0
  duration_opacity: 1.0
  duration_stroke_dasharray: null
  lane_spacing: 9.0
  show_duration_icons: true
  duration_icon_list: darksquare
  duration_icon_height: 8.0
  duration_icon_color: white
  palette_name: null
  milestone_flag_height: 9.0
  milestone_flag_width: 7.0
  milestone_icon: null
  show_milestone_labels: false
  name_text:
    font_name: RobotoCondensed-Light
    font_color: '#595959'
    font_opacity: 1.0
  legend_column_split: 0.5
  show_legend: true
  legend_row_height: 10.0
  legend_swatch_width: 10.0
  show_milestone_list: true
  milestone_list_date_format: M/D
  milestone_list_date_color: '#333333'
  milestone_list_row_height: 10.0
  milestone_list_date_col_width: 32.0
  milestone_list_section_gap: 6.0
  show_continuation_icon: true
  continuation_icon: move-right
  continuation_icon_height: 8.0
  continuation_icon_color: white
  continuation_legend_text: activity continues
  continuation_section_gap: 4.0
  bands:
    - band: month_2
      row_height: 25
    - date_range
    - dow_2

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  background_color: none
  grid_color: black
  grid_opacity: 1.0
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_fill_color:
    - iron
    - ivory
    - old silver
    - nickel
    - honeydew
    - smoke
    - bubbles
    - bondi blue
    - anti-flash white
    - roman silver
  timeband_fill_opacity: 1.0
  timeband_line_color: black
  timeband_line_width: 0.75
  timeband_line_opacity: 1.0
  timeband_line_dasharray: null
  label_column_ratio: 0.05
  band_row_height: 40.0
  fiscal_year_start_month: 2
  week_start: 0
  duration_date_font_size: 8
  federal_holiday_icon: flag-us
  federal_holiday_fill_color: tomato
  federal_holiday_fill_opacity: 1.0
  show_unmatched_lane: false
  unmatched_lane_name: Other
  lane_match_mode: first
  header_font: PlaywriteDEGrund-VariableFont_wght
  header_font_size: 11
  header_label_color: Green
  header_label_opacity: 1.0
  header_label_align_h: right
  header_heading_fill_color: none
  band_font: PlaywriteDEGrund-VariableFont_wght
  band_font_size: 14
  timeband_label_opacity: 1.0
  company_holiday_fill_color: gold
  weekend_fill_color: '#E8E8E8'
  lane_heading_fill_color: none
  lane_label_font_size: 14
  lane_label_color: Red
  lane_label_align_h: center
  lane_label_align_v: middle
  lane_label_rotation: -90
  lane_split_ratio: 0.0
  swimlanes:
    - name: 'Xstore

        Conversions'
    - name: 'Triversity

        POSReady7'
    - name: 15.0.2
    - name: IC Fix
    - name: Post PI6
  duration_date_font: PlaywriteDEGrund-VariableFont_wght
  duration_fill_opacity: 1.0
  duration_stroke_color: white
  duration_stroke_width: 1.0
  duration_stroke_opacity: 1.0
  duration_stroke_dasharray: null
  duration_bar_height: 40
  duration_icon_visible: true
  show_continuation_icon: true
  continuation_icon_right: move-right
  continuation_icon_left: move-left
  continuation_icon_height: 12.0
  continuation_icon_color: white
  name_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
  notes_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
  duration_show_start_date: true
  duration_show_end_date: true
  duration_date_format: M/D
  duration_date_color: Black
  event_show_date: false
  event_date_font: PlaywriteDEGrund-VariableFont_wght
  event_date_font_size: null
  event_date_color: Black
  event_date_format: MM/DD
  marker_radius: 2.0
  top_bands:
    - band: fiscal_quarter
      row_height: 14
    - band: month
      row_height: 14
    - band: date
      row_height: 14
    - band: dow
      row_height: 14
  bottom_bands:
    - band: dow
      row_height: 14
    - band: date
      row_height: 14
    - band: month
      row_height: 14

# ─── excelheader ───────────────────────────────────────────────────────────
# XLSX-only config: band-row geometry, system-font names per band
# (deliberate exception, not style_rules), and Excel cell-border
# vertical lines.
excelheader:
  font_name: Calibri
  font_size: 9

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  fiscal_quarter:
    unit: fiscal_quarter
    label: Fiscal Quarter
    label_format: Q{q}-FY{fy2}
    show_every: 1
  month:
    unit: month
    label: Month
    date_format: MMMM
    show_every: 1
  date:
    unit: date
    label: Date
    date_format: D
    show_every: 1
  dow:
    unit: date
    label: DoW
    date_format: dd
    show_every: 1
  month_2:
    unit: month
    label: Month
    date_format: MMM YYYY
    show_every: 1
  date_range:
    unit: week
    label: Date Range
    label_format: '{start} – {end}'
  dow_2:
    unit: date
    label: DoW
    date_format: ddd
    show_every: 1

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 14
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 12
  - name: define text:heading
    define: text
    as: heading
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 14
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: black
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:label
    define: text
    as: label
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:label_bold
    define: text
    as: label_bold
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: Blue
  - name: define text:caption
    define: text
    as: caption
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: black
  - name: define text:day_number
    define: text
    as: day_number
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: white
  - name: define text:month_title
    define: text
    as: month_title
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: navy
  - name: define text:holiday_title
    define: text
    as: holiday_title
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: black
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: '#F8F8FF'
      fill_opacity: 0.25
      stroke: none
      stroke_width: 0.5
      stroke_opacity: 0.5
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:timeband
    define: box
    as: timeband
    style:
      fill: none
      fill_opacity: 1.0
      stroke: none
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: lightblue
      fill_opacity: 0.3
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.25
      stroke: grey
      stroke_width: 1.0
  - name: define line:grid
    define: line
    as: grid
    style:
      color: grey
      width: 0.5
      opacity: 0.3
  - name: define line:mini_grid
    define: line
    as: mini_grid
    style:
      color: grey
      width: 0.4
      opacity: 0.7
      dasharray: 1,2
  - name: define line:axis
    define: line
    as: axis
    style:
      color: lightgrey
      width: 3
      opacity: 0.9
  - name: define line:separator
    define: line
    as: separator
    style:
      color: grey
      width: 0.5
      opacity: 0.5
  - name: define line:today
    define: line
    as: today
    style:
      color: grey
      width: 1.5
      opacity: 1.0
  - name: define line:connector
    define: line
    as: connector
    style:
      color: grey
      width: 0.5
      opacity: 1.0
      dasharray: 4 2
  - name: define icon:event
    define: icon
    as: event
    style:
      color: yellow
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: navy
  - name: define icon:overflow
    define: icon
    as: overflow
    style:
      icon: overflow
      color: red
  - name: bind ec-axis-line
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: define line:tick
    define: line
    as: tick
    style:
      color: grey
      width: 0.5
      opacity: 1.0
  - name: bind ec-axis-tick
    apply_to: element
    select:
      element: ec-axis-tick
    style:
      use: line:tick
  - name: bind ec-tick-label
    apply_to: element
    select:
      element: ec-tick-label
    style:
      use: text:caption
  - name: bind ec-today-line
    apply_to: element
    select:
      element: ec-today-line
    style:
      use: line:today
  - name: today label color
    apply_to: text:today_label
    style:
      color: grey
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-day-number -> text:day_number
    apply_to: element
    select:
      element: ec-day-number
    style:
      use: text:day_number
  - name: bind ec-month-title -> text:month_title
    apply_to: element
    select:
      element: ec-month-title
    style:
      use: text:month_title
  - name: bind ec-week-number -> text:label_bold
    apply_to: element
    select:
      element: ec-week-number
    style:
      use: text:label_bold
  - name: bind ec-fiscal-label -> text:caption
    apply_to: element
    select:
      element: ec-fiscal-label
    style:
      use: text:caption
  - name: bind ec-event-name -> text:body
    apply_to: element
    select:
      element: ec-event-name
    style:
      use: text:body
  - name: bind ec-event-notes -> text:body_secondary
    apply_to: element
    select:
      element: ec-event-notes
    style:
      use: text:body_secondary
  - name: bind ec-event-date -> text:caption
    apply_to: element
    select:
      element: ec-event-date
    style:
      use: text:caption
  - name: bind ec-duration-date -> text:caption
    apply_to: element
    select:
      element: ec-duration-date
    style:
      use: text:caption
  - name: bind ec-holiday-title -> text:holiday_title
    apply_to: element
    select:
      element: ec-holiday-title
    style:
      use: text:holiday_title
  - name: bind ec-today-label -> text:label
    apply_to: element
    select:
      element: ec-today-label
    style:
      use: text:label
      color: grey
  - name: bind ec-header-text -> text:heading
    apply_to: element
    select:
      element: ec-header-text
    style:
      use: text:heading
  - name: bind ec-footer-text -> text:caption
    apply_to: element
    select:
      element: ec-footer-text
    style:
      use: text:caption
  - name: bind ec-watermark -> text:heading
    apply_to: element
    select:
      element: ec-watermark
    style:
      use: text:heading
  - name: bind ec-background -> box:default
    apply_to: element
    select:
      element: ec-background
