# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: Minimal
  version: '2.0'
  description: Minimal theme — fewest settings possible

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: define text:heading
    define: text
    as: heading
    style:
      font: Roboto-Bold
      color: '#222222'
  - name: define text:body
    define: text
    as: body
    style:
      font: RobotoCondensed-Light
      color: navy
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: RobotoCondensed-LightItalic
      color: '#888888'
  - name: define text:label
    define: text
    as: label
    style:
      font: RobotoCondensed-Light
      color: '#555555'
  - name: define text:caption
    define: text
    as: caption
    style:
      font: RobotoCondensed-Light
      size: 6
      color: '#999999'
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: '#F5F5F5'
      stroke: '#CCCCCC'
      stroke_width: 0.5
  - name: define line:grid
    define: line
    as: grid
    style:
      color: '#DDDDDD'
      width: 0.5
  - name: define line:axis
    define: line
    as: axis
    style:
      color: '#888888'
      width: 1.0
  - name: define line:today
    define: line
    as: today
    style:
      color: red
      width: 1.5
  - name: define icon:event
    define: icon
    as: event
    style:
      color: '#333333'
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-day-number -> text:label
