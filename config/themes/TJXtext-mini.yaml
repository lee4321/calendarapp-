# TJX theme — text-mini visualization only.
# Self-contained: every value the text-mini renderer needs is set here so the
# visualization output never depends on hardcoded fallbacks in config.py.
# text-mini emits plain text (not SVG) so font/colour tokens are not required.

theme:
  name: "TJXtext-mini"
  version: "2.0"
  description: "TJX style — text-mini calendar only"

# Fiscal label settings (text-mini honours fiscal_show_period_labels).
fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  year_offset: +1

# ══════════════════════════════════════════════════════════════════════════════
# Text Mini Calendar
