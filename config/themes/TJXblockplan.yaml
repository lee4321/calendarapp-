# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJXblockplan
  version: '2.0'
  description: TJX colors and style — blockplan only

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: PlaywriteDEGrund-VariableFont_wght
  default_missing_icon: applet-closed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: blue
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: navy
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: blue
  font_family: PlaywriteDEGrund-VariableFont_wght
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: bmh
  fiscal_palette: Greys
  group_palette: Pastel1
  hash_lines: black
  resource_groups:
    a: black
    b: yellow
    c: red
    d: grey
  company_holiday:
    alpha: 0.25
    color: gold
  federal_holiday:
    alpha: 0.1
    color: tomato

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  background_color: none
  grid_color: black
  grid_opacity: 1.0
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_fill_color:
    - iron
    - ivory
    - old silver
    - nickel
    - honeydew
    - smoke
    - bubbles
    - bondi blue
    - anti-flash white
    - roman silver
  timeband_fill_opacity: 1.0
  timeband_line_color: black
  timeband_line_width: 0.75
  timeband_line_opacity: 1.0
  timeband_line_dasharray: null
  label_column_ratio: 0.05
  band_row_height: 40.0
  fiscal_year_start_month: 2
  week_start: 0
  duration_date_font_size: 8
  federal_holiday_icon: flag-us
  federal_holiday_fill_color: tomato
  federal_holiday_fill_opacity: 1.0
  company_holiday_fill_color: gold
  weekend_fill_color: '#E8E8E8'
  show_unmatched_lane: false
  unmatched_lane_name: Other
  lane_match_mode: first
  header_font: PlaywriteDEGrund-VariableFont_wght
  header_font_size: 11
  header_label_color: Green
  header_label_opacity: 1.0
  header_label_align_h: right
  header_heading_fill_color: none
  band_font: PlaywriteDEGrund-VariableFont_wght
  band_font_size: 14
  timeband_label_opacity: 1.0
  lane_heading_fill_color: none
  lane_label_font_size: 14
  lane_label_color: Red
  lane_label_align_h: center
  lane_label_align_v: middle
  lane_label_rotation: -90
  lane_split_ratio: 0.0
  swimlanes:
    - name: 'Xstore

        Conversions'
    - name: 'Triversity

        POSReady7'
    - name: 15.0.2
    - name: IC Fix
    - name: Post PI6
  duration_date_font: PlaywriteDEGrund-VariableFont_wght
  duration_fill_opacity: 1.0
  duration_stroke_color: white
  duration_stroke_width: 1.0
  duration_stroke_opacity: 1.0
  duration_stroke_dasharray: null
  duration_bar_height: 40
  duration_icon_visible: true
  show_continuation_icon: true
  continuation_icon_right: move-right
  continuation_icon_left: move-left
  continuation_icon_height: 12.0
  continuation_icon_color: white
  name_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
  notes_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: grey
  duration_show_start_date: true
  duration_show_end_date: true
  duration_date_format: M/D
  duration_date_color: white
  event_show_date: false
  event_date_font: PlaywriteDEGrund-VariableFont_wght
  event_date_font_size: null
  event_date_color: Black
  event_date_format: MM/DD
  marker_radius: 2.0
  top_bands:
    - band: fiscal_quarter
      row_height: 14
    - band: month
      row_height: 14
    - band: date
      row_height: 14
    - band: dow
      row_height: 14
  bottom_bands:
    - band: dow
      row_height: 14
    - band: date
      row_height: 14
    - band: month
      row_height: 14

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  fiscal_quarter:
    unit: fiscal_quarter
    label: Fiscal Quarter
    label_format: Q{q}-FY{fy2}
    show_every: 1
  month:
    unit: month
    label: Month
    date_format: MMMM
    show_every: 1
  date:
    unit: date
    label: Date
    date_format: D
    show_every: 1
  dow:
    unit: date
    label: DoW
    date_format: dd
    show_every: 1

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 14
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 12
  - name: define text:heading
    define: text
    as: heading
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 14
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: white
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:label
    define: text
    as: label
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:caption
    define: text
    as: caption
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: black
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:timeband
    define: box
    as: timeband
    style:
      fill: none
      fill_opacity: 1.0
      stroke: none
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: lightblue
      fill_opacity: 0.3
      stroke: none
  - name: define line:grid
    define: line
    as: grid
    style:
      color: grey
      width: 0.5
      opacity: 0.3
  - name: define line:axis
    define: line
    as: axis
    style:
      color: lightgrey
      width: 3
      opacity: 0.9
  - name: define line:separator
    define: line
    as: separator
    style:
      color: grey
      width: 0.5
      opacity: 0.5
  - name: define icon:event
    define: icon
    as: event
    style:
      color: yellow
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: navy
  - name: define icon:milestone
    define: icon
    as: milestone
    style:
      icon: flag
      color: gold
      size: 16
  - name: define icon:overflow
    define: icon
    as: overflow
    style:
      icon: overflow
      color: red
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-event-name -> text:body
    apply_to: element
    select:
      element: ec-event-name
    style:
      use: text:body
  - name: bind ec-event-notes -> text:body_secondary
    apply_to: element
    select:
      element: ec-event-notes
    style:
      use: text:body_secondary
  - name: bind ec-event-date -> text:caption
    apply_to: element
    select:
      element: ec-event-date
    style:
      use: text:caption
  - name: bind ec-duration-date -> text:caption
    apply_to: element
    select:
      element: ec-duration-date
    style:
      use: text:caption
  - name: bind ec-header-text -> text:heading
    apply_to: element
    select:
      element: ec-header-text
    style:
      use: text:heading
  - name: bind ec-footer-text -> text:caption
    apply_to: element
    select:
      element: ec-footer-text
    style:
      use: text:caption
  - name: bind ec-watermark -> text:heading
    apply_to: element
    select:
      element: ec-watermark
    style:
      use: text:heading
  - name: bind ec-background -> box:default
    apply_to: element
    select:
      element: ec-background
    style:
      use: box:default
  - name: bind ec-heading-cell -> box:header
    apply_to: element
    select:
      element: ec-heading-cell
    style:
      use: box:header
  - name: bind ec-band-cell -> box:timeband
    apply_to: element
    select:
      element: ec-band-cell
    style:
      use: box:timeband
  - name: bind ec-vline-fill -> box:highlight
    apply_to: element
    select:
      element: ec-vline-fill
    style:
      use: box:highlight
  - name: bind ec-grid-line -> line:grid
    apply_to: element
    select:
      element: ec-grid-line
    style:
      use: line:grid
  - name: bind ec-axis-line -> line:axis
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: bind ec-separator -> line:separator
    apply_to: element
    select:
      element: ec-separator
    style:
      use: line:separator
  - name: bind ec-vline -> line:grid
    apply_to: element
    select:
      element: ec-vline
    style:
      use: line:grid
  - name: bind ec-duration-bar -> line:axis
    apply_to: element
    select:
      element: ec-duration-bar
    style:
      use: line:axis
  - name: bind ec-milestone-marker -> icon:milestone
    apply_to: element
    select:
      element: ec-milestone-marker
    style:
      use: icon:milestone
  - name: bind ec-milestone-flag -> icon:milestone
    apply_to: element
    select:
      element: ec-milestone-flag
    style:
      use: icon:milestone
      icon: flag
  - name: bind ec-duration-marker -> line:axis
    apply_to: element
    select:
      element: ec-duration-marker
    style:
      use: line:axis
  - name: bind ec-event-icon -> icon:event
    apply_to: element
    select:
      element: ec-event-icon
    style:
      use: icon:event
  - name: bind ec-duration-icon -> icon:duration
    apply_to: element
    select:
      element: ec-duration-icon
    style:
      use: icon:duration
  - name: bind ec-overflow-icon -> icon:overflow
    apply_to: element
    select:
      element: ec-overflow-icon
    style:
      use: icon:overflow
  - name: bind ec-legend-swatch -> line:axis
    apply_to: element
    select:
      element: ec-legend-swatch
    style:
      use: line:axis
  - name: bind ec-legend-text -> text:body_secondary
    apply_to: element
    select:
      element: ec-legend-text
    style:
      use: text:body_secondary
  - name: bind ec-legend-icon -> icon:event
    apply_to: element
    select:
      element: ec-legend-icon
    style:
      use: icon:event
  - name: band fiscal_quarter — segment
    apply_to: box:band
    select:
      band: fiscal_quarter
    style:
      fill:
        - ghostwhite
        - silver
  - name: band fiscal_quarter — label
    apply_to: text:band_label
    select:
      band: fiscal_quarter
    style:
      color: Black
  - name: band month — segment
    apply_to: box:band
    select:
      band: month
    style:
      fill:
        - white smoke
        - darkgrey
  - name: band month — label
    apply_to: text:band_label
    select:
      band: month
    style:
      color: black
  - name: band date — segment
    apply_to: box:band
    select:
      band: date
    style:
      fill: white
  - name: band date — label
    apply_to: text:band_label
    select:
      band: date
    style:
      color: Black
  - name: band dow — segment
    apply_to: box:band
    select:
      band: dow
    style:
      fill: white
  - name: band dow — label
    apply_to: text:band_label
    select:
      band: dow
    style:
      color: Black
  - name: Marshalls durations (name)
    select:
      task_name:
        - Marshalls
      event_type: duration
    apply_to: box:duration
    style:
      fill: red
  - name: Marshalls durations (notes)
    select:
      notes:
        - Marshalls
      event_type: duration
    apply_to: box:duration
    style:
      fill: red
  - name: Maxx durations
    select:
      task_name:
        - Maxx
      event_type: duration
    apply_to: box:duration
    style:
      fill: blue
  - name: Canada durations
    select:
      task_name:
        - Canada
      event_type: duration
    apply_to: box:duration
    style:
      fill: black
  - name: blockplan_vline_0
    apply_to: box:vline
    select:
      band: Month
      repeat: true
    style:
      align: end
      stroke: grey
      stroke_width: 0.0
      stroke_opacity: 0.33
      fill:
        - '#eef4ff'
        - white
  - name: blockplan_vline_1
    apply_to: box:vline
    select:
      band: Fiscal Quarter
      repeat: true
    style:
      align: end
      stroke: navy
      stroke_width: 0.0
      fill:
        - green
        - pink
  - name: blockplan_vline_2
    apply_to: box:vline
    select:
      band: Date
      repeat: true
      weekend: true
    style:
      align: center
      stroke: '#888888'
      stroke_width: 0.0
      stroke_opacity: 0.05
      dasharray: 2,3
      fill: '#E8E8E8'
      fill_opacity: 0.4
  - name: blockplan_vline_3
    apply_to: box:vline
    select:
      band: Date
      repeat: true
      company_holiday: true
    style:
      align: center
      stroke: goldenrod
      stroke_width: 0.0
      stroke_opacity: 0.07
      dasharray: 4,2
      fill: gold
      fill_opacity: 0.3
  - name: blockplan_vline_4
    apply_to: box:vline
    select:
      band: Date
      repeat: true
      federal_holiday: true
    style:
      align: center
      stroke: firebrick
      stroke_width: 0.0
      stroke_opacity: 0.25
      fill: tomato
      fill_opacity: 0.5
  - name: Route Xstore
    apply_to: lane
    select:
      resource_group:
        - Xstore
    style:
      swimlane: 'Xstore

        Conversions'
  - name: Route Triversity
    apply_to: lane
    select:
      resource_group:
        - Triversity
    style:
      swimlane: 'Triversity

        POSReady7'
  - name: Route 15.0.2
    apply_to: lane
    select:
      resource_group:
        - 15.0.2
    style:
      swimlane: 15.0.2
  - name: Route IC Fix
    apply_to: lane
    select:
      resource_group:
        - ICFix
    style:
      swimlane: IC Fix
  - name: Route Post PI6
    apply_to: lane
    select:
      resource_group:
        - PostPI6
    style:
      swimlane: Post PI6

