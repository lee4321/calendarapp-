# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: Accent
  version: '2.0'
  description: Palette-driven theme with all colors from the Accent DB palette — unified theme model

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: RobotoCondensed-Regular
  default_missing_icon: star-dashed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: Roboto-Bold
  font_color: palette:Accent:4
  left:
    font_color: palette:Accent:4
  center:
    font_color: palette:Accent:4
  right:
    font_family: Roboto-BoldItalic
    font_color: palette:Accent:4

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: RobotoCondensed-Light
  font_color: palette:Accent:7
  left:
    font_color: palette:Accent:4
  center:
    font_color: palette:Accent:4
  right:
    font_family: Roboto-BoldItalic
    font_color: palette:Accent:4

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: palette:Accent:4
  item_placement_order:
    - milestones
    - events
    - durations

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: palette:Accent:4
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: palette:Accent:1
  font_family: Roboto-Bold
  opacity: 0.15
  font_size: null
  resize_mode: fit
  rotation_angle: 0.0
  image_rotation_angle: 0.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: null

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: PuBuGn
  fiscal_palette: Accent
  group_palette: PuBuGn
  hash_lines: palette:Accent:7
  federal_holiday:
    color: palette:Accent:5
    alpha: 0.25
  company_holiday:
    color: palette:Accent:0
    alpha: 0.25
  resource_groups:
    a: palette:Accent:4
    b: palette:Accent:0
    c: palette:Accent:1
    d: palette:Accent:7

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  day_names:
    font_family: RobotoCondensed-Bold
    font_color: palette:Accent:4
  week_numbers:
    font_family: RobotoCondensed-Bold
    font_color: palette:Accent:7
    label_format: W{num:02d}
  day_box:
    stroke_color: palette:Accent:7
    stroke_opacity: 0.2
    stroke_width: 2
    stroke_dasharray: null
    fill_color: palette:Accent:0
    fill_opacity: 0.15
    number_font: Roboto-Bold
    number_color: palette:Accent:4
    icon_color: palette:Accent:4
    font_color: palette:Accent:7
    hash_pattern_opacity: 0.2
  name_text:
    font_name: RobotoCondensed-Regular
    font_color: palette:Accent:7
  notes_text:
    font_name: RobotoCondensed-Italic
    font_color: palette:Accent:6
  overflow:
    icon: send-backward
    color: orange

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  cell_font: JuliaMono-Regular
  cell_bold_font: Roboto-Bold
  cell_font_size: null
  title_font: Roboto-Bold
  title_font_size: null
  title_format: MMMM YYYY
  title_color: palette:Accent:4
  header_font: JuliaMono-Regular
  header_font_size: null
  header_color: palette:Accent:7
  day_number_glyphs: null
  day_number_digits: null
  day_color: palette:Accent:7
  adjacent_month_color: palette:Accent:1
  show_adjacent: true
  holiday_color: palette:Accent:5
  nonworkday_fill_color: palette:Accent:3
  milestone_color: palette:Accent:4
  circle_milestones: true
  milestone_stroke_color: palette:Accent:4
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: palette:Accent:2
  week_number_font: JuliaMono-Regular
  week_number_font_size: null
  week_number_color: palette:Accent:7
  week_number_label_format: W{num}
  grid_line_color: lightgrey
  grid_line_width: 0.25
  grid_line_opacity: 0.5
  grid_line_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box: null

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  title_text: Event Details
  title_font: RobotoCondensed-Bold
  title_font_size: null
  title_color: palette:Accent:4
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_color: palette:Accent:7
  name_text:
    font_name: RobotoCondensed-Light
    font_color: palette:Accent:7
  notes_text:
    font_name: RobotoCondensed-Italic
    font_color: palette:Accent:6
  separator_stroke_dasharray: null
  headers:
    - Start Date
    - Name / Description
    - Milestone
    - Priority
    - Group
  column_widths:
    - 0.16
    - 0.52
    - 0.1
    - 0.1
    - 0.12

# ─── text_mini ─────────────────────────────────────────────────────────────
# text-mini glyph-set declarations; not an SVG renderer.
text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null
  holiday_symbols: null
  nonworkday_symbols: null
  duration_symbols: null
  duration_fill: null

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  background_color: ''
  axis_color: palette:Accent:3
  axis_opacity: 0.9
  axis_width: 2
  tick_color: palette:Accent:1
  date_format: MMM D
  tick_label_format: MMM YY
  today_date: ''
  today_label_text: Today
  today_label_offset_y: 10.0
  today_line_color: palette:Accent:5
  today_label_color: palette:Accent:3
  marker_stroke_color: palette:Accent:4
  marker_stroke_width: 1.0
  marker_radius: 4.2
  icon_size: 10.0
  callout_offset_y: 96.0
  duration_offset_y: 44.0
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.0
  duration_bar_fill_opacity: 0.25
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: null
  duration_bracket_stroke_dasharray: null
  top_colors:
    - palette:Accent:4
    - palette:Accent:0
    - palette:Accent:5
    - palette:Accent:2
    - palette:Accent:1
  bottom_colors:
    - palette:Accent:0
    - palette:Accent:5
    - palette:Accent:4
    - palette:Accent:1
    - palette:Accent:2
  palette: Accent
  name_text:
    font_name: Roboto-Bold
    font_color: palette:Accent:3
  notes_text:
    font_name: RobotoCondensed-Bold
    font_color: palette:Accent:1
  date:
    font_family: Roboto-Bold
    font_color: palette:Accent:3

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  palette_name: Accent
  axis_color: darkgrey
  axis_dasharray: 2,5
  text:
    font_color: '#333333'
  milestone_color: '#333333'
  bands:
    - date_range
    - week

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  background_color: none
  grid_color: palette:Accent:7
  grid_opacity: 0.4
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_line_color: null
  timeband_line_width: null
  timeband_line_opacity: null
  timeband_line_dasharray: null
  label_column_ratio: 0.1
  band_row_height: 10.0
  fiscal_year_start_month: 1
  week_start: 0
  show_unmatched_lane: true
  unmatched_lane_name: Other
  lane_match_mode: first
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_label_color: palette:Accent:4
  header_label_opacity: 1.0
  header_label_align_h: right
  header_heading_fill_color: none
  band_font: RobotoCondensed-Bold
  band_font_size: null
  timeband_label_color: palette:Accent:7
  timeband_label_opacity: 1.0
  timeband_fill_color: none
  timeband_fill_palette:
    - accent
  timeband_fill_opacity: 1.0
  lane_heading_fill_color: none
  lane_label_font: RobotoCondensed-Bold
  lane_label_font_size: null
  lane_label_color: palette:Accent:4
  lane_label_align_h: right
  lane_label_align_v: middle
  lane_label_rotation: 0
  event_show_date: false
  event_date_font: RobotoCondensed-Light
  event_date_font_size: null
  event_date_color: palette:Accent:7
  event_date_format: YYYY-MM-DD
  marker_radius: 2.0
  vertical_line_color: palette:Accent:5
  vertical_line_width: 1.5
  vertical_line_dasharray: null
  vertical_line_opacity: 0.85
  vertical_line_fill_color: none
  vertical_line_fill_opacity: 0.2
  duration_fill_opacity: 0.35
  duration_stroke_color: null
  duration_stroke_width: 1.0
  duration_stroke_opacity: 0.9
  duration_stroke_dasharray: null
  duration_bar_height: 8.0
  name_text:
    font_name: RobotoCondensed-Light
    font_color: palette:Accent:4
  palette:
    - palette:Accent:4
    - palette:Accent:0
    - palette:Accent:5
    - palette:Accent:2
    - palette:Accent:1
    - palette:Accent:7
  palette_name: Accent

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  date_range:
    unit: week
    label: Date Range
    label_format: '{start} – {end}'
  week:
    unit: week
    label: Week
    label_format: Week {n}

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
    style:
      size: 18
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:heading
    define: text
    as: heading
    style:
      font: Roboto-Bold
      size: 10
      color: palette:Accent:4
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
    style:
      size: 18
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: RobotoCondensed-Regular
      size: 8
      color: palette:Accent:7
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: RobotoCondensed-Italic
      size: 7
      color: palette:Accent:6
  - name: define text:label
    define: text
    as: label
    style:
      font: RobotoCondensed-Light
      size: 7
      color: palette:Accent:7
  - name: define text:label_bold
    define: text
    as: label_bold
    style:
      font: RobotoCondensed-Bold
      size: 7
      color: palette:Accent:7
  - name: define text:caption
    define: text
    as: caption
    style:
      font: RobotoCondensed-Light
      size: 6
      color: palette:Accent:7
  - name: define text:day_number
    define: text
    as: day_number
    style:
      font: Roboto-Bold
      size: 10
      color: palette:Accent:4
  - name: define text:month_title
    define: text
    as: month_title
    style:
      font: Roboto-Bold
      size: 8
      color: palette:Accent:4
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: palette:Accent:0
      fill_opacity: 0.15
      stroke: palette:Accent:7
      stroke_width: 2
      stroke_opacity: 0.2
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:timeband
    define: box
    as: timeband
    style:
      fill: none
      fill_opacity: 1.0
      stroke: none
      fill_palette: Accent
      fill_colors:
        - palette:Accent:4
        - palette:Accent:0
        - palette:Accent:5
        - palette:Accent:2
        - palette:Accent:1
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: palette:Accent:0
      fill_opacity: 0.15
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.25
      stroke: palette:Accent:7
      stroke_width: 1.0
  - name: define line:grid
    define: line
    as: grid
    style:
      color: palette:Accent:7
      width: 0.5
      opacity: 0.4
  - name: define line:axis
    define: line
    as: axis
    style:
      color: palette:Accent:3
      width: 2
      opacity: 0.9
  - name: define line:separator
    define: line
    as: separator
    style:
      color: palette:Accent:7
      width: 0.5
      opacity: 0.5
  - name: define line:today
    define: line
    as: today
    style:
      color: palette:Accent:5
      width: 1.5
      opacity: 1.0
  - name: define line:connector
    define: line
    as: connector
    style:
      color: palette:Accent:7
      width: 0.5
      opacity: 1.0
      dasharray: 4 2
  - name: define icon:event
    define: icon
    as: event
    style:
      color: palette:Accent:4
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: palette:Accent:4
  - name: define icon:overflow
    define: icon
    as: overflow
    style:
      icon: send-backward
      color: orange
  - name: bind ec-axis-line
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: define line:tick
    define: line
    as: tick
    style:
      color: palette:Accent:1
      width: 0.5
      opacity: 1.0
  - name: bind ec-axis-tick
    apply_to: element
    select:
      element: ec-axis-tick
    style:
      use: line:tick
  - name: bind ec-tick-label
    apply_to: element
    select:
      element: ec-tick-label
    style:
      use: text:caption
  - name: bind ec-today-line
    apply_to: element
    select:
      element: ec-today-line
    style:
      use: line:today
  - name: today label color
    apply_to: text:today_label
    style:
      color: palette:Accent:3
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-day-number -> text:day_number
    apply_to: element
    select:
      element: ec-day-number
    style:
      use: text:day_number
  - name: bind ec-month-title -> text:month_title
    apply_to: element
    select:
      element: ec-month-title
    style:
      use: text:month_title
  - name: bind ec-week-number -> text:label_bold
    apply_to: element
    select:
      element: ec-week-number
    style:
      use: text:label_bold
  - name: bind ec-fiscal-label -> text:caption
    apply_to: element
    select:
      element: ec-fiscal-label
    style:
      use: text:caption
  - name: bind ec-event-name -> text:body
    apply_to: element
    select:
      element: ec-event-name
    style:
      use: text:body
  - name: bind ec-event-notes -> text:body_secondary
    apply_to: element
    select:
      element: ec-event-notes
    style:
      use: text:body_secondary
  - name: bind ec-event-date -> text:caption
    apply_to: element
    select:
      element: ec-event-date
    style:
      use: text:caption
  - name: bind ec-duration-date -> text:caption
    apply_to: element
    select:
      element: ec-duration-date
    style:
      use: text:caption
  - name: bind ec-holiday-title -> text:body
    apply_to: element
    select:
      element: ec-holiday-title
    style:
      use: text:body
  - name: bind ec-today-label -> text:label
    apply_to: element
    select:
      element: ec-today-label
    style:
      use: text:label
      color: palette:Accent:3
  - name: bind ec-header-text -> text:heading
    apply_to: element
    select:
      element: ec-header-text
    style:
      use: text:heading
  - name: bind ec-footer-text -> text:caption
    apply_to: element
    select:
      element: ec-footer-text
    style:
      use: text:caption
  - name: bind ec-watermark -> text:heading
    apply_to: element
    select:
      element: ec-watermark
    style:
      use: text:heading
  - name: bind ec-background -> box:default
    apply_to: element
    select:
      element: ec-background
    style:
      use: box:default
  - name: bind ec-cell -> box:cell
    apply_to: element
    select:
      element: ec-cell
    style:
      use: box:cell
  - name: bind ec-heading-cell -> box:header
    apply_to: element
    select:
      element: ec-heading-cell
    style:
      use: box:header
  - name: bind ec-band-cell -> box:timeband
    apply_to: element
    select:
