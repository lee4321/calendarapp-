# Accent Theme
# Palette-driven theme — all colors sourced from the "Accent" DB palette.
# Accent (10 colors): #7fc97f #beaed4 #fdc086 #ffff99 #386cb0 #f0027f #bf5b17 #666666
#   0=muted green  1=soft purple  2=peach  3=pale yellow
#   4=steel blue   5=hot pink     6=rust   7=medium grey
#
# Demonstrates the palette:NAME:INDEX single-color syntax and the
# colors.month_palette / colors.group_palette / timeline.palette /
# blockplan.palette_name bulk-list keys.

theme:
  name: "Accent"
  version: "2.0"
  description: "Palette-driven theme with all colors from the Accent DB palette — unified theme model"

# ══════════════════════════════════════════════════════════════════════════════
# Unified Style Tokens
# ══════════════════════════════════════════════════════════════════════════════

text_styles:
  heading:
    font: "Roboto-Bold"
    size: 10
    color: "palette:Accent:4"
    size_rules:
      - font_size: 18
        when: { papersize: ["letter", "ledger"] }
      - font_size: 8
        when: { papersize: ["3x5", "5x8"] }
  body:
    font: "RobotoCondensed-Regular"
    size: 8
    color: "palette:Accent:7"
  body_secondary:
    font: "RobotoCondensed-Italic"
    size: 7
    color: "palette:Accent:6"
  label:
    font: "RobotoCondensed-Light"
    size: 7
    color: "palette:Accent:7"
  label_bold:
    font: "RobotoCondensed-Bold"
    size: 7
    color: "palette:Accent:7"
  caption:
    font: "RobotoCondensed-Light"
    size: 6
    color: "palette:Accent:7"
  day_number:
    font: "Roboto-Bold"
    size: 10
    color: "palette:Accent:4"
  month_title:
    font: "Roboto-Bold"
    size: 8
    color: "palette:Accent:4"

box_styles:
  default:
    fill: "white"
    fill_opacity: 1.0
    stroke: "none"
  cell:
    fill: "palette:Accent:0"
    fill_opacity: 0.15
    stroke: "palette:Accent:7"
    stroke_width: 2
    stroke_opacity: 0.2
  header:
    fill: "none"
    stroke: "none"
  timeband:
    fill: "none"
    fill_opacity: 1.0
    stroke: "none"
    fill_palette: "Accent"
    fill_colors: ["palette:Accent:4", "palette:Accent:0", "palette:Accent:5", "palette:Accent:2", "palette:Accent:1"]
  highlight:
    fill: "palette:Accent:0"
    fill_opacity: 0.15
    stroke: "none"
  callout:
    fill: "white"
    fill_opacity: 0.25
    stroke: "palette:Accent:7"
    stroke_width: 1.0

line_styles:
  grid:
    color: "palette:Accent:7"
    width: 0.5
    opacity: 0.4
  axis:
    color: "palette:Accent:3"
    width: 2
    opacity: 0.9
  separator:
    color: "palette:Accent:7"
    width: 0.5
    opacity: 0.5
  today:
    color: "palette:Accent:5"
    width: 1.5
    opacity: 1.0
  connector:
    color: "palette:Accent:7"
    width: 0.5
    opacity: 1.0
    dasharray: "4 2"

icon_styles:
  event:
    color: "palette:Accent:4"
    size: 10
  duration:
    color: "palette:Accent:4"
  overflow:
    icon: "send-backward"
    color: "orange"

axis:
  line_style: axis
  tick:
    color: "palette:Accent:1"
    label_style: caption
    date_format: "M/D"
  today:
    line_style: today
    label_color: "palette:Accent:3"
    label_text: "Today"

element_styles:
  # ── Text elements ──
  ec-heading:        { text_style: heading }
  ec-label:          { text_style: label }
  ec-day-number:     { text_style: day_number }
  ec-month-title:    { text_style: month_title }
  ec-week-number:    { text_style: label_bold }
  ec-fiscal-label:   { text_style: caption }
  ec-event-name:     { text_style: body }
  ec-event-notes:    { text_style: body_secondary }
  ec-event-date:     { text_style: caption }
  ec-duration-date:  { text_style: caption }
  ec-holiday-title:  { text_style: body }
  ec-today-label:    { text_style: label, color: "palette:Accent:3" }
  ec-header-text:    { text_style: heading }
  ec-footer-text:    { text_style: caption }
  ec-watermark:      { text_style: heading }

  # ── Box/rectangle elements ──
  ec-background:     { box_style: default }
  ec-cell:           { box_style: cell }
  ec-heading-cell:   { box_style: header }
  ec-band-cell:      { box_style: timeband }
  ec-callout-box:    { box_style: callout }
  ec-vline-fill:     { box_style: highlight }
  ec-day-box:        { box_style: cell }
  ec-pattern-fill:   { box_style: default }

  # ── Line elements ──
  ec-grid-line:      { line_style: grid }
  ec-axis-line:      { line_style: axis }
  ec-axis-tick:      { line_style: axis }
  ec-today-line:     { line_style: today }
  ec-separator:      { line_style: separator }
  ec-connector:      { line_style: connector }
  ec-vline:          { line_style: grid }
  ec-duration-bar:   { line_style: axis }
  ec-hash-line:      { line_style: grid }
  ec-strikethrough:  { line_style: grid }

  # ── Marker elements ──
  ec-milestone-marker: { line_style: axis }
  ec-milestone-flag:   { line_style: axis }
  ec-duration-marker:  { line_style: axis }

  # ── Icon elements ──
  ec-event-icon:     { icon_style: event }
  ec-duration-icon:  { icon_style: duration }
  ec-overflow-icon:  { icon_style: overflow }

  # ── Legend elements ──
  ec-legend-swatch:  { line_style: axis }
  ec-legend-text:    { text_style: body }
  ec-legend-icon:    { icon_style: event }

# ══════════════════════════════════════════════════════════════════════════════
# Legacy Settings (retained for non-styling configuration)
# ══════════════════════════════════════════════════════════════════════════════

# ── General Settings ──────────────────────────────────────────────────────────
base:
  font_family: "RobotoCondensed-Regular"
  font_color: "palette:Accent:7"
  default_missing_icon: "star-dashed"
  size_rule:
    - font_size: 18
      when:
        papersize: ["letter", "ledger"]
    - font_size: 8
      when:
        papersize: ["3x5", "5x8"]

header:
  font_family: "Roboto-Bold"
  font_color: "palette:Accent:4"
  left:
    font_color: "palette:Accent:4"
  center:
    font_color: "palette:Accent:4"
  right:
    font_family: "Roboto-BoldItalic"
    font_color: "palette:Accent:4"

footer:
  font_family: "RobotoCondensed-Light"
  font_color: "palette:Accent:7"
  left:
    font_color: "palette:Accent:4"
  center:
    font_color: "palette:Accent:4"
  right:
    font_family: "Roboto-BoldItalic"
    font_color: "palette:Accent:4"

events:
  icon_color: "palette:Accent:4"
  item_placement_order: ["milestones", "events", "durations"]

durations:
  icon_color: "palette:Accent:4"
  stroke_dasharray: null

watermark:
  text: null
  color: "palette:Accent:1"
  font_family: "Roboto-Bold"
  opacity: 0.15
  font_size: null
  resize_mode: "fit"
  rotation_angle: 0.0
  image_rotation_angle: 0.0

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  # How to number fiscal years relative to the start calendar year:
  #   null (default): auto — blockplan uses +1 for non-Jan starts, 0 for Jan;
  #                   weekly/NRF uses 0 (start year).
  #   0: start year (FY starting Feb 2026 → FY2026)
  #   1: start year + 1 (FY starting Oct 2025 → FY2026, US federal default)
  #  -1: start year − 1
  year_offset: null

colors:
  month_palette: "PuBuGn"
  fiscal_palette: "Accent"
  group_palette: "PuBuGn"
  hash_lines: "palette:Accent:7"
  federal_holiday:
    color: "palette:Accent:5"
    alpha: 0.25
  company_holiday:
    color: "palette:Accent:0"
    alpha: 0.25
  resource_groups:
    a: "palette:Accent:4"
    b: "palette:Accent:0"
    c: "palette:Accent:1"
    d: "palette:Accent:7"

# ── Weekly Calendar ───────────────────────────────────────────────────────────
weekly:
  day_names:
    font_family: "RobotoCondensed-Bold"
    font_color: "palette:Accent:4"

  week_numbers:
    font_family: "RobotoCondensed-Bold"
    font_color: "palette:Accent:7"
    label_format: "W{num:02d}"

  day_box:
    stroke_color: "palette:Accent:7"
    stroke_opacity: 0.2
    stroke_width: 2
    stroke_dasharray: null
    fill_color: "palette:Accent:0"
    fill_opacity: 0.15
    number_font: "Roboto-Bold"
    number_color: "palette:Accent:4"
    icon_color: "palette:Accent:4"
    font_color: "palette:Accent:7"
    hash_pattern_opacity: 0.20

  name_text:
    font_name: "RobotoCondensed-Regular"
    font_color: "palette:Accent:7"
  notes_text:
    font_name: "RobotoCondensed-Italic"
    font_color: "palette:Accent:6"

  overflow:
    icon: "send-backward"
    color: "orange"

# ── Timeline ──────────────────────────────────────────────────────────────────
timeline:
  background_color: ""
  axis_color: "palette:Accent:3"
  axis_opacity: 0.9
  axis_width: 2
  tick_color: "palette:Accent:1"
  date_format: "MMM D"
  tick_label_format: "MMM YY"
  today_date: ""
  today_label_text: "Today"
  today_label_offset_y: 10.0
  today_line_color: "palette:Accent:5"
  today_label_color: "palette:Accent:3"
  marker_stroke_color: "palette:Accent:4"
  marker_stroke_width: 1.0
  marker_radius: 4.2
  icon_size: 10.0
  callout_offset_y: 96.0
  duration_offset_y: 44.0
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.0
  duration_bar_fill_opacity: 0.25
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: null
  duration_bracket_stroke_dasharray: null
  top_colors: ["palette:Accent:4", "palette:Accent:0", "palette:Accent:5", "palette:Accent:2", "palette:Accent:1"]
  bottom_colors: ["palette:Accent:0", "palette:Accent:5", "palette:Accent:4", "palette:Accent:1", "palette:Accent:2"]
  palette: "Accent"
  name_text:
    font_name: "Roboto-Bold"
    font_color: "palette:Accent:3"
  notes_text:
    font_name: "RobotoCondensed-Bold"
    font_color: "palette:Accent:1"
  date:
    font_family: "Roboto-Bold"
    font_color: "palette:Accent:3"

# ── Block Plan ────────────────────────────────────────────────────────────────
blockplan:
  background_color: "none"
  grid_color: "palette:Accent:7"
  grid_opacity: 0.4
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_line_color: null     # null → inherits grid_color
  timeband_line_width: null     # null → inherits grid_line_width
  timeband_line_opacity: null   # null → inherits grid_opacity
  timeband_line_dasharray: null
  label_column_ratio: 0.10
  band_row_height: 10.0
  fiscal_year_start_month: 1
  week_start: 0
  show_unmatched_lane: true
  unmatched_lane_name: "Other"
  lane_match_mode: "first"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_label_color: "palette:Accent:4"
  header_label_opacity: 1.0
  header_label_align_h: "right"
  header_heading_fill_color: "none"
  band_font: "RobotoCondensed-Bold"
  band_font_size: null
  timeband_label_color: "palette:Accent:7"
  timeband_label_opacity: 1.0
  timeband_fill_color: "none"
  timeband_fill_palette: ["accent"]
  timeband_fill_opacity: 1.0
  lane_heading_fill_color: "none"
  lane_label_font: "RobotoCondensed-Bold"
  lane_label_font_size: null
  lane_label_color: "palette:Accent:4"
  lane_label_align_h: "right"
  lane_label_align_v: "middle"
  lane_label_rotation: 0          # clockwise degrees; 0=horizontal, -90=bottom-to-top, 90=top-to-bottom
  event_show_date: false
  event_date_font: "RobotoCondensed-Light"
  event_date_font_size: null
  event_date_color: "palette:Accent:7"
  event_date_format: "YYYY-MM-DD"
  marker_radius: 2.0
  # Global style defaults for all vertical lines (overridable per entry).
  vertical_line_color: "palette:Accent:5"
  vertical_line_width: 1.5
  vertical_line_dasharray: null        # e.g. "6,3" for dashes
  vertical_line_opacity: 0.85
  vertical_line_fill_color: "none"     # default: no fill; set to a color, list, or palette name
  vertical_line_fill_opacity: 0.2
  bottom_time_bands: []    # mirror of top_time_bands for bands at the bottom of the SVG
  # Each entry pins a line (and optional column fill) to a time-band segment.
  #   band:         time band label (case-insensitive)
  #   align:        start | center | end  (default: start)
  #   repeat:       true → apply to every segment in the band; omit value when using repeat
  #   value:        rendered segment label to match (required when repeat is absent/false)
  #   color / width / opacity / dash_array: per-line style overrides
  #   fill_color:   column fill; single color, list of colors, or palette name (cycles per segment)
  #   fill_opacity: fill opacity 0–1 (default: vertical_line_fill_opacity)
  vertical_lines:
    - band: "Sprint"
      repeat: true
      align: "end"
      fill_color: ["palette:Accent:0", "none"]
      fill_opacity: 0.1
  # vertical_lines:
  #   - band: "Sprint"
  #     repeat: true                   # draw after every sprint
  #     align: "end"
  #   - band: "PI"
  #     value: "PI 5"
  #     align: "end"
  #     color: "palette:Accent:3"
  #     width: 2.0
  #     dash_array: "8,4"
  duration_fill_opacity: 0.35
  duration_stroke_color: null         # null → falls back to duration_color
  duration_stroke_width: 1.0
  duration_stroke_opacity: 0.9
  duration_stroke_dasharray: null
  duration_bar_height: 8.0
  name_text:
    font_name: "RobotoCondensed-Light"
    font_color: "palette:Accent:4"
  palette: ["palette:Accent:4", "palette:Accent:0", "palette:Accent:5", "palette:Accent:2", "palette:Accent:1", "palette:Accent:7"]
  palette_name: "Accent"

# ── Mini Calendar ─────────────────────────────────────────────────────────────
mini_calendar:
  cell_font: "JuliaMono-Regular"
  cell_bold_font: "Roboto-Bold"
  cell_font_size: null
  title_font: "Roboto-Bold"
  title_font_size: null
  title_format: "MMMM YYYY"
  title_color: "palette:Accent:4"
  header_font: "JuliaMono-Regular"
  header_font_size: null
  header_color: "palette:Accent:7"
  day_number_glyphs: null
  day_number_digits: null
  day_color: "palette:Accent:7"
  adjacent_month_color: "palette:Accent:1"
  show_adjacent: true
  holiday_color: "palette:Accent:5"
  nonworkday_fill_color: "palette:Accent:3"
  milestone_color: "palette:Accent:4"
  circle_milestones: true
  milestone_stroke_color: "palette:Accent:4"
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: "palette:Accent:2"
  week_number_font: "JuliaMono-Regular"
  week_number_font_size: null
  week_number_color: "palette:Accent:7"
  week_number_label_format: "W{num}"
  grid_line_color: "lightgrey"
  grid_line_width: 0.25
  grid_line_opacity: 0.5
  grid_line_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box:
mini_details:
  title_text: "Event Details"
  title_font: "RobotoCondensed-Bold"
  title_font_size: null
  title_color: "palette:Accent:4"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_color: "palette:Accent:7"
  name_text:
    font_name: "RobotoCondensed-Light"
    font_color: "palette:Accent:7"
  notes_text:
    font_name: "RobotoCondensed-Italic"
    font_color: "palette:Accent:6"
  separator_stroke_dasharray: null
  headers:
    - "Start Date"
    - "Name / Description"
    - "Milestone"
    - "Priority"
    - "Group"
  column_widths: [0.16, 0.52, 0.10, 0.10, 0.12]

text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null 
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null 
  holiday_symbols: null 
  nonworkday_symbols: null 
  duration_symbols: null
  duration_fill: null


# ─────────────────────────────────────────────────────────────────────────────
# COMPACT_PLAN — Compressed activities / duration-line view
# ─────────────────────────────────────────────────────────────────────────────
compact_plan:
  palette_name: "Accent"
  axis_color: "darkgrey"
  axis_dasharray: "2,5"
  text:
    font_color: "#333333"
  milestone_color: "#333333"
  time_bands:
    - label: "Date Range"
      unit: "week"
      label_format: "{start} – {end}"
      fill_color: "none"
      alt_fill_color: "#f0f0f0"
    - label: "Week"
      unit: "week"
      label_format: "Week {n}"
      fill_color: "none"
      alt_fill_color: "none"
