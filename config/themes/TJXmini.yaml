# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJXmini
  version: '2.0'
  description: TJX colors and style — mini calendar only

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: PlaywriteDEGrund-VariableFont_wght
  default_missing_icon: applet-closed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: blue
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: navy
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: blue
  font_family: PlaywriteDEGrund-VariableFont_wght
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: paired
  fiscal_palette: blues
  group_palette: oranges
  hash_lines: black
  company_holiday:
    alpha: 0.25
    color: gold
  federal_holiday:
    alpha: 0.1
    color: "#87BBBB"

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  cell_font: JuliaMono-Regular
  cell_bold_font: Caveat-Bold
  cell_font_size: 48
  title_font: Caveat-Bold
  title_font_size: 18
  title_format: MMMM YYYY
  title_color: navy
  header_font: JuliaMono-Regular
  header_font_size: 12
  header_color: grey
  day_number_glyphs: null
  day_number_digits: null
  day_color: black
  adjacent_month_color: lightgrey
  show_adjacent: false
  holiday_color: red
  nonworkday_fill_color: blood
  milestone_color: navy
  circle_milestones: false
  milestone_stroke_color: navy
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: black
  week_number_font: JuliaMono-Regular
  week_number_font_size: 12
  week_number_color: Blue
  week_number_label_format: W{num}
  grid_lines: true
  grid_line_color: grey
  grid_line_width: 0.4
  grid_line_opacity: 0.7
  grid_line_dasharray: 1,2
  month_outline_color: navy
  month_outline_width: 0.75
  month_outline_opacity: 0.6
  month_outline_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  title_text: Event Details
  title_font: RobotoCondensed-Bold
  title_font_size: null
  title_color: navy
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_color: grey
  name_text:
    font_name: RobotoCondensed-Light
    font_color: black
  notes_text:
    font_name: RobotoCondensed-LightItalic
    font_color: darkgrey
  separator_stroke_dasharray: null
  headers:
    - Start Date
    - Name / Description
    - Milestone
    - Priority
    - Group
  column_widths:
    - 0.16
    - 0.52
    - 0.1
    - 0.1
    - 0.12

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 14
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 12
  - name: define text:heading
    define: text
    as: heading
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 14
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: blue
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:label
    define: text
    as: label
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
  - name: define text:label_bold
    define: text
    as: label_bold
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: Blue
  - name: define text:caption
    define: text
    as: caption
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: black
  - name: define text:day_number
    define: text
    as: day_number
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: blue
  - name: define text:month_title
    define: text
    as: month_title
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 22
      color: navy
  - name: define text:holiday_title
    define: text
    as: holiday_title
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: black
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: '#F8F8FF'
      fill_opacity: 0.25
      stroke: none
      stroke_width: 0.5
      stroke_opacity: 0.5
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: lightblue
      fill_opacity: 0.3
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.25
      stroke: grey
      stroke_width: 1.0
  - name: define line:grid
    define: line
    as: grid
    style:
      color: grey
      width: 0.5
      opacity: 0.3
  - name: define line:mini_grid
    define: line
    as: mini_grid
    style:
      color: grey
      width: 0.4
      opacity: 0.7
      dasharray: 1,2
  - name: define line:separator
    define: line
    as: separator
    style:
      color: grey
      width: 0.5
      opacity: 0.5
  - name: define line:today
    define: line
    as: today
    style:
      color: grey
      width: 1.5
      opacity: 1.0
  - name: define icon:event
    define: icon
    as: event
    style:
      color: yellow
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: navy
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-day-number -> text:day_number
    apply_to: element
    select:
      element: ec-day-number
    style:
      use: text:day_number
  - name: bind ec-month-title -> text:month_title
    apply_to: element
    select:
      element: ec-month-title
    style:
      use: text:month_title
  - name: bind ec-week-number -> text:label_bold
    apply_to: element
    select:
      element: ec-week-number
    style:
      use: text:label_bold
  - name: bind ec-holiday-title -> text:holiday_title
    apply_to: element
    select:
      element: ec-holiday-title
    style:
      use: text:holiday_title
  - name: bind ec-today-label -> text:label
    apply_to: element
    select:
      element: ec-today-label
    style:
      use: text:label
      color: grey
  - name: bind ec-header-text -> text:heading
    apply_to: element
    select:
      element: ec-header-text
    style:
      use: text:heading
  - name: bind ec-footer-text -> text:caption
    apply_to: element
    select:
      element: ec-footer-text
    style:
      use: text:caption
  - name: bind ec-watermark -> text:heading
    apply_to: element
    select:
      element: ec-watermark
    style:
      use: text:heading
  - name: bind ec-background -> box:default
    apply_to: element
    select:
      element: ec-background
    style:
      use: box:default
  - name: bind ec-cell -> box:cell
    apply_to: element
