# TJX theme — mini calendar visualization only.
# Self-contained: every value the mini renderer needs is set here so the
# visualization output never depends on hardcoded fallbacks in config.py.

theme:
  name: "TJXmini"
  version: "2.0"
  description: "TJX colors and style — mini calendar only"

# ══════════════════════════════════════════════════════════════════════════════
# Unified Style Tokens
# ══════════════════════════════════════════════════════════════════════════════

text_styles:
  heading:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 14
    color: "grey"
    size_rules:
      - font_size: 10
        when: { papersize: ["letter", "ledger", "tabloid"] }
      - font_size: 8
        when: { papersize: ["3x5", "5x8"] }
  body:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "white"
  body_secondary:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "grey"
  label:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "grey"
  label_bold:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "Blue"
  caption:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 22
    color: "black"
  day_number:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 22
    color: "white"
  month_title:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 22
    color: "navy"
  holiday_title:
    font: "PlaywriteDEGrund-VariableFont_wght"
    size: 12
    color: "black"

box_styles:
  default:
    fill: "white"
    fill_opacity: 1.0
    stroke: "none"
  cell:
    fill: "#F8F8FF"
    fill_opacity: 0.25
    stroke: "none"
    stroke_width: 0.5
    stroke_opacity: 0.5
  header:
    fill: "none"
    stroke: "none"
  highlight:
    fill: "lightblue"
    fill_opacity: 0.3
    stroke: "none"
  callout:
    fill: "white"
    fill_opacity: 0.25
    stroke: "grey"
    stroke_width: 1.0

line_styles:
  grid:
    color: "grey"
    width: 0.5
    opacity: 0.3
  mini_grid:
    color: "grey"
    width: 0.4
    opacity: 0.7
    dasharray: "1,2"
  separator:
    color: "grey"
    width: 0.5
    opacity: 0.5
  today:
    color: "grey"
    width: 1.5
    opacity: 1.0

icon_styles:
  event:
    color: "yellow"
    size: 10
  duration:
    color: "navy"

element_styles:
  ec-heading:        { text_style: heading }
  ec-label:          { text_style: label }
  ec-day-number:     { text_style: day_number }
  ec-month-title:    { text_style: month_title }
  ec-week-number:    { text_style: label_bold }
  ec-holiday-title:  { text_style: holiday_title }
  ec-today-label:    { text_style: label, color: "grey" }
  ec-header-text:    { text_style: heading }
  ec-footer-text:    { text_style: caption }
  ec-watermark:      { text_style: heading }
  ec-background:     { box_style: default }
  ec-cell:           { box_style: cell }
  ec-day-box:        { box_style: cell }
  ec-pattern-fill:   { box_style: default }
  ec-grid-line:      { line_style: mini_grid }
  ec-today-line:     { line_style: today }
  ec-separator:      { line_style: separator }
  ec-hash-line:      { line_style: grid }
  ec-strikethrough:  { line_style: grid }
  ec-event-icon:     { icon_style: event }
  ec-duration-icon:  { icon_style: duration }

# ══════════════════════════════════════════════════════════════════════════════
# General Settings
# ══════════════════════════════════════════════════════════════════════════════

base:
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  font_color: "grey"
  default_missing_icon: applet-closed
  size_rule:
    - font_size: 14
      when:
        papersize: ["letter", "ledger", "tabloid"]
    - font_size: 12
      when:
        papersize: ["3x5", "5x8"]

header:
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  font_color: "grey"

footer:
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  font_color: "grey"

watermark:
  text: null
  color: "blue"
  font_family: "PlaywriteDEGrund-VariableFont_wght"
  opacity: 0.5
  font_size: null
  resize_mode: "fit"
  rotation_angle: 45.0
  image_rotation_angle: 45.0

events:
  icon_color: "blue"
  item_placement_order: ["priority"]

durations:
  icon_color: "navy"
  stroke_dasharray: null

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  year_offset: +1

colors:
  month_palette: "viridis"
  fiscal_palette: "Greys"
  group_palette: "Pastel1"
  hash_lines: "black"
  company_holiday:
    alpha: 0.25
    color: "gold"
  federal_holiday:
    alpha: 0.10
    color: "tomato"

# ══════════════════════════════════════════════════════════════════════════════
# Mini Calendar
# ══════════════════════════════════════════════════════════════════════════════

mini_calendar:
  cell_font: "JuliaMono-Regular"
  cell_bold_font: "Caveat-Bold"
  cell_font_size: 48
  title_font: "Caveat-Bold"
  title_font_size: 18
  title_format: "MMMM YYYY"
  title_color: "navy"
  header_font: "JuliaMono-Regular"
  header_font_size: 12
  header_color: "grey"
  day_number_glyphs: null
  day_number_digits: null
  day_color: "black"
  adjacent_month_color: "lightgrey"
  show_adjacent: false
  holiday_color: "red"
  nonworkday_fill_color: "blood"
  milestone_color: "navy"
  circle_milestones: false
  milestone_stroke_color: "navy"
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: "black"
  week_number_font: "JuliaMono-Regular"
  week_number_font_size: 12
  week_number_color: "Blue"
  week_number_label_format: "W{num}"
  grid_lines: true
  grid_line_color: "grey"
  grid_line_width: 0.4
  grid_line_opacity: 0.7
  grid_line_dasharray: "1,2"
  month_outline_color: "navy"
  month_outline_width: 0.75
  month_outline_opacity: 0.6
  month_outline_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null

mini_details:
  title_text: "Event Details"
  title_font: "RobotoCondensed-Bold"
  title_font_size: null
  title_color: "navy"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_color: "grey"
  name_text:
    font_name: "RobotoCondensed-Light"
    font_color: "black"
  notes_text:
    font_name: "RobotoCondensed-LightItalic"
    font_color: "darkgrey"
  separator_stroke_dasharray: null
  headers:
    - "Start Date"
    - "Name / Description"
    - "Milestone"
    - "Priority"
    - "Group"
  column_widths: [0.16, 0.52, 0.10, 0.10, 0.12]

# ══════════════════════════════════════════════════════════════════════════════
# Style Rules — day-box decoration
# ══════════════════════════════════════════════════════════════════════════════

style_rules:
  - name: weekly_hash_0
    select:
      nonworkday: false
    apply_to: day_box
    style:
      pattern: stars74
      pattern_color: silver
      pattern_opacity: 0.01

  - name: fedholidays
    select:
      federal_holiday: true
    apply_to: day_box
    style:
      fill_color: "lightblue"
      fill_opacity: 1.0
      pattern: app
      pattern_color: "tomato"
      pattern_opacity: 0.5
