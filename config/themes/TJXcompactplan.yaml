# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJXcompactplan
  version: '2.0'
  description: TJX colors and style — compact activities plan only

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: PlaywriteDEGrund-VariableFont_wght
  default_missing_icon: applet-closed

# ─── layout ────────────────────────────────────────────────────────────────
# Page margins (numeric points or unit-suffixed values like 0.5in).
layout:
  margin:
    top: 0.5in
    right: 0.5in
    bottom: 0.5in
    left: 0.5in

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  item_placement_order:
    - priority

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  font_family: PlaywriteDEGrund-VariableFont_wght
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: oranges
  fiscal_palette: blues
  group_palette: pastel1
  hash_lines: black
  resource_groups:
    a: black
    b: yellow
    c: red
    d: grey
  company_holiday:
    alpha: 0.25
    color: gold
  federal_holiday:
    alpha: 0.1
    color: tomato

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  palette:
    - deepskyblue
    - gold
    - tomato
    - grey
    - mediumseagreen
    - mediumpurple
  axis_padding: 5.0
  axis_width: 1.0
  show_axis: false
  header_bottom_y: 8
  key_top_y: 8
  band_row_height: 10.0
  federal_holiday_fill_color: tomato
  federal_holiday_fill_opacity: 1.0
  company_holiday_fill_color: gold
  company_holiday_fill_opacity: 1.0
  weekend_fill_color: '#E8E8E8'
  weekend_fill_opacity: 1.0
  federal_holiday_icon: flag-us
  text:
    font_name: RobotoCondensed-Light
  duration_line_width: 9.0
  lane_spacing: 12.0
  show_duration_icons: true
  duration_icon_list: squircles
  duration_icon_height: 8.0
  milestone_flag_height: 9.0
  milestone_flag_width: 7.0
  milestone_icon: null
  show_milestone_labels: false
  name_text:
    font_name: RobotoCondensed-Light
  legend_column_split: 0.5
  show_legend: true
  legend_row_height: 10.0
  legend_swatch_width: 20.0
  show_milestone_list: true
  milestone_list_date_format: M/D
  milestone_list_row_height: 10.0
  milestone_list_date_col_width: 32.0
  show_continuation_icon: true
  continuation_icon: move-right
  continuation_icon_height: 8.0
  continuation_icon_color: grey
  continuation_legend_text: activity continues
  bands:
    - band: month
      row_height: 25
    - date_range
    - dow
  legend_area_ratio: 0.25


# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  month:
    unit: month
    label: Month
    date_format: MMM YYYY
    show_every: 1
    text_align: center
  date_range:
    unit: week
    label: Date Range
    label_format: '{start} – {end}'
    text_align: center
  dow:
    unit: date
    label: DoW
    date_format: ddd
    show_every: 1
    text_align: center

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 14
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 12
  - name: define text:heading
    define: text
    as: heading
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 14
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
