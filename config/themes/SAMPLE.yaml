  - name: bind ec-cell
    apply_to: element
    select:
      element: ec-cell
    style:
      use: box:cell
  - name: bind ec-heading-cell
    apply_to: element
    select:
      element: ec-heading-cell
    style:
      use: box:header
  - name: bind ec-callout-box
    apply_to: element
