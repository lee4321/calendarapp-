# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: SAMPLE
  version: '3.0'
  description: Annotated reference theme for the unified style_rules schema.

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: FiraSans-Light
  default_missing_icon: applet-closed

# ─── layout ────────────────────────────────────────────────────────────────
# Page margins (numeric points or unit-suffixed values like 0.5in).
layout:
  margin:
    top: 0.5in
    right: 0.5in
    bottom: 0.5in
    left: 0.5in

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  left:
    text: '{theme.name}'
  center:
    text: '{calendar.range}'
  right:
    text: '{today}'

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  left:
    text: ''
  center:
    text: ''
  right:
    text: p. {page}

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: ''
  rotation_angle: 45.0
  resize_mode: fit

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: null

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: Pastel1
  fiscal_palette: Blues
  group_palette: Set2
  federal_holiday:
    alpha: 0.25
  company_holiday:
    alpha: 0.25
  resource_groups:
    engineering: steelblue
    design: mediumpurple
    qa: tomato
    ops: goldenrod

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  week_numbers:
    label_format: W{num:02d}
  overflow:
    icon: overflow

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  title_format: MMMM YYYY
  week_number_label_format: W{num}
  icon_set: squares

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  output_suffix: _details
  title_text: Event Details
  headers:
    - Start Date
    - Name / Description
    - Milestone
    - Days
    - Group
  column_widths:
    - 0.16
    - 0.52
    - 0.1
    - 0.1
    - 0.12

# ─── text_mini ─────────────────────────────────────────────────────────────
# text-mini glyph-set declarations; not an SVG renderer.
text_mini:
  cell_width: 2
  month_gap: 4
  duration_fill: ■
  event_symbols:
    - •
    - ○
    - ◐
  milestone_symbols:
    - ◆
    - ◇
  holiday_symbols:
    - ✕
  nonworkday_symbols:
    - ·

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  tick_label_format: M/D
  today_date: ''
  today_label_text: Today
  marker_radius: 4.2
  icon_size: 8
  callout_offset_y: 30.0
  duration_offset_y: 30.0
  duration_lane_gap_y: 8.0

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  legend_area_ratio: 0.28
  bands:
    - date_range
    - week

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  fiscal_year_start_month: 2
  week_start: 0
  label_column_ratio: 0.1
  band_row_height: 12.0
  lane_match_mode: first
  show_unmatched_lane: true
  unmatched_lane_name: Other
  swimlanes:
    - name: Engineering
    - name: Design
    - name: QA
      split_ratio: 0.0
    - name: Operations
    - name: Other
  top_bands:
    - fiscal_quarter
    - month
  bottom_bands: []

# ─── excelheader ───────────────────────────────────────────────────────────
# XLSX-only config: band-row geometry, system-font names per band
# (deliberate exception, not style_rules), and Excel cell-border
# vertical lines.
excelheader:
  font_name: Calibri
  font_size: 9
  band_row_height: 18.0
  top_bands:
    - fiscal_quarter
    - month
  band_fonts:
    fiscal_quarter:
      excel_font_name: Calibri
      excel_font_size: 10
  vertical_lines: []

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: define text:base
    define: text
    as: base
    style:
      font: FiraSans-Light
      size: 9
      color: black
  - name: define text:heading
    define: text
    as: heading
    style:
      font: FiraSans-Bold
      size: 11
      color: black
  - name: define text:body
    define: text
    as: body
    style:
      font: FiraSans-Light
      size: 8
      color: black
  - name: define text:caption
    define: text
    as: caption
    style:
      font: FiraSans-Light
      size: 7
      color: dimgrey
  - name: define text:label
    define: text
    as: label
    style:
      font: FiraSans-Light
      size: 7
      color: grey
  - name: define text:day_number
    define: text
    as: day_number
    style:
      font: Roboto-Bold
      size: 11
      color: black
  - name: define text:month_title
    define: text
    as: month_title
    style:
      font: Roboto-Bold
      size: 9
      color: black
  - name: define text:week_number
    define: text
    as: week_number
    style:
      font: FiraSans-Light
      size: 7
      color: grey
  - name: define text:event_name
    define: text
    as: event_name
    style:
      font: FiraSans-Light
      size: 8
      color: navy
  - name: define text:event_notes
    define: text
    as: event_notes
    style:
      font: FiraSans-Light
      size: 7
      color: darkgrey
  - name: define text:event_date
    define: text
    as: event_date
    style:
      font: FiraSans-Light
      size: 7
      color: darkgrey
  - name: define text:duration_date
    define: text
    as: duration_date
    style:
      font: FiraSans-Light
      size: 7
      color: darkgrey
  - name: define text:holiday_title
    define: text
    as: holiday_title
    style:
      font: FiraSans-Light
      size: 7
      color: black
  - name: define text:today_label
    define: text
    as: today_label
    style:
      font: FiraSans-Light
      size: 7
      color: tomato
  - name: define text:fiscal_label
    define: text
    as: fiscal_label
    style:
      font: FiraSans-Light
      size: 7
      color: navy
  - name: define text:swimlane_label
    define: text
    as: swimlane_label
    style:
      font: Roboto-Bold
      size: 8
      color: black
  - name: define text:band_label
