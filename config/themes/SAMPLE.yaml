    as: milestone_label
    style:
      font: Roboto-Bold
      size: 7
      color: navy
  - name: text:heading — small paper
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: none
      stroke: grey
      stroke_width: 0.5
      stroke_opacity: 0.5
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.85
      stroke: grey
      stroke_width: 0.5
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: lightblue
      fill_opacity: 0.3
      stroke: none
  - name: define box:day
    define: box
    as: day
    style:
      fill: none
      stroke: grey
      stroke_width: 0.5
      stroke_opacity: 0.5
  - name: define box:event
    define: box
    as: event
    style:
      fill: none
      stroke: none
  - name: define box:duration
    define: box
    as: duration
    style:
      fill: steelblue
      fill_opacity: 0.35
      stroke: navy
      stroke_width: 0.5
  - name: define box:milestone
    define: box
    as: milestone
    style:
      fill: none
      stroke: none
  - name: define box:vline
    define: box
    as: vline
    style:
      fill: none
      stroke: grey
      stroke_width: 0.5
  - name: define box:swimlane_heading
    define: box
    as: swimlane_heading
    style:
      fill: '#f4f4f4'
      stroke: grey
      stroke_width: 0.5
  - name: define box:swimlane_content
    define: box
    as: swimlane_content
    style:
      fill: none
      stroke: none
  - name: define box:band
    define: box
    as: band
    style:
      fill: none
      stroke: grey
      stroke_width: 0.5
      stroke_opacity: 0.5
  - name: define box:band_heading
    define: box
    as: band_heading
    style:
      fill: none
      stroke: none
  - name: define line:grid
    define: line
    as: grid
    style:
      color: '#cccccc'
      width: 0.5
      opacity: 1.0
  - name: define line:axis
    define: line
    as: axis
    style:
      color: lightgrey
      width: 1.0
      opacity: 1.0
  - name: define line:tick
    define: line
    as: tick
    style:
      color: grey
      width: 0.5
      opacity: 1.0
  - name: define line:today
    define: line
    as: today
    style:
      color: tomato
      width: 1.5
      opacity: 1.0
  - name: define line:separator
    define: line
    as: separator
    style:
      color: grey
      width: 0.5
      opacity: 0.5
  - name: define line:connector
    define: line
    as: connector
    style:
      color: grey
      width: 0.5
      opacity: 1.0
      dasharray: 4 2
  - name: define icon:event
    define: icon
    as: event
    style:
      color: navy
      size: 8
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: navy
      size: 8
  - name: define icon:milestone
    define: icon
    as: milestone
    style:
