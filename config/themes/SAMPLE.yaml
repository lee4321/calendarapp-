  - name: bind ec-overflow-icon
    apply_to: element
    select:
      element: ec-overflow-icon
    style:
      use: icon:overflow
  - name: federal holidays — day box tint
    apply_to: box:day
    select:
      federal_holiday: true
    style:
      fill: tomato
      fill_opacity: 0.1
      pattern: diagonal-stripes
      pattern_color: tomato
      pattern_opacity: 0.12
  - name: company nonworkdays — day box tint
    apply_to: box:day
    select:
      company_holiday: true
    style:
      fill: gold
      fill_opacity: 0.1
  - name: sprint durations
    apply_to: box:duration
    select:
      task_name:
        - Sprint
      event_type: duration
    style:
      fill: steelblue
      fill_opacity: 0.5
      stroke: steelblue
      stroke_width: 1.0
  - name: priority 1 — box outline
    apply_to: box:event
    select:
      priority: 1
    style:
      stroke: crimson
      stroke_width: 1.5
  - name: priority 1 — event name
    apply_to: text:event_name
    select:
      priority: 1
    style:
      color: crimson
      weight: bold
  - name: completed items — visual fade
    apply_to:
      - box:event
      - box:duration
      - text:event_name
    select:
      percent_complete:
        min: 100
    style:
      fill: '#f4f4f4'
      color: grey
      italic: true
  - name: critical milestone — marker
    apply_to: icon:milestone
    select:
      priority_min: 1
    style:
      icon: flag
      color: red
      size: 14
  - name: critical milestone — label
    apply_to: text:milestone_label
    select:
      priority_min: 1
    style:
      color: red
      weight: bold
  - name: month band — segment fill
    apply_to: box:band
    select:
      band: month
    style:
      fill:
        - lightblue
        - lightyellow
  - name: month band — label
    apply_to: text:band_label
    select:
      band: month
    style:
      color: navy
  - name: month separator vertical line
    apply_to: box:vline
    select:
      band: month
      repeat: true
    style:
      align: end
      stroke: grey
      stroke_width: 1.0
      stroke_opacity: 0.33
      dasharray: 5,5
  - name: Engineering — heading
    apply_to: box:swimlane_heading
    select:
      swimlane: Engineering
    style:
      fill: '#dceaff'
  - name: Engineering — label
    apply_to: text:swimlane_label
    select:
      swimlane: Engineering
    style:
      color: navy
  - name: Design — heading
    apply_to: box:swimlane_heading
    select:
      swimlane: Design
    style:
      fill: '#e7defb'
  - name: Design — label
    apply_to: text:swimlane_label
    select:
      swimlane: Design
    style:
      color: indigo
  - name: QA — heading
    apply_to: box:swimlane_heading
    select:
      swimlane: QA
    style:
      fill: '#ffe1de'
  - name: QA — label
    apply_to: text:swimlane_label
    select:
      swimlane: QA
    style:
      color: firebrick
  - name: Operations — heading
    apply_to: box:swimlane_heading
    select:
      swimlane: Operations
    style:
      fill: '#fff3d8'
  - name: Operations — label
    apply_to: text:swimlane_label
    select:
      swimlane: Operations
    style:
      color: darkgoldenrod
  - name: Other — heading
    apply_to: box:swimlane_heading
    select:
      swimlane: Other
    style:
      fill: '#f0f0f0'
  - name: Other — label
    apply_to: text:swimlane_label
    select:
      swimlane: Other
    style:
      color: dimgrey
  - name: route engineering tasks
    apply_to: lane
    select:
      resource_group:
        - engineering
        - dev
        - eng
    style:
      swimlane: Engineering
  - name: route design tasks
    apply_to: lane
    select:
      resource_group:
        - design
        - ux
    style:
      swimlane: Design
  - name: route qa tasks
    apply_to: lane
    select:
      resource_group:
        - qa
        - test
    style:
      swimlane: QA
  - name: route ops tasks
    apply_to: lane
    select:
      resource_group:
        - ops
        - operations
        - sre
    style:
      swimlane: Operations
  - name: catch-all
    apply_to: lane
    select: {}
    style:
      swimlane: Other

