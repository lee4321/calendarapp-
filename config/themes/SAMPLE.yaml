# ═══════════════════════════════════════════════════════════════════════════
# SAMPLE.yaml — complete annotated reference theme
# See design_unified_style_rules.html §11.3.
#
# Every required key for every visualizer is present and uncommented.
# Optional features (patterns, content rules, swimlane fills, milestone
# halos, etc.) appear with annotated examples so readers can copy them
# directly.  Render any subcommand against SAMPLE.yaml — weekly, mini,
# mini-icon, text-mini, timeline, blockplan, compactplan, excelheader —
# and you should get a sensible output.  basic.yaml is the smaller
# companion file with only the required-key floor.
#
# Reading this file
# -----------------
# Each top-level section opens with a fixed one-line purpose comment
# matching the convention in design §11.5.  Inside sections, inline
# comments explain non-obvious values.  Look in USER_GUIDE.md "Complex
# Structures Reference" for the full vocabulary of select / apply_to /
# style keys; this file is the example.
# ═══════════════════════════════════════════════════════════════════════════


# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: SAMPLE
  version: "3.0"
  description: Annotated reference theme for the unified style_rules schema.

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: FiraSans-ExtraLight    # any font name from the registry
  default_missing_icon: applet-closed # shown when an event references an unknown icon

# ─── layout ────────────────────────────────────────────────────────────────
# Page margins (numeric points or unit-suffixed values like 0.5in).
layout:
  margin:
    top: 0.5in
    right: 0.5in
    bottom: 0.5in
    left: 0.5in

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  left:   { text: "{theme.name}" }     # placeholder expansions are documented in USER_GUIDE
  center: { text: "{calendar.range}" }
  right:  { text: "{today}" }

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  left:   { text: "" }
  center: { text: "" }
  right:  { text: "p. {page}" }

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  # Which order events stack in each day cell. Tokens:
  #   priority      — sort by event priority
  #   alphabetical  — sort by task name
  #   milestones    — milestones to top
  #   events / durations — favor that type first
  item_placement_order: [priority]

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  stroke_dasharray: null  # null = solid; e.g. "4 2" for dashed bars

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: ""               # empty disables the watermark
  rotation_angle: 45.0
  resize_mode: fit       # fit | stretch

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  year_offset: null  # null = auto; 0 = start year; 1 = start year + 1; -1 = start year − 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.  Names come from the DB palettes table —
# run `ecalendar.py palettes` to list available palettes.
colors:
  month_palette: Pastel1
  fiscal_palette: Blues
  group_palette: Set2
  federal_holiday:
    alpha: 0.25
  company_holiday:
    alpha: 0.25
  resource_groups:
    engineering: steelblue
    design:      mediumpurple
    qa:          tomato
    ops:         goldenrod

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  week_numbers:
    label_format: "W{num:02d}"
  overflow:
    icon: overflow

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  title_format: "MMMM YYYY"
  week_number_label_format: "W{num}"
  icon_set: squares           # squares | circles | squircles (and dark- variants)

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  output_suffix: _details
  title_text: Event Details
  headers: [Start Date, Name / Description, Milestone, Days, Group]
  column_widths: [0.16, 0.52, 0.10, 0.10, 0.12]

# ─── text_mini ─────────────────────────────────────────────────────────────
# text-mini glyph-set declarations; not an SVG renderer.
text_mini:
  cell_width: 2
  month_gap: 4
  duration_fill: "■"
  event_symbols:     ["•", "○", "◐"]
  milestone_symbols: ["◆", "◇"]
  holiday_symbols:   ["✕"]
  nonworkday_symbols: ["·"]

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  tick_label_format: "M/D"
  today_date: ""
  today_label_text: Today
  marker_radius: 4.2
  icon_size: 8
  callout_offset_y: 30.0
  duration_offset_y: 30.0
  duration_lane_gap_y: 8.0

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  legend_area_ratio: 0.28
  bands: [date_range, week]   # references into time_bands: (see §10 of the design)

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  fiscal_year_start_month: 2
  week_start: 0           # 0 = Monday, 6 = Sunday
  label_column_ratio: 0.10
  band_row_height: 12.0
  lane_match_mode: first  # first | all
  show_unmatched_lane: true
  unmatched_lane_name: Other
  # Lane *list* lives here.  Lane *styling* lives in style_rules below.
  swimlanes:
    - name: Engineering
    - name: Design
    - name: QA
      split_ratio: 0.0   # 0.0 removes the events/durations divider
    - name: Operations
    - name: Other
  top_bands:   [fiscal_quarter, month]
  bottom_bands: []

# ─── excelheader ───────────────────────────────────────────────────────────
# XLSX-only config: band-row geometry, system-font names per band
# (deliberate exception, not style_rules), and Excel cell-border
# vertical lines.
excelheader:
  font_name: Calibri
  font_size: 9
  band_row_height: 18.0
  top_bands: [fiscal_quarter, month]
  band_fonts:
    fiscal_quarter:
      excel_font_name: Calibri
      excel_font_size: 10
  # Optional cell-border vertical lines (no style_rules equivalent — XLSX exception).
  vertical_lines: []
  # Example:
  # vertical_lines:
  #   - band: month
  #     repeat: true
  #     align: end       # start | center | end
  #     color: navy
  #     width: 2.0

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  fiscal_quarter:
    unit: fiscal_quarter
    label: Fiscal Quarter
    label_format: "FY{fy2} Q{q}"
    show_every: 1
  month:
    unit: month
    label: Month
    date_format: "MMM"
    show_every: 1
  week:
    unit: week
    label: Week
    label_format: "Week {n}"
  date_range:
    unit: week
    label: Date Range
    label_format: "{start} – {end}"
  # Countdown band: each day cell shows days remaining to a target.
  # Uncomment and set target_date to enable.
  # countdown_launch:
  #   unit: countdown
  #   label: Days to Launch
  #   target_date: "2026-06-30"
  #   skip_weekends: true
  #   label_format: "{n}d"

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:

  # ── Text tokens ──────────────────────────────────────────────────────────
  - { name: define text:base,          define: text, as: base,          style: { font: FiraSans-ExtraLight, size: 9,  color: black } }
  - { name: define text:heading,       define: text, as: heading,       style: { font: FiraSans-Bold,       size: 11, color: black } }
  - { name: define text:body,          define: text, as: body,          style: { font: FiraSans-ExtraLight, size: 8,  color: black } }
  - { name: define text:caption,       define: text, as: caption,       style: { font: FiraSans-ExtraLight, size: 7,  color: dimgrey } }
  - { name: define text:label,         define: text, as: label,         style: { font: FiraSans-ExtraLight, size: 7,  color: grey } }
  - { name: define text:day_number,    define: text, as: day_number,    style: { font: Roboto-Bold,         size: 11, color: black } }
  - { name: define text:month_title,   define: text, as: month_title,   style: { font: Roboto-Bold,         size: 9,  color: black } }
  - { name: define text:week_number,   define: text, as: week_number,   style: { font: FiraSans-ExtraLight, size: 7,  color: grey } }
  - { name: define text:event_name,    define: text, as: event_name,    style: { font: FiraSans-ExtraLight, size: 8,  color: navy } }
  - { name: define text:event_notes,   define: text, as: event_notes,   style: { font: FiraSans-ExtraLight, size: 7,  color: darkgrey } }
  - { name: define text:event_date,    define: text, as: event_date,    style: { font: FiraSans-ExtraLight, size: 7,  color: darkgrey } }
  - { name: define text:duration_date, define: text, as: duration_date, style: { font: FiraSans-ExtraLight, size: 7,  color: darkgrey } }
  - { name: define text:holiday_title, define: text, as: holiday_title, style: { font: FiraSans-ExtraLight, size: 7,  color: black } }
  - { name: define text:today_label,   define: text, as: today_label,   style: { font: FiraSans-ExtraLight, size: 7,  color: tomato } }
  - { name: define text:fiscal_label,  define: text, as: fiscal_label,  style: { font: FiraSans-ExtraLight, size: 7,  color: navy } }
  - { name: define text:swimlane_label, define: text, as: swimlane_label, style: { font: Roboto-Bold,       size: 8,  color: black } }
  - { name: define text:band_label,    define: text, as: band_label,    style: { font: FiraSans-ExtraLight, size: 7,  color: black } }
  - { name: define text:milestone_label, define: text, as: milestone_label, style: { font: Roboto-Bold,     size: 7,  color: navy } }

  # ── Text tokens: paper-size override example ─────────────────────────────
  # Shrink the heading on small papers.
  - name: text:heading — small paper
    apply_to: text:heading
    select: { papersize: [3x5, 5x8] }
    style: { size: 8 }

  # ── Box tokens ───────────────────────────────────────────────────────────
  - { name: define box:default,           define: box, as: default,           style: { fill: white, fill_opacity: 1.0, stroke: none } }
  - { name: define box:cell,              define: box, as: cell,              style: { fill: none, stroke: grey, stroke_width: 0.5, stroke_opacity: 0.5 } }
  - { name: define box:header,            define: box, as: header,            style: { fill: none, stroke: none } }
  - { name: define box:callout,           define: box, as: callout,           style: { fill: white, fill_opacity: 0.85, stroke: grey, stroke_width: 0.5 } }
  - { name: define box:highlight,         define: box, as: highlight,         style: { fill: lightblue, fill_opacity: 0.3, stroke: none } }
  - { name: define box:day,               define: box, as: day,               style: { fill: none, stroke: grey, stroke_width: 0.5, stroke_opacity: 0.5 } }
  - { name: define box:event,             define: box, as: event,             style: { fill: none, stroke: none } }
  - { name: define box:duration,          define: box, as: duration,          style: { fill: steelblue, fill_opacity: 0.35, stroke: navy, stroke_width: 0.5 } }
  - { name: define box:milestone,         define: box, as: milestone,         style: { fill: none, stroke: none } }
  - { name: define box:vline,             define: box, as: vline,             style: { fill: none, stroke: grey, stroke_width: 0.5 } }
  - { name: define box:swimlane_heading,  define: box, as: swimlane_heading,  style: { fill: "#f4f4f4", stroke: grey, stroke_width: 0.5 } }
  - { name: define box:swimlane_content,  define: box, as: swimlane_content,  style: { fill: none, stroke: none } }
  - { name: define box:band,              define: box, as: band,              style: { fill: none, stroke: grey, stroke_width: 0.5, stroke_opacity: 0.5 } }
  - { name: define box:band_heading,      define: box, as: band_heading,      style: { fill: none, stroke: none } }

  # ── Line tokens ──────────────────────────────────────────────────────────
  - { name: define line:grid,      define: line, as: grid,      style: { color: "#cccccc", width: 0.5, opacity: 1.0 } }
  - { name: define line:axis,      define: line, as: axis,      style: { color: lightgrey, width: 1.0, opacity: 1.0 } }
  - { name: define line:tick,      define: line, as: tick,      style: { color: grey,      width: 0.5, opacity: 1.0 } }
  - { name: define line:today,     define: line, as: today,     style: { color: tomato,    width: 1.5, opacity: 1.0 } }
  - { name: define line:separator, define: line, as: separator, style: { color: grey,      width: 0.5, opacity: 0.5 } }
  - { name: define line:connector, define: line, as: connector, style: { color: grey,      width: 0.5, opacity: 1.0, dasharray: "4 2" } }

  # ── Icon tokens ──────────────────────────────────────────────────────────
  - { name: define icon:event,     define: icon, as: event,     style: { color: navy,  size: 8 } }
  - { name: define icon:duration,  define: icon, as: duration,  style: { color: navy,  size: 8 } }
  - { name: define icon:milestone, define: icon, as: milestone, style: { icon: diamond, color: gold, size: 12 } }
  - { name: define icon:overflow,  define: icon, as: overflow,  style: { icon: chevron-down, color: grey, size: 8 } }

  # ══════════════════════════════════════════════════════════════════════════
  # Element bindings — connect ec-* CSS classes to the token they should use.
  # ══════════════════════════════════════════════════════════════════════════

  - { name: bind ec-heading,       apply_to: element, select: { element: ec-heading },       style: { use: text:heading } }
  - { name: bind ec-label,         apply_to: element, select: { element: ec-label },         style: { use: text:label } }
  - { name: bind ec-day-number,    apply_to: element, select: { element: ec-day-number },    style: { use: text:day_number } }
  - { name: bind ec-month-title,   apply_to: element, select: { element: ec-month-title },   style: { use: text:month_title } }
  - { name: bind ec-week-number,   apply_to: element, select: { element: ec-week-number },   style: { use: text:week_number } }
  - { name: bind ec-fiscal-label,  apply_to: element, select: { element: ec-fiscal-label },  style: { use: text:fiscal_label } }
  - { name: bind ec-event-name,    apply_to: element, select: { element: ec-event-name },    style: { use: text:event_name } }
  - { name: bind ec-event-notes,   apply_to: element, select: { element: ec-event-notes },   style: { use: text:event_notes } }
  - { name: bind ec-event-date,    apply_to: element, select: { element: ec-event-date },    style: { use: text:event_date } }
  - { name: bind ec-duration-date, apply_to: element, select: { element: ec-duration-date }, style: { use: text:duration_date } }
  - { name: bind ec-holiday-title, apply_to: element, select: { element: ec-holiday-title }, style: { use: text:holiday_title } }
  - { name: bind ec-today-label,   apply_to: element, select: { element: ec-today-label },   style: { use: text:today_label } }
  - { name: bind ec-header-text,   apply_to: element, select: { element: ec-header-text },   style: { use: text:heading } }
  - { name: bind ec-footer-text,   apply_to: element, select: { element: ec-footer-text },   style: { use: text:caption } }
  - { name: bind ec-watermark,     apply_to: element, select: { element: ec-watermark },     style: { use: text:heading } }
  - { name: bind ec-background,    apply_to: element, select: { element: ec-background },    style: { use: box:default } }
  - { name: bind ec-cell,          apply_to: element, select: { element: ec-cell },          style: { use: box:cell } }
  - { name: bind ec-heading-cell,  apply_to: element, select: { element: ec-heading-cell },  style: { use: box:header } }
  - { name: bind ec-callout-box,   apply_to: element, select: { element: ec-callout-box },   style: { use: box:callout } }
  - { name: bind ec-day-box,       apply_to: element, select: { element: ec-day-box },       style: { use: box:day } }
  - { name: bind ec-band-cell,     apply_to: element, select: { element: ec-band-cell },     style: { use: box:band } }
  - { name: bind ec-grid-line,     apply_to: element, select: { element: ec-grid-line },     style: { use: line:grid } }
  - { name: bind ec-axis-line,     apply_to: element, select: { element: ec-axis-line },     style: { use: line:axis } }
  - { name: bind ec-axis-tick,     apply_to: element, select: { element: ec-axis-tick },     style: { use: line:tick } }
  - { name: bind ec-today-line,    apply_to: element, select: { element: ec-today-line },    style: { use: line:today } }
  - { name: bind ec-separator,     apply_to: element, select: { element: ec-separator },     style: { use: line:separator } }
  - { name: bind ec-connector,     apply_to: element, select: { element: ec-connector },     style: { use: line:connector } }
  - { name: bind ec-event-icon,    apply_to: element, select: { element: ec-event-icon },    style: { use: icon:event } }
  - { name: bind ec-duration-icon, apply_to: element, select: { element: ec-duration-icon }, style: { use: icon:duration } }
  - { name: bind ec-overflow-icon, apply_to: element, select: { element: ec-overflow-icon }, style: { use: icon:overflow } }

  # ══════════════════════════════════════════════════════════════════════════
  # Content rules — match by day context / event criteria / band segment.
  # ══════════════════════════════════════════════════════════════════════════

  # Federal holidays: tint the day box red.
  - name: federal holidays — day box tint
    apply_to: box:day
    select: { federal_holiday: true }
    style:
      fill: tomato
      fill_opacity: 0.10
      pattern: diagonal-stripes
      pattern_color: tomato
      pattern_opacity: 0.12

  # Company nonworkdays: subtle gold tint.
  - name: company nonworkdays — day box tint
    apply_to: box:day
    select: { company_holiday: true }
    style: { fill: gold, fill_opacity: 0.10 }

  # Sprint durations: thicker steelblue bar.
  - name: sprint durations
    apply_to: box:duration
    select:
      task_name: [Sprint]
      event_type: duration
    style:
      fill: steelblue
      fill_opacity: 0.5
      stroke: steelblue
      stroke_width: 1.0

  # High-priority events: crimson outline + bold red name.
  - name: priority 1 — box outline
    apply_to: box:event
    select: { priority: 1 }
    style: { stroke: crimson, stroke_width: 1.5 }

  - name: priority 1 — event name
    apply_to: text:event_name
    select: { priority: 1 }
    style: { color: crimson, weight: bold }

  # Completed items fade to grey across box and text in one breath.
  - name: completed items — visual fade
    apply_to: [box:event, box:duration, text:event_name]
    select: { percent_complete: { min: 100 } }
    style:
      fill: "#f4f4f4"
      color: grey
      italic: true

  # Milestones — default gold diamond, red flag for critical ones.
  - name: critical milestone — marker
    apply_to: icon:milestone
    select: { priority_min: 1 }
    style: { icon: flag, color: red, size: 14 }

  - name: critical milestone — label
    apply_to: text:milestone_label
    select: { priority_min: 1 }
    style: { color: red, weight: bold }

  # Per-band styling — alternate colors on the Month band.
  - name: month band — segment fill
    apply_to: box:band
    select: { band: month }
    style: { fill: [lightblue, lightyellow] }   # list = alternate across segments

  - name: month band — label
    apply_to: text:band_label
    select: { band: month }
    style: { color: navy }

  # Vertical lines — pin a dashed line at the end of every Month segment.
  - name: month separator vertical line
    apply_to: box:vline
    select: { band: month, repeat: true }
    style:
      align: end
      stroke: grey
      stroke_width: 1.0
      stroke_opacity: 0.33
      dasharray: "5,5"

  # ══════════════════════════════════════════════════════════════════════════
  # Swimlane visuals (blockplan) — heading fill, content tint, label color.
  # ══════════════════════════════════════════════════════════════════════════

  - { name: Engineering — heading, apply_to: box:swimlane_heading, select: { swimlane: Engineering }, style: { fill: "#dceaff" } }
  - { name: Engineering — label,   apply_to: text:swimlane_label,  select: { swimlane: Engineering }, style: { color: navy } }
  - { name: Design — heading,      apply_to: box:swimlane_heading, select: { swimlane: Design },      style: { fill: "#e7defb" } }
  - { name: Design — label,        apply_to: text:swimlane_label,  select: { swimlane: Design },      style: { color: indigo } }
  - { name: QA — heading,          apply_to: box:swimlane_heading, select: { swimlane: QA },          style: { fill: "#ffe1de" } }
  - { name: QA — label,            apply_to: text:swimlane_label,  select: { swimlane: QA },          style: { color: firebrick } }
  - { name: Operations — heading,  apply_to: box:swimlane_heading, select: { swimlane: Operations },  style: { fill: "#fff3d8" } }
  - { name: Operations — label,    apply_to: text:swimlane_label,  select: { swimlane: Operations },  style: { color: darkgoldenrod } }
  - { name: Other — heading,       apply_to: box:swimlane_heading, select: { swimlane: Other },       style: { fill: "#f0f0f0" } }
  - { name: Other — label,         apply_to: text:swimlane_label,  select: { swimlane: Other },       style: { color: dimgrey } }

  # ══════════════════════════════════════════════════════════════════════════
  # Lane routing — first match wins.  Each rule directs matched content into
  # a specific swimlane.  A catch-all with empty select: at the end is a good
  # safety net.
  # ══════════════════════════════════════════════════════════════════════════

  - name: route engineering tasks
    apply_to: lane
    select: { resource_group: [engineering, dev, eng] }
    style: { swimlane: Engineering }

  - name: route design tasks
    apply_to: lane
    select: { resource_group: [design, ux] }
    style: { swimlane: Design }

  - name: route qa tasks
    apply_to: lane
    select: { resource_group: [qa, test] }
    style: { swimlane: QA }

  - name: route ops tasks
    apply_to: lane
    select: { resource_group: [ops, operations, sre] }
    style: { swimlane: Operations }

  - name: catch-all
    apply_to: lane
    select: {}
    style: { swimlane: Other }
