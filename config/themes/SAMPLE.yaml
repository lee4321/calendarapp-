    style:
      use: text:duration_date
  - name: bind ec-holiday-title
    apply_to: element
    select:
      element: ec-holiday-title
    style:
      use: text:holiday_title
  - name: bind ec-today-label
    apply_to: element
    select:
      element: ec-today-label
    style:
      use: text:today_label
  - name: bind ec-header-text
