      fill: white
      fill_opacity: 0.25
      stroke: grey
      stroke_width: 1.0
  - name: define line:grid
    define: line
    as: grid
    style:
      color: grey
      width: 0.5
      opacity: 0.3
  - name: define line:separator
    define: line
