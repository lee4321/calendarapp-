# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJXweekly
  version: '2.0'
  description: TJX colors and style — weekly calendar only

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: PlaywriteDEGrund-VariableFont_wght
  default_missing_icon: applet-closed

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: PlaywriteDEGrund-VariableFont_wght
  font_color: grey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: blue
  item_placement_order:
    - priority

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: navy
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: blue
  font_family: PlaywriteDEGrund-VariableFont_wght
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 45.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: colorblind1
  fiscal_palette: Greys
  group_palette: Pastel1
  hash_lines: black
  resource_groups:
    a: black
    b: yellow
    c: red
    d: grey
  company_holiday:
    alpha: 0.25
    color: gold
  federal_holiday:
    alpha: 0.1
    color: tomato

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  day_names:
    font_family: PlaywriteDEGrund-VariableFont_wght
    font_color: black
  week_numbers:
    font_family: PlaywriteDEGrund-VariableFont_wght
    font_color: yellow
    label_format: W{num:02d}
  day_box:
    stroke_color: black
    stroke_opacity: 0.5
    stroke_width: 1
    stroke_dasharray: null
    fill_color: null
    fill_opacity: 0.25
    number_font: PlaywriteDEGrund-VariableFont_wght
    number_color: '#FF7800'
    icon_color: red
    font_color: black
    hash_pattern_opacity: 0.1
  name_text:
    font_name: PlaywriteDEGrund-VariableFont_wght
    font_color: black
    font_size: 18
  notes_text:
    font_name: AlumniSansPinstripe-Italic
    font_color: grey
    font_size: 14
  overflow:
    icon: warningtriangle
    color: red

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 14
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 12
  - name: define text:heading
    define: text
    as: heading
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 14
      color: grey
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 10
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 8
  - name: define text:body
    define: text
    as: body
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: white
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: PlaywriteDEGrund-VariableFont_wght
      size: 12
      color: grey
