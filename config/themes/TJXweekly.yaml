      color: black
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: '#F8F8FF'
      fill_opacity: 0.25
      stroke: black
      stroke_width: 0.5
      stroke_opacity: 0.5
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
