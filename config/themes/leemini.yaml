# Lee's Theme

theme:
  name: "Lee's Test Theme"
  version: "1.0"
  description: "Testing various elements "

# ── General Settings ──────────────────────────────────────────────────────────
# page layout
# Supported units: pt, in, mm, cm, px (or no unit = points).
layout:
    margin:
      top: "1.0in"
      right: "10mm"
      bottom: "2cm"
      left:
        value: 0.5
        unit: "in"

base:
  font_family: "NotoSans-Condensed"
  font_color: "darkslategrey"
  default_missing_icon: null


header:
  font_family: "Offside-Regular"
  left:
    font_color: "midnightblue"
  center:
    font_color: "midnightblue"
  right:
    font_color: "midnightblue"

footer:
  font_family: "Offside-Regular"
  font_color: "slategrey"
  left:
    font_color: "midnightblue"
  center:
    font_color: "midnightblue"
  right:
    font_color: "midnightblue"

events:
  font_family:
  font_color: "darkslategrey"
  icon_color: "steelblue"
  notes_font: "NotoSans-CondensedLightItalic"
  notes_color: "red"
  item_placement_order: ["priority"]

durations:
  font_family:
  font_color: "darkslategrey"
  icon_color: "steelblue"
  notes_font: "NotoSans-CondensedLightItalic"
  notes_color: "red"
  stroke_dasharray: null

watermark:
  text: null
  color: "lightsteelblue"
  font_family: "Roboto-Bold"
  alpha: 0.15
  font_size: null
  resize_mode: "fit"
  rotation_angle: 0.0
  imagemark_rotation_angle: 0.0

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  # How to number fiscal years relative to the start calendar year:
  #   null (default): auto — blockplan uses +1 for non-Jan starts, 0 for Jan;
  #                   weekly/NRF uses 0 (start year).
  #   0: start year (FY starting Feb 2026 → FY2026)
  #   1: start year + 1 (FY starting Oct 2025 → FY2026, US federal default)
  #  -1: start year − 1
  year_offset: null

colors:
  month_palette: "Pastel1"
  fiscal_palette: "Pastel1"
  group_palette: "Set3"
  special_day: "lightskyblue"
  hash_lines: "lightsteelblue"
  federal_holiday:
    color: "royalblue"
    alpha: 0.2
  company_holiday:
    color: "mediumseagreen"
    alpha: 0.2
  special_day_types:
    federal: "royalblue"
    company: "mediumseagreen"
    nonworkday: "lavender"
    furlough: "lightsteelblue"
    special: "khaki"
  resource_groups:
    a: "midnightblue"
    b: "steelblue"
    c: "cadetblue"
    d: "slategrey"

# ── Weekly Calendar ───────────────────────────────────────────────────────────
weekly:
  day_names:
    font_family:
    font_color:
    size_rule:
      - font_size: 14
        when:
          papersize: ["letter", "ledger", "tabloid"]


  week_numbers:
    font_family:
    font_color: "red"
    label_format: "W{num:d}"

  day_box:
    stroke_color: "lightsteelblue"
    stroke_opacity: 0.4
    stroke_width: 1
    stroke_dasharray: null
    fill_color: "aliceblue"
    fill_opacity: 0.2
    number_font:
    number_color: "midnightblue"
    icon_color: "steelblue"
    font_color: "darkslategrey"
    hash_pattern_opacity: 0.10
    hash_rules:
      # Federal holidays: deeper royal blue bamboo
      - pattern: "bamboo"
        color: "royalblue"
        opacity: 0.12
        when:
          federal_holiday: true
      # Non-work days
      - pattern: "egg-fried"
        color: "white"
        opacity: 0.20
        when:
          nonworkday: true
      # Completed tasks: sea green bamboo (delivery done)
      - pattern: "bamboo"
        color: "mediumseagreen"
        opacity: 0.12
        when:
          percent_complete: 100
      # Urgent/blocker notes: tomato bamboo (attention needed)
      - pattern: "bamboo"
        color: "tomato"
        opacity: 0.12
        when:
          notes: ["urgent", "blocker"]
      # Top-level WBS items: powder blue bamboo
      - pattern: "bamboo"
        color: "powderblue"
        opacity: 0.10
        when:
          wbs: ["1."]
      # Specific resource assigned: plum bamboo
      - pattern: "bamboo"
        color: "plum"
        opacity: 0.08
        when:
          resource_names: ["Alice"]
      # Dev/ops group days: slate blue bamboo
      - pattern: "bamboo"
        color: "slateblue"
        opacity: 0.10
        when:
          resource_group: ["dev", "ops"]

  overflow:
    icon: "overflow"
    color: "darkorange"

# ── Timeline ──────────────────────────────────────────────────────────────────
timeline:
  background_color: "midnightblue"
  axis_color: "aliceblue"
  axis_opacity: 0.9
  axis_width: 2
  tick_color: "lightsteelblue"
  date_format: "MMM D"
  tick_label_format: "MMM YY"
  today_date: ""
  today_label_text: "Today"
  today_label_offset_y: 10.0
  today_line_color: "lightsteelblue"
  today_label_color: "aliceblue"
  marker_stroke_color: "midnightblue"
  marker_stroke_width: 1.0
  marker_radius: 4.2
  icon_size: 10.0
  callout_offset_y: 96.0
  duration_offset_y: 44.0
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.0
  duration_bar_fill_opacity: 0.25
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_stroke_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: null
  duration_bracket_stroke_dasharray: null
  top_colors: ["lightskyblue", "khaki", "tomato", "mediumturquoise", "white"]
  bottom_colors: ["cadetblue", "mediumseagreen", "lightskyblue", "khaki", "tomato"]
  title:
    font_family: "Roboto-Bold"
    font_color: "aliceblue"
  notes:
    font_family: "RobotoCondensed-Bold"
    font_color: "lightsteelblue"
  date:
    font_family: "Roboto-Bold"
    font_color: "aliceblue"

timeline_events:
  name_font_size: null
  notes_font_size: null
  box_width: null
  box_height: null
  text_color: ""

timeline_durations:
  name_font_size: null
  notes_font_size: null
  box_width: null
  box_height: null
  text_color: ""
  date_font: ""
  date_font_size: null
  date_color: ""

# ── Block Plan ────────────────────────────────────────────────────────────────
blockplan:
  background_color: "none"
  grid_color: "grey"
  grid_opacity: 0.6
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_line_color: null     # null → inherits grid_color
  timeband_line_width: null     # null → inherits grid_line_width
  timeband_line_opacity: null   # null → inherits grid_opacity
  timeband_line_dasharray: null
  label_column_ratio: 0.16
  band_row_height: 10.0
  fiscal_year_start_month: 10
  week_start: 0
  show_unmatched_lane: true
  unmatched_lane_name: "Unmatched"
  lane_match_mode: "first"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_label_color: "black"
  header_label_opacity: 1.0
  header_label_align_h: "left"
  header_heading_fill_color: "none"
  band_font: "RobotoCondensed-Bold"
  band_font_size: null
  timeband_label_color: "black"
  timeband_label_opacity: 1.0
  timeband_fill_color: "none"
  timeband_fill_palette: []
  timeband_fill_opacity: 1.0
  lane_heading_fill_color: "none"
  lane_label_font: "RobotoCondensed-Bold"
  lane_label_font_size: null
  lane_label_color: "black"
  lane_label_align_h: "right"
  lane_label_align_v: "middle"
  lane_label_rotation: 0          # clockwise degrees; 0=horizontal, -90=bottom-to-top, 90=top-to-bottom
  event_font: "RobotoCondensed-Light"
  event_font_size: null
  event_color: "midnightblue"
  event_show_date: false
  event_date_font: "RobotoCondensed-Light"
  event_date_font_size: null
  event_date_color: "grey"
  event_date_format: "YYYY-MM-DD"
  marker_radius: 2.0
  # Global style defaults for all vertical lines (overridable per entry).
  vertical_line_color: "coral"
  vertical_line_width: 1.5
  vertical_line_dasharray: null        # e.g. "6,3" for dashes
  vertical_line_opacity: 0.85
  vertical_line_fill_color: "none"     # default: no fill; set to a color, list, or palette name
  vertical_line_fill_opacity: 0.2
  # Each entry pins a line (and optional column fill) to a time-band segment.
  #   band:         time band label (case-insensitive)
  #   align:        start | center | end  (default: start)
  #   repeat:       true → apply to every segment in the band; omit value when using repeat
  #   value:        rendered segment label to match (required when repeat is absent/false)
  #   color / width / opacity / dash_array: per-line style overrides
  #   fill_color:   column fill; single color, list of colors, or palette name (cycles per segment)
  #   fill_opacity: fill opacity 0–1 (default: vertical_line_fill_opacity)
  vertical_lines:
    - band: "Sprint"
      repeat: true
      align: "end"
      fill_color: ["#fff8f0", "none"]
  # vertical_lines:
  #   - band: "Sprint"
  #     repeat: true                   # draw after every sprint
  #     align: "end"
  #   - band: "PI"
  #     value: "PI 5"
  #     align: "end"
  #     color: "sienna"
  #     width: 2.0
  #     dash_array: "8,4"
  duration_font: "RobotoCondensed-Light"
  duration_font_size: null
  duration_color: "midnightblue"
  duration_fill_opacity: 0.35
  duration_stroke_color: null         # null → falls back to duration_color
  duration_stroke_width: 1.0
  duration_stroke_opacity: 0.9
  duration_stroke_dasharray: null
  duration_bar_height: 8.0
  palette: ["lightskyblue", "khaki", "tomato", "springgreen", "plum", "khaki"]
  swimlanes:
    - name: "Engineering & \nDevelopment"
      match:
        resource_groups: ["engineering", "dev"]
    - name: "Operations"
      match:
        resource_groups: ["operations", "ops"]
    - name: "Quality"
      match:
        resource_groups: ["quality", "qa"]
  top_time_bands:
    - label: "Fiscal Quarter"
      unit: "fiscal_quarter"
      label_format: "FY{fy} Q{q}"
      fill_color: "none"
      show_every: 1
    - label: "PI"
      unit: "interval"
      interval_days: 70
      prefix: "PI "
      start_index: 1
      fill_color: "none"
      show_every: 1
    - label: "Sprint"
      unit: "interval"
      interval_days: 14
      prefix: "Sprint "
      start_index: 1
      fill_color: "none"
      show_every: 1
    - label: "Month"
      unit: "month"
      date_format: "MMM YYYY"
      fill_color: "none"
      show_every: 1
    - label: "Week Number"
      unit: "week"
      label_format: "Week {week}"
      fill_color: "none"
      show_every: 1
    - label: "Date"
      unit: "date"
      date_format: "D"
      fill_color: "none"
      show_every: 1
    - label: "DoW"
      unit: "dow"
      date_format: "ddd"
      fill_color: "none"
      show_every: 1

# ── Mini Calendar ─────────────────────────────────────────────────────────────
  bottom_time_bands: []    # mirror of top_time_bands for bands at the bottom of the SVG
mini_calendar:
  cell_font: "FiraCode-Regular"
  cell_bold_font: "FiraCode-Bold"
  cell_font_size: 18
  title_font: "FiraCode-Regular"
  title_font_size: null
  title_format: "MMMM YYYY"
  title_color: "midnightblue"
  header_font: "FiraCode-Regular"
  header_font_size: null
  header_color: "slategrey"
  day_number_glyphs: null
  day_number_digits: null
  day_color: "darkslategrey"
  adjacent_month_color: "lightsteelblue"
  show_adjacent: true
  holiday_color: "royalblue"
  nonworkday_shade: "aliceblue"
  milestone_color: "midnightblue"
  circle_milestones: true
  milestone_stroke_color: "midnightblue"
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: "lightskyblue"
  week_number_font: "FiraCode-Regular"
  week_number_font_size: null
  week_number_color: "slategrey"
  week_number_label_format: "W{num}"
  grid_line_stroke_color: "lightgrey"
  grid_line_stroke_width: 0.25
  grid_line_stroke_opacity: 0.5
  grid_line_stroke_dasharray: null
  cell_box_stroke_dasharray: null
  strikethrough_stroke_dasharray: null
  hash_line_stroke_dasharray: null
  duration_bar_stroke_dasharray: "3 1"
  duration_bar_stroke_opacity: null
  day_box:
    hash_rules: []
    # hash_rules:
    #   - pattern: "brick-wall"
    #     color: "lightsteelblue"
    #     when:
    #       milestone: true

mini_details:
  title_text: "Event Details"
  title_font: "Roboto-Bold"
  title_font_size: null
  title_color: "midnightblue"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_color: "slategrey"
  row_font: "RobotoCondensed-Light"
  row_font_size: null
  row_color: "darkslategrey"
  notes_font: "RobotoCondensed-Italic"
  notes_font_size: null
  notes_color: "slategrey"
  separator_stroke_dasharray: null
  headers:
    - "Start Date"
    - "Name / Description"
    - "Milestone"
    - "Priority"
    - "Group"
  column_widths: [0.16, 0.52, 0.10, 0.10, 0.12]

text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null 
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null 
  holiday_symbols: null 
  nonworkday_symbols: null 
  duration_symbols: null
  duration_fill: null


# ─────────────────────────────────────────────────────────────────────────────
# COMPACT_PLAN — Compressed activities / duration-line view
# ─────────────────────────────────────────────────────────────────────────────
compact_plan:
  palette: ["lightskyblue", "khaki", "springgreen", "plum", "mediumturquoise", "salmon"]
  axis_color: "#8fa8c8"
  axis_dasharray: "2,6"
  band_text_color: "#3a5070"
  milestone_color: "#3a5070"
  legend_label_color: "#5a7090"
  time_bands:
    - label: "Date Range"
      unit: "week"
      label_format: "{start} – {end}"
      fill_color: "none"
      alt_fill_color: "#edf3fa"
    - label: "Week"
      unit: "week"
      label_format: "Week {n}"
      fill_color: "none"
      alt_fill_color: "none"
