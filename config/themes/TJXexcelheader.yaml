# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: TJXexcelheader
  version: '2.0'
  description: TJX style — excelheader Excel workbook only

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: 1

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  company_holiday:
    alpha: 0.25
    color: gold
  federal_holiday:
    alpha: 0.1
    color: tomato

# ─── excelheader ───────────────────────────────────────────────────────────
# XLSX-only config: band-row geometry, system-font names per band
# (deliberate exception, not style_rules), and Excel cell-border
# vertical lines.
excelheader:
  font_name: Calibri
  font_size: 9
  band_row_height: 18
  header_heading_fill_color: none
  header_label_color: Green
  header_label_align_h: right
  timeband_fill_color:
    - iron
    - ivory
    - old silver
    - nickel
    - honeydew
    - smoke
    - bubbles
    - bondi blue
    - anti-flash white
    - roman silver
  timeband_label_color: black
  federal_holiday_fill_color: tomato
  company_holiday_fill_color: gold
  weekend_fill_color: '#E8E8E8'
  federal_holiday_icon: flag-us
  top_bands:
    - band: fiscal_quarter
      row_height: 14
    - band: month
      row_height: 14
    - band: date
      row_height: 14
    - band: dow
      row_height: 14

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  fiscal_quarter:
    unit: fiscal_quarter
    label: Fiscal Quarter
    label_format: Q{q}-FY{fy2}
    show_every: 1
  month:
    unit: month
    label: Month
    date_format: MMMM
    show_every: 1
  date:
    unit: date
    label: Date
    date_format: D
    show_every: 1
  dow:
    unit: date
    label: DoW
    date_format: dd
    show_every: 1

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: band fiscal_quarter — segment
    apply_to: box:band
    select:
      band: fiscal_quarter
    style:
      fill:
        - ghostwhite
        - silver
  - name: band fiscal_quarter — label
    apply_to: text:band_label
    select:
      band: fiscal_quarter
    style:
      color: Black
  - name: band month — segment
    apply_to: box:band
    select:
      band: month
    style:
      fill:
        - white smoke
        - darkgrey
  - name: band month — label
    apply_to: text:band_label
    select:
      band: month
    style:
      color: black
  - name: band date — segment
    apply_to: box:band
    select:
      band: date
    style:
      fill: white
  - name: band date — label
    apply_to: text:band_label
    select:
      band: date
    style:
      color: Black
  - name: band dow — segment
    apply_to: box:band
    select:
      band: dow
    style:
      fill: white
  - name: band dow — label
    apply_to: text:band_label
    select:
      band: dow
    style:
      color: Black
  - name: excelheader_vline_month
    apply_to: box:vline
    select:
      band: Month
      repeat: true
    style:
      align: end
      stroke: grey
      stroke_width: 0.0
      stroke_opacity: 0.33
      fill:
        - '#eef4ff'
        - white
  - name: excelheader_vline_quarter
    apply_to: box:vline
    select:
      band: Fiscal Quarter
      repeat: true
    style:
      align: end
      stroke: navy
      stroke_width: 0.0
      fill:
        - green
        - pink
  - name: excelheader_vline_weekend
    apply_to: box:vline
    select:
      band: Date
      repeat: true
      weekend: true
    style:
      align: center
      stroke: '#888888'
      stroke_width: 0.0
      stroke_opacity: 0.05
      dasharray: 2,3
      fill: '#E8E8E8'
      fill_opacity: 0.4
  - name: excelheader_vline_company_holiday
    apply_to: box:vline
    select:
      band: Date
      repeat: true
      company_holiday: true
    style:
      align: center
      stroke: goldenrod
      stroke_width: 0.0
      stroke_opacity: 0.07
      dasharray: 4,2
      fill: gold
      fill_opacity: 0.3
  - name: excelheader_vline_federal_holiday
    apply_to: box:vline
    select:
      band: Date
      repeat: true
      federal_holiday: true
    style:
      align: center
      stroke: firebrick
      stroke_width: 0.0
      stroke_opacity: 0.25
      fill: tomato
      fill_opacity: 0.5

