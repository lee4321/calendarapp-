# TJX theme — excelheader visualization only.
# Self-contained: every value the excelheader generator needs is set here so
# the .xlsx output never depends on hardcoded fallbacks in config.py.
# excelheader produces an Excel workbook (no SVG), so font tokens, page
# header/footer, and watermark are not required.

theme:
  name: "TJXexcelheader"
  version: "2.0"
  description: "TJX style — excelheader Excel workbook only"

# ══════════════════════════════════════════════════════════════════════════════
# General Settings
# ══════════════════════════════════════════════════════════════════════════════

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  year_offset: +1

colors:
  company_holiday:
    alpha: 0.25
    color: "gold"
  federal_holiday:
    alpha: 0.10
    color: "tomato"

# ══════════════════════════════════════════════════════════════════════════════
# ExcelHeader
# ══════════════════════════════════════════════════════════════════════════════

excelheader:
  font_name: "Calibri"
  font_size: 9
  band_row_height: 18
  header_heading_fill_color: "none"
  header_label_color: "Green"
  header_label_align_h: "right"
  timeband_fill_color: ["iron","ivory","old silver","nickel","honeydew","smoke","bubbles","bondi blue","anti-flash white","roman silver"]
  timeband_label_color: "black"
  federal_holiday_fill_color: "tomato"
  company_holiday_fill_color: "gold"
  weekend_fill_color: "#E8E8E8"
  federal_holiday_icon: flag-us

  top_time_bands:
    - label: "Fiscal Quarter"
      unit: "fiscal_quarter"
      label_format: "Q{q}-FY{fy2}"
      fill_color: ["ghostwhite","silver"]
      show_every: 1
      row_height: 14
      label_color: "Black"
      font_color: "Black"

    - label: "Month"
      unit: "month"
      date_format: "MMMM"
      row_height: 14
      fill_color: ["white smoke","darkgrey"]
      show_every: 1
      label_color: "black"
      font_color: "black"

    - label: "Date"
      unit: "date"
      date_format: "D"
      fill_color: "white"
      row_height: 14
      show_every: 1
      label_color: "Black"
      font_color: "Black"

    - label: "DoW"
      unit: "date"
      date_format: "dd"
      fill_color: "white"
      row_height: 14
      show_every: 1
      label_color: "Black"
      font_color: "Black"

# ══════════════════════════════════════════════════════════════════════════════
# Style Rules — vertical-line decorations on the timeband columns
# ══════════════════════════════════════════════════════════════════════════════

style_rules:
  - name: excelheader_vline_month
    apply_to: vertical_line
    select:
      band: Month
      repeat: true
    style:
      align: end
      stroke_color: grey
      stroke_width: 0.0
      stroke_opacity: 0.33
      fill_color:
      - '#eef4ff'
      - white

  - name: excelheader_vline_quarter
    apply_to: vertical_line
    select:
      band: Fiscal Quarter
      repeat: true
    style:
      align: end
      stroke_color: navy
      stroke_width: 0.0
      fill_color:
      - green
      - pink

  - name: excelheader_vline_weekend
    apply_to: vertical_line
    select:
      band: Date
      repeat: true
      weekend: true
    style:
      align: center
      stroke_color: '#888888'
      stroke_width: 0.0
      stroke_opacity: 0.05
      stroke_dasharray: 2,3
      fill_color: '#E8E8E8'
      fill_opacity: 0.4

  - name: excelheader_vline_company_holiday
    apply_to: vertical_line
    select:
      band: Date
      repeat: true
      company_holiday: true
    style:
      align: center
      stroke_color: goldenrod
      stroke_width: 0.0
      stroke_opacity: 0.07
      stroke_dasharray: 4,2
      fill_color: gold
      fill_opacity: 0.3

  - name: excelheader_vline_federal_holiday
    apply_to: vertical_line
    select:
      band: Date
      repeat: true
      federal_holiday: true
    style:
      align: center
      stroke_color: firebrick
      stroke_width: 0.0
      stroke_opacity: 0.25
      fill_color: tomato
      fill_opacity: 0.5
