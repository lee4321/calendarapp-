# Vibrant Theme
# Colorful high-contrast theme with seasonal month colors.
# Each month gets a unique color reflecting its season.

theme:
  name: "Vibrant"
  version: "2.0"
  description: "Colorful high-contrast theme with seasonal month colors"

# ══════════════════════════════════════════════════════════════════════════════
# Unified Style Tokens
# ══════════════════════════════════════════════════════════════════════════════

text_styles:
  heading:
    font: "Roboto-Black"
    size: 12
    color: "deeppink"
    size_rules:
      - font_size: 12
        when: { papersize: ["letter", "ledger", "tabloid"] }
      - font_size: 10
        when: { papersize: ["3x5", "5x8"] }
  body:
    font: "RobotoCondensed-Regular"
    size: 10
    color: "black"
  body_secondary:
    font: "RobotoCondensed-Italic"
    size: 8
    color: "dimgrey"
  label:
    font: "RobotoCondensed-Light"
    size: 8
    color: "dimgrey"
  label_bold:
    font: "RobotoCondensed-Bold"
    size: 8
    color: "darkorange"
  caption:
    font: "RobotoCondensed-Light"
    size: 7
    color: "dimgrey"
  day_number:
    font: "Roboto-Black"
    size: 12
    color: "orange"
  month_title:
    font: "Roboto-Bold"
    size: 10
    color: "darkorange"

box_styles:
  default:
    fill: "white"
    fill_opacity: 1.0
    stroke: "none"
  cell:
    fill: "white"
    fill_opacity: 0.4
    stroke: "slategrey"
    stroke_width: 2
    stroke_opacity: 0.3
  header:
    fill: "none"
    stroke: "none"
  timeband:
    fill: "none"
    fill_opacity: 1.0
    stroke: "none"
    fill_palette: "Set3"
    fill_colors: ["deepskyblue", "gold", "tomato", "springgreen", "deeppink", "orange"]
  highlight:
    fill: "lavenderblush"
    fill_opacity: 0.3
    stroke: "none"
  callout:
    fill: "white"
    fill_opacity: 0.3
    stroke: "slategrey"
    stroke_width: 1.0

line_styles:
  grid:
    color: "slategrey"
    width: 0.5
    opacity: 0.3
  axis:
    color: "white"
    width: 2
    opacity: 0.95
  separator:
    color: "darkslategray"
    width: 1.0
    opacity: 0.65
  today:
    color: "silver"
    width: 1.5
    opacity: 1.0
  connector:
    color: "slategrey"
    width: 0.5
    opacity: 1.0
    dasharray: "4 2"

icon_styles:
  event:
    color: "deeppink"
    size: 10
  duration:
    color: "darkorange"
  overflow:
    icon: "overflow"
    color: "crimson"

axis:
  line_style: axis
  tick:
    color: "darkgrey"
    label_style: caption
    date_format: "M/D"
  today:
    line_style: today
    label_color: "silver"
    label_text: "Today"

element_styles:
  # ── Text elements ──
  ec-heading:        { text_style: heading }
  ec-label:          { text_style: label }
  ec-day-number:     { text_style: day_number }
  ec-month-title:    { text_style: month_title }
  ec-week-number:    { text_style: label_bold }
  ec-fiscal-label:   { text_style: caption }
  ec-event-name:     { text_style: body }
  ec-event-notes:    { text_style: body_secondary }
  ec-event-date:     { text_style: caption }
  ec-duration-date:  { text_style: caption }
  ec-holiday-title:  { text_style: body }
  ec-today-label:    { text_style: label, color: "silver" }
  ec-header-text:    { text_style: heading }
  ec-footer-text:    { text_style: caption }
  ec-watermark:      { text_style: heading }

  # ── Box/rectangle elements ──
  ec-background:     { box_style: default }
  ec-cell:           { box_style: cell }
  ec-heading-cell:   { box_style: header }
  ec-band-cell:      { box_style: timeband }
  ec-callout-box:    { box_style: callout }
  ec-vline-fill:     { box_style: highlight }
  ec-day-box:        { box_style: cell }
  ec-pattern-fill:   { box_style: default }

  # ── Line elements ──
  ec-grid-line:      { line_style: grid }
  ec-axis-line:      { line_style: axis }
  ec-axis-tick:      { line_style: axis }
  ec-today-line:     { line_style: today }
  ec-separator:      { line_style: separator }
  ec-connector:      { line_style: connector }
  ec-vline:          { line_style: grid }
  ec-duration-bar:   { line_style: axis }
  ec-hash-line:      { line_style: grid }
  ec-strikethrough:  { line_style: grid }

  # ── Marker elements ──
  ec-milestone-marker: { line_style: axis }
  ec-milestone-flag:   { line_style: axis }
  ec-duration-marker:  { line_style: axis }

  # ── Icon elements ──
  ec-event-icon:     { icon_style: event }
  ec-duration-icon:  { icon_style: duration }
  ec-overflow-icon:  { icon_style: overflow }

  # ── Legend elements ──
  ec-legend-swatch:  { line_style: axis }
  ec-legend-text:    { text_style: body }
  ec-legend-icon:    { icon_style: event }

# ══════════════════════════════════════════════════════════════════════════════
# Legacy Settings (retained for non-styling configuration)
# ══════════════════════════════════════════════════════════════════════════════

# ── General Settings ──────────────────────────────────────────────────────────
base:
  font_family: "JuliaMono-Regular"
  font_color: "black"
  default_missing_icon: null
  size_rule:
    - font_size: 12
      when:
        papersize: ["letter", "ledger"]
    - font_size: 14
      when:
        papersize: ["3x5", "5x8"]

header:
  font_family: "Roboto-Black"
  left:
    font_color: "deeppink"
  center:
    font_color: "darkorange"
  right:
    font_family: "Roboto-BlackItalic"
    font_color: "dodgerblue"

footer:
  font_family: "RobotoCondensed-Light"
  font_color: "dimgrey"

events:
  icon_color: "deeppink"
  # Controls which item types claim the topmost rows in each day box.
  # Ordered list of tokens; first token's type is placed first.
  # Type tokens: milestones | events | durations
  # Special tokens: priority (sort by priority field) | alphabetical (sort by name)
  item_placement_order: ["milestones", "events", "alphabetical"]

durations:
  icon_color: "darkorange"
  stroke_dasharray: null

watermark:
  text: null    # place the desired text here or pass on the command line
  color: "orchid"
  font_family: "JuliaMono-Regular"
  opacity: 0.5
  font_size: null
  resize_mode: "fit"      # stretch also supported
  rotation_angle: 45.0
  image_rotation_angle: 0.0

fiscal:
  label_format: "{prefix}{period_short}"
  end_label_format: "{period_short} End"
  # How to number fiscal years relative to the start calendar year:
  #   null (default): auto — blockplan uses +1 for non-Jan starts, 0 for Jan;
  #                   weekly/NRF uses 0 (start year).
  #   0: start year (FY starting Feb 2026 → FY2026)
  #   1: start year + 1 (FY starting Oct 2025 → FY2026, US federal default)
  #  -1: start year − 1
  year_offset: null

colors:
  month_palette: "flattastic_flatui"
  fiscal_palette: "dark"
  group_palette: "PairedColor12Steps"
  special_day: "plum"
  hash_lines: "white"
  federal_holiday:
    color: "crimson"
    alpha: 0.3
  company_holiday:
    color: "limegreen"
    alpha: 0.3
  special_day_types:
    federal: "crimson"
    company: "limegreen"
    nonworkday: "plum"
    furlough: "lightskyblue"
    special: "gold"
  resource_groups:
    a: "deeppink"
    b: "dodgerblue"
    c: "darkorange"
    d: "mediumseagreen"

# ── Weekly Calendar ───────────────────────────────────────────────────────────
weekly:
  day_names:
    font_family: "Roboto-Bold"
    font_color: "orange"

  week_numbers:
    font_family: "RobotoCondensed-Bold"
    font_color: "darkorange"
    label_format: "W{num:02d}"

  day_box:
    stroke_color: "slategrey"
    stroke_opacity: 0.3
    stroke_width: 2
    stroke_dasharray: "8 2"
    fill_color: "white"
    fill_opacity: 0.4
    number_font: "Roboto-Black"
    number_color: "orange"
    icon_color: "orange"
    font_color: "orange"
    hash_pattern_opacity: 0.12
    hash_rules:
      # Milestones: gold polka-dots (celebratory)
      - pattern: "polka-dots"
        color: "gold"
        opacity: 0.15
        when:
          milestone: true
      # Federal holidays: crimson polka-dots
      - pattern: "cash"
        color: "crimson"
        opacity: 0.12
        when:
          federal_holiday: true
      # Non-work days: playful wiggle in plum
      - pattern: "wiggle"
        color: "plum"
        opacity: 0.10
        when:
          nonworkday: true
      # Release/cutover events: hot pink polka-dots
      - pattern: "squares-in-squares"
        color: "cyan"
        opacity: 0.70
        when:
          event_names: ["API"]
      # Sprint/freeze durations: dodger blue polka-dots
      - pattern: "polka-dots"
        color: "dodgerblue"
        opacity: 0.08
        when:
          duration_names: []
      # Completed tasks: lime green polka-dots (celebratory green)
      - pattern: "polka-dots"
        color: "limegreen"
        opacity: 0.12
        when:
          percent_complete: 100
      # Urgent notes: hot pink cash pattern (vivid alarm)
      - pattern: "cash"
        color: "hotpink"
        opacity: 0.14
        when:
          notes: ["urgent", "blocker"]
      # Top-level WBS items: gold polka-dots
      - pattern: "polka-dots"
        color: "gold"
        opacity: 0.10
        when:
          wbs: ["1."]
      # Specific resource assigned: medium purple polka-dots
      - pattern: "polka-dots"
        color: "mediumpurple"
        opacity: 0.10
        when:
          resource_names: ["Alice"]
      # Dev group days: dodger blue squares-in-squares
      - pattern: "squares-in-squares"
        color: "dodgerblue"
        opacity: 0.15
        when:
          resource_group: ["dev"]

  name_text:
    font_name: "RobotoCondensed-Regular"
    font_color: "black"
  notes_text:
    font_name: "RobotoCondensed-Italic"
    font_color: "dimgrey"

  overflow:
    icon: "overflow"
    color: "crimson"

# ── Timeline ──────────────────────────────────────────────────────────────────
timeline:
  background_color: "black"
  axis_color: "white"
  axis_opacity: 0.95
  axis_width: 2
  tick_color: "darkgrey"
  date_format: "MMM D"
  tick_label_format: "MMM YY"
  today_date: ""
  today_label_text: "Today"
  today_label_offset_y: 10.0
  today_line_color: "silver"
  today_label_color: "silver"
  marker_stroke_color: "black"
  marker_stroke_width: 1.0
  marker_radius: 4.2
  icon_size: 10.0
  callout_offset_y: 96.0
  duration_offset_y: 44.0
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.0
  duration_bar_fill_opacity: 0.5
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: null
  duration_bracket_stroke_dasharray: null
  top_colors: ["deeppink", "gold", "dodgerblue", "limegreen", "darkorange"]
  bottom_colors: ["turquoise", "crimson", "lightskyblue", "chartreuse", "hotpink"]
  name_text:
    font_name: "Roboto-Black"
    font_color: "deeppink"
  notes_text:
    font_name: "Roboto-Bold"
    font_color: "gold"
  date:
    font_family: "Roboto-Bold"
    font_color: "dodgerblue"

# ── Block Plan ────────────────────────────────────────────────────────────────
blockplan:
  background_color: "none"
  grid_color: "darkslategray"
  grid_opacity: 0.65
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_line_color: null     # null → inherits grid_color
  timeband_line_width: null     # null → inherits grid_line_width
  timeband_line_opacity: null   # null → inherits grid_opacity
  timeband_line_dasharray: null
  label_column_ratio: 0.16
  band_row_height: 10.0
  fiscal_year_start_month: 10
  week_start: 0
  show_unmatched_lane: true
  unmatched_lane_name: "Unmatched"
  lane_match_mode: "first"
  header_font: "RobotoCondensed-Bold"
  header_font_size: null
  header_label_color: "black"
  header_label_opacity: 1.0
  header_label_align_h: "left"
  header_heading_fill_color: "none"
  band_font: "RobotoCondensed-Bold"
  band_font_size: null
  timeband_label_color: "darkmagenta"
  timeband_label_opacity: 1.0
  timeband_fill_color: "none"
  timeband_fill_palette: []
  timeband_fill_opacity: 1.0
  lane_heading_fill_color: "none"
  lane_label_font: "RobotoCondensed-Bold"
  lane_label_font_size: null
  lane_label_color: "black"
  lane_label_align_h: "left"
  lane_label_align_v: "middle"
  lane_label_rotation: 0          # clockwise degrees; 0=horizontal, -90=bottom-to-top, 90=top-to-bottom
  event_show_date: false
  event_date_font: "RobotoCondensed-Light"
  event_date_font_size: null
  event_date_color: "grey"
  event_date_format: "YYYY-MM-DD"
  marker_radius: 2.0
  # Global style defaults for all vertical lines (overridable per entry).
  vertical_line_color: "deeppink"
  vertical_line_width: 1.5
  vertical_line_dasharray: null        # e.g. "6,3" for dashes
  vertical_line_opacity: 0.85
  vertical_line_fill_color: "none"     # default: no fill; set to a color, list, or palette name
  vertical_line_fill_opacity: 0.2
  # Each entry pins a line (and optional column fill) to a time-band segment.
  #   band:         time band label (case-insensitive)
  #   align:        start | center | end  (default: start)
  #   repeat:       true → apply to every segment in the band; omit value when using repeat
  #   value:        rendered segment label to match (required when repeat is absent/false)
  #   color / width / opacity / dash_array: per-line style overrides
  #   fill_color:   column fill; single color, list of colors, or palette name (cycles per segment)
  #   fill_opacity: fill opacity 0–1 (default: vertical_line_fill_opacity)
  vertical_lines:
    - band: "Sprint"
      repeat: true
      align: "end"
      fill_color: ["#fff0f5", "#f0fff4"]
  # vertical_lines:
  #   - band: "Sprint"
  #     repeat: true                   # draw after every sprint
  #     align: "end"
  #   - band: "PI"
  #     value: "PI 5"
  #     align: "end"
  #     color: "darkviolet"
  #     width: 2.0
  #     dash_array: "8,4"
  duration_fill_opacity: 0.35
  duration_stroke_color: null         # null → falls back to duration_color
  duration_stroke_width: 1.5
  duration_stroke_opacity: 1.0
  duration_stroke_dasharray: null
  duration_bar_height: 8.0
  name_text:
    font_name: "RobotoCondensed-Light"
    font_color: "deeppink"
  palette: ["deepskyblue", "gold", "tomato", "springgreen", "deeppink", "orange"]
  swimlanes:
    - name: "Engineering"
      match:
        resource_groups: ["engineering", "dev"]
    - name: "Operations"
      match:
        resource_groups: ["operations", "ops"]
    - name: "Quality"
      match:
        resource_groups: ["quality", "qa"]
  top_time_bands:
    - label: "Fiscal Quarter"
      unit: "fiscal_quarter"
      label_format: "FY{fy} Q{q}"
      fill_color: "none"
      show_every: 1
    - label: "PI"
      unit: "interval"
      interval_days: 70
      prefix: "PI "
      start_index: 1
      fill_color: "none"
      show_every: 1
    - label: "Sprint"
      unit: "interval"
      interval_days: 14
      prefix: "Sprint "
      start_index: 1
      fill_color: "none"
      show_every: 1
    - label: "Month"
      unit: "month"
      date_format: "MMM YYYY"
      fill_color: "none"
      show_every: 1
    - label: "Week Number"
      unit: "week"
      label_format: "Week {week}"
      fill_color: "none"
      show_every: 1
    - label: "Date"
      unit: "date"
      date_format: "D"
      fill_color: "none"
      show_every: 1
    - label: "DoW"
      unit: "dow"
      date_format: "ddd"
      fill_color: "none"
      show_every: 1

# ── Mini Calendar ─────────────────────────────────────────────────────────────
  bottom_time_bands: []    # mirror of top_time_bands for bands at the bottom of the SVG
mini_calendar:
  cell_font: "JuliaMono-Regular"
  cell_bold_font: "JuliaMono-Bold"
  cell_font_size: 12
  title_font: "Roboto-Black"
  title_font_size: null
  title_format: "MMMM"
  title_color: "red"
  header_font: "JuliaMono-Regular"
  header_font_size: null
  header_color: "darkviolet"
  day_number_glyphs: ["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳","㉑","㉒","㉓","㉔","㉕","㉖","㉗","㉘","㉙","㉚","㉛"]
  day_number_digits: null
  day_color: "darkgrey"
  adjacent_month_color: "lightgrey"
  show_adjacent: false 
  holiday_color: "crimson"
  nonworkday_fill_color: "plum"
  milestone_color: "darkorange"
  circle_milestones: false
  milestone_stroke_color: "darkorange"
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: "gold"
  week_number_font: "JuliaMono-Regular"
  week_number_font_size: 9
  week_number_color: "darkorange"
  week_number_label_format: "{num}"
  grid_line_color: "lightgrey"
  grid_line_width: 0.25
  grid_line_opacity: 0.5
  grid_line_dasharray: "5 1"
  cell_box_stroke_dasharray: "5 1"
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box:
    hash_rules: []
    # hash_rules:
    #   - pattern: "brick-wall"
    #     color: "darkorange"
    #     when:
    #       milestone: true

mini_details:
  title_text: "Event Details"
  title_font: "Roboto-Black"
  title_font_size: 12
  title_color: "deeppink"
  header_font: "Roboto-Bold"
  header_font_size: null
  header_color: "darkviolet"
  name_text:
    font_name: "RobotoCondensed-Regular"
    font_color: "black"
  notes_text:
    font_name: "RobotoCondensed-Italic"
    font_color: "dimgrey"
  separator_stroke_dasharray: null
  headers:
    - "Start Date"
    - "Name / Description"
    - "Milestone"
    - "Priority"
    - "Group"
  column_widths: [0.16, 0.52, 0.10, 0.10, 0.12]

text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null 
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null 
  holiday_symbols: null 
  nonworkday_symbols: null 
  duration_symbols: null
  duration_fill: null


# ─────────────────────────────────────────────────────────────────────────────
# COMPACT_PLAN — Compressed activities / duration-line view
# ─────────────────────────────────────────────────────────────────────────────
compact_plan:
  palette: ["deeppink", "dodgerblue", "darkorange", "limegreen", "gold", "mediumpurple"]
  axis_color: "dimgrey"
  axis_dasharray: "1.5,5"
  text:
    font_color: "black"
  milestone_color: "black"
  time_bands:
    - label: "Date Range"
      unit: "week"
      label_format: "{start} – {end}"
      fill_color: "none"
      alt_fill_color: "#f5f5f5"
    - label: "Week"
      unit: "week"
      label_format: "Week {n}"
      fill_color: "none"
      alt_fill_color: "none"
