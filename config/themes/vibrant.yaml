# Generated by tools/migrate_theme.py — see design_unified_style_rules.html

# ─── theme ─────────────────────────────────────────────────────────────────
# Theme metadata: name, version, description; surfaced by --theme lookup
# and the SVG <desc> element.
theme:
  name: Vibrant
  version: '2.0'
  description: Colorful high-contrast theme with seasonal month colors

# ─── base ──────────────────────────────────────────────────────────────────
# Theme-wide defaults: default font family and default missing-icon name.
base:
  font_family: JuliaMono-Regular
  default_missing_icon: null

# ─── header ────────────────────────────────────────────────────────────────
# Header non-styling config (text content references); styling lives in style_rules.
header:
  font_family: RobotoCondensed-Light
  left:
    font_color: deeppink
  center:
    font_color: darkorange
  right:
    font_family: RobotoCondensed-Light
    font_color: dodgerblue

# ─── footer ────────────────────────────────────────────────────────────────
# Footer non-styling config (text content references); styling lives in style_rules.
footer:
  font_family: RobotoCondensed-Light
  font_color: dimgrey

# ─── events ────────────────────────────────────────────────────────────────
# Event placement policy (item_placement_order); no styling.
events:
  icon_color: deeppink
  item_placement_order:
    - milestones
    - events
    - alphabetical

# ─── durations ─────────────────────────────────────────────────────────────
# Duration placement / geometry; no styling.
durations:
  icon_color: darkorange
  stroke_dasharray: null

# ─── watermark ─────────────────────────────────────────────────────────────
# Watermark text content and rotation; styling lives in style_rules.
watermark:
  text: null
  color: orchid
  font_family: JuliaMono-Regular
  opacity: 0.5
  font_size: null
  resize_mode: fit
  rotation_angle: 45.0
  image_rotation_angle: 0.0

# ─── fiscal ────────────────────────────────────────────────────────────────
# Fiscal calendar semantics: label format and year offset.
fiscal:
  label_format: '{prefix}{period_short}'
  end_label_format: '{period_short} End'
  year_offset: null

# ─── colors ────────────────────────────────────────────────────────────────
# Palette name references (month_palette, fiscal_palette, group_palette)
# and structural holiday attributes.
colors:
  month_palette: flattastic_flatui
  fiscal_palette: dark
  group_palette: PairedColor12Steps
  hash_lines: white
  federal_holiday:
    color: crimson
    alpha: 0.3
  company_holiday:
    color: limegreen
    alpha: 0.3
  resource_groups:
    a: deeppink
    b: dodgerblue
    c: darkorange
    d: mediumseagreen

# ─── weekly ────────────────────────────────────────────────────────────────
# Weekly visualizer non-styling config: week-number format, day-name
# format, overflow icon name.
weekly:
  day_names:
    font_family: Roboto-Bold
    font_color: orange
  week_numbers:
    font_family: RobotoCondensed-Bold
    font_color: darkorange
    label_format: W{num:02d}
  day_box:
    stroke_color: slategrey
    stroke_opacity: 0.3
    stroke_width: 2
    stroke_dasharray: 8 2
    fill_color: white
    fill_opacity: 0.4
    number_font: RobotoCondensed-Light
    number_color: orange
    icon_color: orange
    font_color: orange
    hash_pattern_opacity: 0.12
  name_text:
    font_name: RobotoCondensed-Regular
    font_color: black
  notes_text:
    font_name: RobotoCondensed-Italic
    font_color: dimgrey
  overflow:
    icon: warningtriangle
    color: crimson

# ─── mini_calendar ─────────────────────────────────────────────────────────
# Mini visualizer non-styling config: title format, layout dimensions,
# icon-set name.
mini_calendar:
  cell_font: JuliaMono-Regular
  cell_bold_font: JuliaMono-Bold
  cell_font_size: 12
  title_font: RobotoCondensed-Light
  title_font_size: null
  title_format: MMMM
  title_color: red
  header_font: JuliaMono-Regular
  header_font_size: null
  header_color: darkviolet
  day_number_glyphs:
    - ①
    - ②
    - ③
    - ④
    - ⑤
    - ⑥
    - ⑦
    - ⑧
    - ⑨
    - ⑩
    - ⑪
    - ⑫
    - ⑬
    - ⑭
    - ⑮
    - ⑯
    - ⑰
    - ⑱
    - ⑲
    - ⑳
    - ㉑
    - ㉒
    - ㉓
    - ㉔
    - ㉕
    - ㉖
    - ㉗
    - ㉘
    - ㉙
    - ㉚
    - ㉛
  day_number_digits: null
  day_color: darkgrey
  adjacent_month_color: lightgrey
  show_adjacent: false
  holiday_color: crimson
  nonworkday_fill_color: plum
  milestone_color: darkorange
  circle_milestones: false
  milestone_stroke_color: darkorange
  milestone_stroke_width: 1.0
  milestone_stroke_opacity: 1.0
  current_day_color: gold
  week_number_font: JuliaMono-Regular
  week_number_font_size: 9
  week_number_color: darkorange
  week_number_label_format: '{num}'
  grid_line_color: lightgrey
  grid_line_width: 0.25
  grid_line_opacity: 0.5
  grid_line_dasharray: 5 1
  cell_box_stroke_dasharray: 5 1
  strikethrough_stroke_dasharray: null
  hash_line_dasharray: null
  duration_bar_stroke_dasharray: null
  duration_bar_stroke_opacity: null
  day_box: null

# ─── mini_details ──────────────────────────────────────────────────────────
# Mini-details non-styling config: column widths, header text,
# output suffix.
mini_details:
  title_text: Event Details
  title_font: RobotoCondensed-Light
  title_font_size: 12
  title_color: deeppink
  header_font: Roboto-Bold
  header_font_size: null
  header_color: darkviolet
  name_text:
    font_name: RobotoCondensed-Regular
    font_color: black
  notes_text:
    font_name: RobotoCondensed-Italic
    font_color: dimgrey
  separator_stroke_dasharray: null
  headers:
    - Start Date
    - Name / Description
    - Milestone
    - Priority
    - Group
  column_widths:
    - 0.16
    - 0.52
    - 0.1
    - 0.1
    - 0.12

# ─── text_mini ─────────────────────────────────────────────────────────────
# text-mini glyph-set declarations; not an SVG renderer.
text_mini:
  cell_width: 2
  month_gap: 4
  week_number_digits: null
  day_number_digits: null
  event_symbols: null
  milestone_symbols: null
  holiday_symbols: null
  nonworkday_symbols: null
  duration_symbols: null
  duration_fill: null

# ─── timeline ──────────────────────────────────────────────────────────────
# Timeline non-styling config: tick-label format, axis/callout/lane
# geometry, today-line content.
timeline:
  background_color: black
  axis_color: white
  axis_opacity: 0.95
  axis_width: 2
  tick_color: darkgrey
  date_format: MMM D
  tick_label_format: MMM YY
  today_date: ''
  today_label_text: Today
  today_label_offset_y: 10.0
  today_line_color: silver
  today_label_color: silver
  marker_stroke_color: black
  marker_stroke_width: 1.0
  marker_radius: 4.2
  icon_size: 10.0
  callout_offset_y: 96.0
  duration_offset_y: 44.0
  duration_lane_gap_y: 8.0
  label_stroke_width: 1.0
  label_fill_opacity: 0.0
  duration_bar_fill_opacity: 0.5
  axis_stroke_dasharray: null
  tick_stroke_dasharray: null
  today_line_dasharray: null
  label_stroke_dasharray: null
  duration_bar_stroke_dasharray: null
  connector_stroke_dasharray: null
  duration_bracket_stroke_dasharray: null
  top_colors:
    - deeppink
    - gold
    - dodgerblue
    - limegreen
    - darkorange
  bottom_colors:
    - turquoise
    - crimson
    - lightskyblue
    - chartreuse
    - hotpink
  name_text:
    font_name: RobotoCondensed-Light
    font_color: deeppink
  notes_text:
    font_name: Roboto-Bold
    font_color: gold
  date:
    font_family: Roboto-Bold
    font_color: dodgerblue

# ─── compact_plan ──────────────────────────────────────────────────────────
# compactplan non-styling config: axis-relative duration/legend geometry.
compact_plan:
  palette:
    - deeppink
    - dodgerblue
    - darkorange
    - limegreen
    - gold
    - mediumpurple
  axis_color: dimgrey
  axis_dasharray: 1.5,5
  text:
    font_color: black
  milestone_color: black
  bands:
    - date_range
    - week

# ─── blockplan ─────────────────────────────────────────────────────────────
# Blockplan non-styling config: swimlane name list, label-column ratio,
# lane match policy, fiscal-year start.
blockplan:
  background_color: none
  grid_color: darkslategray
  grid_opacity: 0.65
  grid_line_width: 1.0
  grid_dasharray: null
  timeband_line_color: null
  timeband_line_width: null
  timeband_line_opacity: null
  timeband_line_dasharray: null
  label_column_ratio: 0.16
  band_row_height: 10.0
  fiscal_year_start_month: 10
  week_start: 0
  show_unmatched_lane: true
  unmatched_lane_name: Unmatched
  lane_match_mode: first
  header_font: RobotoCondensed-Bold
  header_font_size: null
  header_label_color: black
  header_label_opacity: 1.0
  header_label_align_h: left
  header_heading_fill_color: none
  band_font: RobotoCondensed-Bold
  band_font_size: null
  timeband_label_color: darkmagenta
  timeband_label_opacity: 1.0
  timeband_fill_color: none
  timeband_fill_palette: []
  timeband_fill_opacity: 1.0
  lane_heading_fill_color: none
  lane_label_font: RobotoCondensed-Bold
  lane_label_font_size: null
  lane_label_color: black
  lane_label_align_h: left
  lane_label_align_v: middle
  lane_label_rotation: 0
  event_show_date: false
  event_date_font: RobotoCondensed-Light
  event_date_font_size: null
  event_date_color: grey
  event_date_format: YYYY-MM-DD
  marker_radius: 2.0
  vertical_line_color: deeppink
  vertical_line_width: 1.5
  vertical_line_dasharray: null
  vertical_line_opacity: 0.85
  vertical_line_fill_color: none
  vertical_line_fill_opacity: 0.2
  duration_fill_opacity: 0.35
  duration_stroke_color: null
  duration_stroke_width: 1.5
  duration_stroke_opacity: 1.0
  duration_stroke_dasharray: null
  duration_bar_height: 8.0
  name_text:
    font_name: RobotoCondensed-Light
    font_color: deeppink
  palette:
    - deepskyblue
    - gold
    - tomato
    - springgreen
    - deeppink
    - orange
  swimlanes:
    - name: Engineering
    - name: Operations
    - name: Quality
  top_bands:
    - fiscal_quarter
    - pi
    - sprint
    - month
    - week_number
    - date
    - dow

# ─── time_bands ────────────────────────────────────────────────────────────
# Shared band catalog referenced by blockplan / compactplan / excelheader
# placement lists. See design §10.
time_bands:
  fiscal_quarter:
    unit: fiscal_quarter
    label: Fiscal Quarter
    label_format: FY{fy} Q{q}
    show_every: 1
  pi:
    unit: interval
    label: PI
    interval_days: 70
    prefix: 'PI '
    start_index: 1
    show_every: 1
  sprint:
    unit: interval
    label: Sprint
    interval_days: 14
    prefix: 'Sprint '
    start_index: 1
    show_every: 1
  month:
    unit: month
    label: Month
    date_format: MMM YYYY
    show_every: 1
  week_number:
    unit: week
    label: Week Number
    label_format: Week {week}
    show_every: 1
  date:
    unit: date
    label: Date
    date_format: D
    show_every: 1
  dow:
    unit: dow
    label: DoW
    date_format: ddd
    show_every: 1
  date_range:
    unit: week
    label: Date Range
    label_format: '{start} – {end}'
  week:
    unit: week
    label: Week
    label_format: Week {n}

# ─── style_rules ───────────────────────────────────────────────────────────
# All visual styling.  Each rule has a select + apply_to + style triple.
# See design §4 (Unified rule schema) and USER_GUIDE.md Complex Structures
# Reference for the full vocabulary.
style_rules:
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - letter
        - ledger
    style:
      size: 12
  - name: base font — papersize override
    apply_to: text:base
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 14
  - name: define text:heading
    define: text
    as: heading
    style:
      font: RobotoCondensed-Light
      size: 12
      color: deeppink
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - letter
        - ledger
        - tabloid
    style:
      size: 12
  - name: text:heading — papersize override
    apply_to: text:heading
    select:
      papersize:
        - 3x5
        - 5x8
    style:
      size: 10
  - name: define text:body
    define: text
    as: body
    style:
      font: RobotoCondensed-Regular
      size: 10
      color: black
  - name: define text:body_secondary
    define: text
    as: body_secondary
    style:
      font: RobotoCondensed-Italic
      size: 8
      color: dimgrey
  - name: define text:label
    define: text
    as: label
    style:
      font: RobotoCondensed-Light
      size: 8
      color: dimgrey
  - name: define text:label_bold
    define: text
    as: label_bold
    style:
      font: RobotoCondensed-Bold
      size: 8
      color: darkorange
  - name: define text:caption
    define: text
    as: caption
    style:
      font: RobotoCondensed-Light
      size: 7
      color: dimgrey
  - name: define text:day_number
    define: text
    as: day_number
    style:
      font: RobotoCondensed-Light
      size: 12
      color: orange
  - name: define text:month_title
    define: text
    as: month_title
    style:
      font: Roboto-Bold
      size: 10
      color: darkorange
  - name: define box:default
    define: box
    as: default
    style:
      fill: white
      fill_opacity: 1.0
      stroke: none
  - name: define box:cell
    define: box
    as: cell
    style:
      fill: white
      fill_opacity: 0.4
      stroke: slategrey
      stroke_width: 2
      stroke_opacity: 0.3
  - name: define box:header
    define: box
    as: header
    style:
      fill: none
      stroke: none
  - name: define box:timeband
    define: box
    as: timeband
    style:
      fill: none
      fill_opacity: 1.0
      stroke: none
      fill_palette: Set3
      fill_colors:
        - deepskyblue
        - gold
        - tomato
        - springgreen
        - deeppink
        - orange
  - name: define box:highlight
    define: box
    as: highlight
    style:
      fill: lavenderblush
      fill_opacity: 0.3
      stroke: none
  - name: define box:callout
    define: box
    as: callout
    style:
      fill: white
      fill_opacity: 0.3
      stroke: slategrey
      stroke_width: 1.0
  - name: define line:grid
    define: line
    as: grid
    style:
      color: slategrey
      width: 0.5
      opacity: 0.3
  - name: define line:axis
    define: line
    as: axis
    style:
      color: white
      width: 2
      opacity: 0.95
  - name: define line:separator
    define: line
    as: separator
    style:
      color: darkslategray
      width: 1.0
      opacity: 0.65
  - name: define line:today
    define: line
    as: today
    style:
      color: silver
      width: 1.5
      opacity: 1.0
  - name: define line:connector
    define: line
    as: connector
    style:
      color: slategrey
      width: 0.5
      opacity: 1.0
      dasharray: 4 2
  - name: define icon:event
    define: icon
    as: event
    style:
      color: deeppink
      size: 10
  - name: define icon:duration
    define: icon
    as: duration
    style:
      color: darkorange
  - name: define icon:overflow
    define: icon
    as: overflow
    style:
      icon: overflow
      color: crimson
  - name: bind ec-axis-line
    apply_to: element
    select:
      element: ec-axis-line
    style:
      use: line:axis
  - name: define line:tick
    define: line
    as: tick
    style:
      color: darkgrey
      width: 0.5
      opacity: 1.0
  - name: bind ec-axis-tick
    apply_to: element
    select:
      element: ec-axis-tick
    style:
      use: line:tick
  - name: bind ec-tick-label
    apply_to: element
    select:
      element: ec-tick-label
    style:
      use: text:caption
  - name: bind ec-today-line
    apply_to: element
    select:
      element: ec-today-line
    style:
      use: line:today
  - name: today label color
    apply_to: text:today_label
    style:
      color: silver
  - name: bind ec-heading -> text:heading
    apply_to: element
    select:
      element: ec-heading
    style:
      use: text:heading
  - name: bind ec-label -> text:label
    apply_to: element
    select:
      element: ec-label
    style:
      use: text:label
  - name: bind ec-day-number -> text:day_number
    apply_to: element
    select:
      element: ec-day-number
    style:
      use: text:day_number
  - name: bind ec-month-title -> text:month_title
    apply_to: element
    select:
      element: ec-month-title
    style:
      use: text:month_title
  - name: bind ec-week-number -> text:label_bold
    apply_to: element
    select:
      element: ec-week-number
    style:
      use: text:label_bold
  - name: bind ec-fiscal-label -> text:caption
